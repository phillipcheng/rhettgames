<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DISASTER RUNNER</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: #0a0a14;
    font-family: 'Courier New', monospace;
    color: #fff;
    overflow: hidden;
    width: 100%;
    height: 100%;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    overscroll-behavior: none;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #gameContainer {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: 100vw;
    max-height: 100vh;
    border: none;
    box-shadow: none;
    background: #000;
    overflow: hidden;
  }
  canvas {
    display: block;
    background: #2d4a3e;
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    touch-action: none;
  }
  #hud {
    position: absolute;
    top: 10px; left: 10px; right: 10px;
    pointer-events: none;
    font-size: 16px;
    font-weight: bold;
    text-shadow: 2px 2px 4px #000;
    z-index: 10;
  }
  #hudTop { display: flex; justify-content: space-between; margin-bottom: 6px; }
  #hudBottom { display: flex; gap: 8px; }
  .hud-box {
    background: rgba(0,0,0,0.7);
    padding: 6px 12px;
    border: 2px solid #ff6b35;
    border-radius: 4px;
  }
  .hud-small {
    background: rgba(0,0,0,0.7);
    padding: 4px 10px;
    border: 1px solid #888;
    border-radius: 3px;
    font-size: 14px;
  }
  #combo {
    position: absolute;
    top: 80px; right: 14px;
    background: rgba(0,0,0,0.6);
    padding: 6px 14px;
    border: 2px solid #ffaa00;
    border-radius: 4px;
    font-size: 16px;
    font-weight: bold;
    text-shadow: 2px 2px 4px #000;
    color: #ffaa00;
    z-index: 10;
    transition: transform 0.1s;
  }
  #combo.bump { transform: scale(1.2); }
  #biome {
    position: absolute;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    padding: 6px 18px;
    border: 2px solid #fff;
    border-radius: 4px;
    font-size: 14px;
    color: #fff;
    text-shadow: 1px 1px 2px #000;
    z-index: 10;
    letter-spacing: 2px;
  }
  #activePowers {
    position: absolute;
    bottom: 14px; left: 14px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  .power-icon {
    background: rgba(0,0,0,0.7);
    border: 2px solid #00ddff;
    border-radius: 50%;
    width: 44px; height: 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #00ddff;
    box-shadow: 0 0 10px rgba(0,221,255,0.6);
  }
  .power-icon .timer { font-size: 9px; margin-top: -2px; }
  #warning {
    position: absolute;
    top: 45%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: bold;
    color: #ff3030;
    text-shadow: 0 0 20px #ff3030, 4px 4px 0 #000;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 20;
    text-align: center;
    letter-spacing: 4px;
  }
  #levelUp {
    position: absolute;
    top: 50%; left: 50%;
    font-size: 36px;
    font-weight: bold;
    color: #ffdd00;
    text-shadow: 0 0 20px #ffdd00, 4px 4px 0 #000;
    pointer-events: none;
    opacity: 0;
    z-index: 20;
    text-align: center;
    letter-spacing: 4px;
    transition: all 0.5s;
    transform: translate(-50%, -50%);
  }
  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 30;
    text-align: center;
    padding: 20px;
    overflow-y: auto;
  }
  #overlay h1 {
    font-size: 56px;
    color: #ff6b35;
    text-shadow: 0 0 20px #ff6b35, 4px 4px 0 #000;
    margin-bottom: 10px;
    letter-spacing: 4px;
  }
  #overlay p { font-size: 16px; margin: 6px 0; max-width: 700px; line-height: 1.5; }
  .menu-btn {
    margin-top: 14px;
    padding: 12px 32px;
    font-size: 20px;
    font-family: inherit;
    font-weight: bold;
    background: #ff6b35;
    color: #000;
    border: none;
    cursor: pointer;
    border-radius: 4px;
    transition: transform 0.1s;
    letter-spacing: 2px;
  }
  .menu-btn:hover { transform: scale(1.05); background: #ffaa66; }
  .menu-btn.alt { background: #00ddff; }
  .menu-btn.alt:hover { background: #66eeff; }
  .controls {
    margin-top: 12px;
    font-size: 13px;
    color: #aaa;
    line-height: 1.7;
  }
  .controls span { color: #ff6b35; font-weight: bold; }
  #flash {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 15;
  }
  .hidden { display: none !important; }
  #shopGrid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 12px;
    max-width: 700px;
  }
  .shop-item {
    background: rgba(255,107,53,0.1);
    border: 2px solid #ff6b35;
    padding: 10px;
    border-radius: 6px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
  }
  .shop-item:hover { background: rgba(255,107,53,0.25); transform: scale(1.02); }
  .shop-item.bought { background: rgba(0,255,100,0.15); border-color: #00ff66; cursor: default; }
  .shop-item.cant-afford { opacity: 0.5; cursor: not-allowed; }
  .shop-item h3 { color: #ff6b35; font-size: 15px; margin-bottom: 3px; }
  .shop-item .desc { font-size: 11px; color: #ccc; margin-bottom: 5px; }
  .shop-item .price { color: #ffdd00; font-size: 13px; font-weight: bold; }
  .shop-item.bought .price { color: #00ff66; }
  #coinsDisplay { font-size: 22px; color: #ffdd00; margin: 8px 0; font-weight: bold; }
  .scoreboard {
    background: rgba(0,0,0,0.5);

    padding: 10px 16px;
    border-radius: 4px;
    margin-top: 10px;
    font-size: 13px;
    text-align: left;
    min-width: 240px;
  }
  .btn-row { display: flex; gap: 12px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }
  #difficultyBar {
    position: absolute;
    bottom: 14px; right: 14px;
    background: rgba(0,0,0,0.7);
    padding: 6px 12px;
    border: 1px solid #ff3030;
    border-radius: 3px;
    font-size: 12px;
    z-index: 10;
  }
  /* Touch controls */
  #touchControls {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 25;
    display: none;
  }
  #touchControls.active { display: block; }
  #joystickZone {
    position: absolute;
    bottom: 30px; left: 30px;
    width: 160px; height: 160px;
    pointer-events: auto;
  }
  #joystickBase {
    position: absolute;
    top: 0; left: 0;
    width: 160px; height: 160px;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 50%;

  #joystickKnob {
    position: absolute;
    top: 50px; left: 50px;
    width: 60px; height: 60px;
    background: rgba(255,107,53,0.6);
    border: 3px solid rgba(255,255,255,0.9);
    border-radius: 50%;
    box-shadow: 0 0 15px rgba(255,107,53,0.6);
    transition: background 0.1s;
  }
  #touchButtons {
    position: absolute;
    bottom: 30px; right: 30px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    pointer-events: auto;
  }
  .touch-btn {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    border: 3px solid #ff6b35;
    color: #ff6b35;
    font-size: 28px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    cursor: pointer;
    user-select: none;
  }
  .touch-btn.ability { border-color: #00ddff; color: #00ddff; }
  .touch-btn.sprint { border-color: #ffdd00; color: #ffdd00; font-size: 22px; }
  .touch-btn.pause {
    position: absolute;
    top: 14px; right: 14px;
    width: 50px; height: 50px;
    font-size: 20px;
    border-color: #888;
    color: #fff;
    pointer-events: auto;
  }
  .touch-btn:active { background: rgba(255,255,255,0.2); transform: scale(0.92); }
  .touch-btn.cooldown { opacity: 0.4; }

  @media (hover: none) and (pointer: coarse) {
    .controls { font-size: 11px; }
    #overlay h1 { font-size: 40px; }
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="game"></canvas>
  <div id="flash"></div>
  <div id="hud" class="hidden">
    <div id="hudTop">
      <div class="hud-box">❤️ <span id="health">100</span>/<span id="maxHealth">100</span></div>
      <div class="hud-box">⏱️ <span id="time">0</span>s</div>
      <div class="hud-box">⭐ <span id="score">0</span></div>
    </div>
    <div id="hudBottom">
      <div class="hud-small">💰 <span id="coins">0</span></div>
      <div class="hud-small">📈 LV <span id="level">1</span> (<span id="xp">0</span>/<span id="xpNext">100</span>)</div>
    </div>
  </div>
  <div id="biome" class="hidden">FOREST</div>
  <div id="combo" class="hidden">x1.0</div>
  <div id="activePowers"></div>
  <div id="warning"></div>
  <div id="levelUp"></div>
  <div id="difficultyBar" class="hidden">⚡ DIFFICULTY: <span id="diff">1</span></div>
  <div id="touchControls">
    <div id="joystickZone">
      <div id="joystickBase"></div>
      <div id="joystickKnob"></div>
    </div>
    <div id="touchButtons">
      <button class="touch-btn sprint" id="btnSprint">DASH</button>
      <button class="touch-btn ability" id="btnAbility">⚡</button>
    </div>
    <button class="touch-btn pause" id="btnPause">⏸</button>
  </div>
  <div id="overlay"></div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 900, H = 600;

// Detect touch device
const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

function resizeCanvas() {
  const container = document.getElementById('gameContainer');
  const rect = container.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  W = Math.floor(rect.width);
  H = Math.floor(rect.height);
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
resizeCanvas();

const overlay = document.getElementById('overlay');
const hud = document.getElementById('hud');
const biomeEl = document.getElementById('biome');
const comboEl = document.getElementById('combo');
const activePowersEl = document.getElementById('activePowers');
const warningEl = document.getElementById('warning');
const levelUpEl = document.getElementById('levelUp');
const flashEl = document.getElementById('flash');
const healthEl = document.getElementById('health');
const maxHealthEl = document.getElementById('maxHealth');
const timeEl = document.getElementById('time');
const scoreEl = document.getElementById('score');
const coinsEl = document.getElementById('coins');
const levelEl = document.getElementById('level');
const xpEl = document.getElementById('xp');
const xpNextEl = document.getElementById('xpNext');
const diffEl = document.getElementById('diff');
const diffBar = document.getElementById('difficultyBar');

const persist = {
  totalCoins: 0,
  bestTime: 0,
  bestScore: 0,
  totalRuns: 0,
  totalDeaths: 0,
  totalDisastersSurvived: 0,
  totalCoinsCollected: 0,
  selectedCharacter: 'survivor',
  unlockedCharacters: { survivor: true },
  achievements: {},
  upgrades: {
    maxHealth: 0,
    speed: 0,
    sprintLength: 0,
    healAmount: 0,
    coinMagnet: 0,
    startShield: 0,
    luckyDrop: 0,
  }
};

const characters = {
  survivor: {
    name: 'SURVIVOR',
    desc: 'Balanced. Dash to escape danger.',
    color: '#ff6b35', hairColor: '#3a2a1a', bodyColor: '#ff6b35',
    speedMod: 1.0, healthMod: 1.0, staminaMod: 1.0,
    ability: 'dash', abilityName: 'DASH', abilityIcon: '💨',
    abilityCooldown: 240,
    unlockReq: null, unlockHint: 'Default character',
  },
  scout: {
    name: 'SCOUT',
    desc: 'Faster, less HP. Phase through danger.',
    color: '#00ddff', hairColor: '#1a1a3a', bodyColor: '#00aacc',
    speedMod: 1.25, healthMod: 0.75, staminaMod: 1.4,
    ability: 'phase', abilityName: 'PHASE', abilityIcon: '👻',
    abilityCooldown: 360,
    unlockReq: () => persist.bestTime >= 60,
    unlockHint: 'Survive 60 seconds in one run',
  },
  tank: {
    name: 'TANK',
    desc: 'Heavy & slow. Smashes nearby threats.',
    color: '#888888', hairColor: '#222', bodyColor: '#666',
    speedMod: 0.8, healthMod: 1.5, staminaMod: 0.8,
    ability: 'shockwave', abilityName: 'SHOCKWAVE', abilityIcon: '💥',
    abilityCooldown: 420,
    unlockReq: () => persist.totalDisastersSurvived >= 50,
    unlockHint: 'Survive 50 disasters total',
  },
  mage: {
    name: 'MAGE',
    desc: 'Frail. Freezes time briefly.',
    color: '#cc66ff', hairColor: '#440055', bodyColor: '#9933cc',
    speedMod: 1.0, healthMod: 0.7, staminaMod: 1.2,
    ability: 'timestop', abilityName: 'TIME STOP', abilityIcon: '⏱️',
    abilityCooldown: 540,
    unlockReq: () => persist.totalCoinsCollected >= 200,
    unlockHint: 'Collect 200 coins total',
  },
};

const achievementDefs = {
  firstBlood: { name: 'First Blood', desc: 'Die once', icon: '💀', reward: 25, check: () => persist.totalDeaths >= 1 },
  survivor30: { name: 'Survivor', desc: 'Survive 30 seconds', icon: '⏱️', reward: 50, check: () => persist.bestTime >= 30 },
  survivor60: { name: 'Hardened', desc: 'Survive 60 seconds', icon: '🏅', reward: 100, check: () => persist.bestTime >= 60 },
  survivor120: { name: 'Iron Soul', desc: 'Survive 2 minutes', icon: '🛡️', reward: 200, check: () => persist.bestTime >= 120 },
  survivor300: { name: 'Living Legend', desc: 'Survive 5 minutes', icon: '👑', reward: 500, check: () => persist.bestTime >= 300 },
  collector: { name: 'Collector', desc: 'Collect 100 coins total', icon: '💰', reward: 50, check: () => persist.totalCoinsCollected >= 100 },
  hoarder: { name: 'Hoarder', desc: 'Collect 1000 coins total', icon: '💎', reward: 250, check: () => persist.totalCoinsCollected >= 1000 },
  veteran: { name: 'Veteran', desc: 'Play 10 runs', icon: '🎖️', reward: 75, check: () => persist.totalRuns >= 10 },
  diehard: { name: 'Die Hard', desc: 'Play 50 runs', icon: '🔥', reward: 300, check: () => persist.totalRuns >= 50 },
  unfazed: { name: 'Unfazed', desc: 'Survive 25 disasters total', icon: '⚡', reward: 100, check: () => persist.totalDisastersSurvived >= 25 },
  apocalypse: { name: 'Apocalypse', desc: 'Survive 100 disasters total', icon: '☄️', reward: 400, check: () => persist.totalDisastersSurvived >= 100 },
  prepared: { name: 'Prepared', desc: 'Buy any 5 upgrades', icon: '⚙️', reward: 150, check: () => Object.values(persist.upgrades).reduce((a,b)=>a+b,0) >= 5 },
};

function checkAchievements() {
  let newCoins = 0;
  const unlocked = [];
  for (const [key, def] of Object.entries(achievementDefs)) {
    if (!persist.achievements[key] && def.check()) {
      persist.achievements[key] = true;
      newCoins += def.reward;
      unlocked.push(def);
    }
  }
  // Character unlocks
  for (const [key, char] of Object.entries(characters)) {
    if (!persist.unlockedCharacters[key] && char.unlockReq && char.unlockReq()) {
      persist.unlockedCharacters[key] = true;
      unlocked.push({ name: char.name + ' UNLOCKED', desc: char.desc, icon: '🔓', reward: 0 });
    }
  }
  if (newCoins > 0) persist.totalCoins += newCoins;
  return unlocked;
}

const upgradeDefs = {
  maxHealth: { name: 'Iron Will', desc: '+20 max HP per level', max: 5, cost: lvl => 50 + lvl * 80, icon: '❤️' },
  speed: { name: 'Swift Feet', desc: '+0.3 speed per level', max: 5, cost: lvl => 60 + lvl * 100, icon: '🏃' },
  sprintLength: { name: 'Endurance', desc: '+30% sprint stamina per level', max: 5, cost: lvl => 40 + lvl * 70, icon: '💨' },
  healAmount: { name: 'Recovery', desc: 'Health packs heal +15 more per level', max: 3, cost: lvl => 80 + lvl * 120, icon: '💚' },
  coinMagnet: { name: 'Coin Magnet', desc: '+60 pickup range per level', max: 3, cost: lvl => 70 + lvl * 100, icon: '🧲' },
  startShield: { name: 'Divine Start', desc: 'Begin each run with a 5s shield', max: 1, cost: () => 250, icon: '🛡️' },
  luckyDrop: { name: 'Lucky Charm', desc: 'Power-ups and items drop more often', max: 1, cost: () => 300, icon: '🍀' },
};

let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playSound(freq, duration, type='sine', vol=0.15) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
}
function playRumble(duration) {
  if (!audioCtx) return;
  const noise = audioCtx.createBufferSource();
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
  noise.buffer = buf;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass'; filter.frequency.value = 200;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  noise.start();
}
function playLevelUpSound() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playSound(f, 0.15, 'square', 0.15), i * 80));
}
function playCoinSound() {
  playSound(880, 0.08, 'square', 0.1);
  setTimeout(() => playSound(1175, 0.1, 'square', 0.1), 50);
}

let gameState = 'menu';
let player, disasters, particles, healthPacks, coins, powerups, floatingTexts;
let screenShake, gameTime, score, lastDisasterTime, lastHealthSpawn, lastCoinSpawn, lastPowerupSpawn;
let runCoins, comboMultiplier, comboTimer;
let currentBiome, biomeTimer, dayNightCycle;
let keys = {};
let activePowerups = [];
let difficultyLevel;
let groundDecorations;
let timeStopActive = 0;
let isPaused = false;
let perfectStreakTime = 0; // seconds since last damage
let totalDisastersThisRun = 0;
let runNotifications = []; // Achievement notifications during run

window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  keys[e.key] = true;
  // Pause toggle
  if ((e.key === 'p' || e.key === 'P' || e.key === 'Escape') && gameState === 'playing') {
    isPaused = !isPaused;
    if (!isPaused) gameLoop();
    else drawPauseScreen();
  }
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; keys[e.key] = false; });

// ===== Touch Controls =====
const touchControls = document.getElementById('touchControls');
const joystickZone = document.getElementById('joystickZone');
const joystickKnob = document.getElementById('joystickKnob');
const btnSprint = document.getElementById('btnSprint');
const btnAbility = document.getElementById('btnAbility');
const btnPause = document.getElementById('btnPause');

let touchJoystick = { active: false, dx: 0, dy: 0, id: null };

if (isTouchDevice) {
  touchControls.classList.add('active');
}

function handleJoystickStart(e) {
  e.preventDefault();
  const touch = e.touches ? e.touches[0] : e;
  const rect = joystickZone.getBoundingClientRect();
  touchJoystick.active = true;
  touchJoystick.id = e.touches ? touch.identifier : null;
  touchJoystick.startX = rect.left + rect.width / 2;
  touchJoystick.startY = rect.top + rect.height / 2;
  updateJoystick(touch.clientX, touch.clientY);
}

function handleJoystickMove(e) {
  if (!touchJoystick.active) return;
  e.preventDefault();
  let touch;
  if (e.touches) {
    for (const t of e.touches) {
      if (t.identifier === touchJoystick.id) { touch = t; break; }
    }
    if (!touch) return;
  } else touch = e;
  updateJoystick(touch.clientX, touch.clientY);
}

function handleJoystickEnd(e) {
  if (e.touches) {
    let stillActive = false;
    for (const t of e.touches) {
      if (t.identifier === touchJoystick.id) { stillActive = true; break; }
    }
    if (stillActive) return;
  }
  touchJoystick.active = false;
  touchJoystick.dx = 0;
  touchJoystick.dy = 0;
  joystickKnob.style.left = '50px';
  joystickKnob.style.top = '50px';
}

function updateJoystick(clientX, clientY) {
  const dx = clientX - touchJoystick.startX;
  const dy = clientY - touchJoystick.startY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const max = 60;
  const clampedDist = Math.min(dist, max);
  const angle = Math.atan2(dy, dx);
  const kx = Math.cos(angle) * clampedDist;
  const ky = Math.sin(angle) * clampedDist;
  joystickKnob.style.left = (50 + kx) + 'px';
  joystickKnob.style.top = (50 + ky) + 'px';
  // Dead zone
  if (dist < 15) {
    touchJoystick.dx = 0;
    touchJoystick.dy = 0;
  } else {
    touchJoystick.dx = kx / max;
    touchJoystick.dy = ky / max;
  }
}

joystickZone.addEventListener('touchstart', handleJoystickStart, { passive: false });
joystickZone.addEventListener('touchmove', handleJoystickMove, { passive: false });
joystickZone.addEventListener('touchend', handleJoystickEnd, { passive: false });
joystickZone.addEventListener('touchcancel', handleJoystickEnd, { passive: false });
// Desktop fallback for testing
joystickZone.addEventListener('mousedown', handleJoystickStart);
window.addEventListener('mousemove', e => { if (touchJoystick.active) handleJoystickMove(e); });
window.addEventListener('mouseup', handleJoystickEnd);

function createPlayer() {
  const char = characters[persist.selectedCharacter];
  const maxHp = Math.floor((100 + persist.upgrades.maxHealth * 20) * char.healthMod);
  const speed = (3.2 + persist.upgrades.speed * 0.3) * char.speedMod;
  const stamina = Math.floor((100 + persist.upgrades.sprintLength * 30) * char.staminaMod);
  const startShield = persist.upgrades.startShield ? 300 : 0;
  return {
    x: W / 2, y: H / 2, radius: 14,
    speed, sprintSpeed: speed * 1.7,
    health: maxHp, maxHealth: maxHp,
    stamina, maxStamina: stamina,
    facing: 0, walkFrame: 0, isMoving: false,
    invuln: startShield, shielded: startShield > 0,
    level: 1, xp: 0, xpNext: 100,
    abilityCooldown: 0,
    perfectStreakStart: 0,
    character: char,
  };
}

function updatePlayer() {
  let dx = 0, dy = 0;
  if (keys['w'] || keys['ArrowUp']) dy -= 1;
  if (keys['s'] || keys['ArrowDown']) dy += 1;
  if (keys['a'] || keys['ArrowLeft']) dx -= 1;
  if (keys['d'] || keys['ArrowRight']) dx += 1;

  // Joystick override
  if (touchJoystick.active && (Math.abs(touchJoystick.dx) > 0 || Math.abs(touchJoystick.dy) > 0)) {
    dx = touchJoystick.dx;
    dy = touchJoystick.dy;
  }

  let speedMult = hasActivePower('speedBoost') ? 1.5 : 1;
  // Dash boost
  if (player.dashing > 0) {
    player.dashing--;
    speedMult *= 3.5;
    // Trail particles
    if (player.dashing % 2 === 0) {
      particles.push({
        x: player.x, y: player.y,
        vx: 0, vy: 0,
        radius: 6, color: player.character.color, life: 20,
      });
    }
  }
  const sprinting = ((keys['shift'] || keys['Shift']) || touchSprinting) && player.stamina > 0 && (dx !== 0 || dy !== 0);
  const speed = (sprinting ? player.sprintSpeed : player.speed) * speedMult;
  if (sprinting) player.stamina = Math.max(0, player.stamina - 0.8);
  else player.stamina = Math.min(player.maxStamina, player.stamina + 0.4);

  // Normalize: clamp magnitude to 1 (works for both digital keys and analog joystick)
  const mag = Math.sqrt(dx * dx + dy * dy);
  if (mag > 1) { dx /= mag; dy /= mag; }
  player.x += dx * speed;
  player.y += dy * speed;
  player.isMoving = (Math.abs(dx) > 0.05 || Math.abs(dy) > 0.05);
  if (player.isMoving) {
    player.facing = Math.atan2(dy, dx);
    player.walkFrame += sprinting ? 0.3 : 0.2;
  }
  player.x = Math.max(player.radius, Math.min(W - player.radius, player.x));
  player.y = Math.max(player.radius, Math.min(H - player.radius, player.y));
  if (player.invuln > 0) {
    player.invuln--;
    if (player.invuln === 0) player.shielded = false;
  }
  if (player.abilityCooldown > 0) player.abilityCooldown--;
  if (timeStopActive > 0) timeStopActive--;

  // Activate ability
  if ((keys[' '] || keys['Spacebar']) && player.abilityCooldown === 0) {
    activateAbility();
    keys[' '] = false; keys['Spacebar'] = false;
  }
}

function activateAbility() {
  const char = player.character;
  player.abilityCooldown = char.abilityCooldown;
  if (char.ability === 'dash') {
    player.dashing = 12;
    player.invuln = Math.max(player.invuln, 18);
    playSound(660, 0.15, 'sawtooth', 0.2);
    showFloatingText(player.x, player.y - 20, 'DASH!', char.color, 40);
  }
  else if (char.ability === 'phase') {
    player.invuln = 120;
    player.shielded = true;
    playSound(440, 0.4, 'sine', 0.2);
    playSound(880, 0.3, 'sine', 0.15);
    showFloatingText(player.x, player.y - 20, 'PHASE!', char.color, 60);
    for (let i = 0; i < 20; i++) {
      const a = Math.random() * Math.PI * 2;
      particles.push({
        x: player.x, y: player.y,
        vx: Math.cos(a) * 4, vy: Math.sin(a) * 4,
        radius: 3, color: char.color, life: 40,
      });
    }
  }
  else if (char.ability === 'shockwave') {
    // Push enemies/disasters away, clear bomb shadows nearby
    playSound(80, 0.4, 'square', 0.3);
    screenShake = Math.max(screenShake, 18);
    showFloatingText(player.x, player.y - 20, 'BOOM!', char.color, 60);
    // Damage nearby disaster spots and clear lava bombs
    const radius = 180;
    for (const d of disasters) {
      if (d.type === 'volcano') {
        for (const b of d.bombs) {
          if (!b.landed) {
            const bdx = b.targetX - player.x, bdy = b.targetY - player.y;
            if (Math.sqrt(bdx*bdx + bdy*bdy) < radius) {
              b.delay = Math.max(b.delay, 600); // delay them
            }
          }
        }
      }
      else if (d.type === 'lightning') {
        for (const s of d.strikes) {
          if (!s.struck) {
            const sdx = s.x - player.x, sdy = s.y - player.y;
            if (Math.sqrt(sdx*sdx + sdy*sdy) < radius) {
              s.delay = Math.max(s.delay, 600);
            }
          }
        }
      }
      else if (d.type === 'meteor') {
        for (const m of d.meteors) {
          if (!m.landed) {
            const mdx = m.targetX - player.x, mdy = m.targetY - player.y;
            if (Math.sqrt(mdx*mdx + mdy*mdy) < radius) {
              m.delay = Math.max(m.delay, 600);
            }
          }
        }
      }
      else if (d.type === 'tornado') {
        const tdx = d.x - player.x, tdy = d.y - player.y;
        const tdist = Math.sqrt(tdx*tdx + tdy*tdy);
        if (tdist < radius && tdist > 0) {
          d.x += (tdx / tdist) * 80;
          d.y += (tdy / tdist) * 80;
        }
      }
    }
    // Visual shockwave
    for (let i = 0; i < 40; i++) {
      const a = (i / 40) * Math.PI * 2;
      particles.push({
        x: player.x, y: player.y,
        vx: Math.cos(a) * 8, vy: Math.sin(a) * 8,
        radius: 4, color: '#aaaaaa', life: 30,
      });
    }
  }
  else if (char.ability === 'timestop') {
    timeStopActive = 240; // 4 sec
    playSound(440, 0.6, 'sine', 0.2);
    setTimeout(() => playSound(330, 0.4, 'sine', 0.2), 100);
    showFloatingText(player.x, player.y - 20, 'TIME STOP!', char.color, 90);
    flashEl.style.background = '#cc66ff';
    flashEl.style.opacity = '0.3';
    setTimeout(() => { flashEl.style.opacity = '0'; flashEl.style.background = '#fff'; }, 200);
  }
}

function drawPlayer() {
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, player.radius - 2, player.radius * 0.8, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  if (player.shielded || hasActivePower('shield')) {
    const sa = Math.sin(Date.now() * 0.01) * 0.2 + 0.8;
    ctx.strokeStyle = `rgba(0,221,255,${sa})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, player.radius + 8, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = `rgba(0,221,255,${sa * 0.15})`;
    ctx.beginPath();
    ctx.arc(0, 0, player.radius + 8, 0, Math.PI * 2);
    ctx.fill();
  }
  if (hasActivePower('speedBoost')) {
    ctx.strokeStyle = 'rgba(255,255,0,0.4)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, player.radius + 4, 0, Math.PI * 2);
    ctx.stroke();
  }
  if (player.invuln > 0 && !player.shielded && player.invuln % 6 < 3) ctx.globalAlpha = 0.4;

  const legSwing = player.isMoving ? Math.sin(player.walkFrame) * 4 : 0;
  ctx.fillStyle = '#1a3a5c';
  ctx.fillRect(-6, 4 + legSwing, 4, 8);
  ctx.fillRect(2, 4 - legSwing, 4, 8);
  ctx.fillStyle = player.character.bodyColor;
  ctx.fillRect(-7, -6, 14, 12);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  ctx.strokeRect(-7, -6, 14, 12);
  ctx.fillStyle = '#ffcc99';
  ctx.beginPath();
  ctx.arc(0, -10, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = player.character.hairColor;
  ctx.beginPath();
  ctx.arc(0, -12, 6, Math.PI, 0);
  ctx.fill();
  ctx.restore();
}

const biomes = {
  forest:   { name: 'FOREST',   ground: '#2d4a3e', detail: '#1f3528', accent: '#3a5a48' },
  desert:   { name: 'DESERT',   ground: '#c9a76d', detail: '#a8864b', accent: '#d9b87d' },

function generateBiome(name) {
  currentBiome = name;
  biomeEl.textContent = biomes[name].name;
  groundDecorations = [];
  for (let i = 0; i < 200; i++) {
    groundDecorations.push({ x: (i * 137.7) % W, y: (i * 241.3) % H, type: 'small' });
  }
  for (let i = 0; i < 100; i++) {
    groundDecorations.push({ x: (i * 197.1 + 50) % W, y: (i * 311.5 + 30) % H, type: 'big' });
  }
}

function changeBiome() {
  const names = Object.keys(biomes);
  let next;
  do { next = names[Math.floor(Math.random() * names.length)]; } while (next === currentBiome);
  generateBiome(next);
  showFloatingText(W/2, H/2 - 60, `→ ${biomes[next].name} →`, '#ffffff', 90);
}

function createEarthquake() {
  const cracks = [];
  const numCracks = 4 + Math.floor(Math.random() * 3) + Math.floor(difficultyLevel / 3);
  for (let i = 0; i < numCracks; i++) {
    cracks.push({
      x: Math.random() * W, y: Math.random() * H,
      angle: Math.random() * Math.PI * 2,
      length: 200 + Math.random() * 250,
      width: 30 + Math.random() * 25,
      growth: 0, maxGrowth: 1,
    });
  }
  return { type: 'earthquake', cracks, duration: 360, age: 0 };
}

function createVolcano() {
  const bombs = [];
  const numBombs = 25 + Math.floor(Math.random() * 15) + difficultyLevel * 2;
  for (let i = 0; i < numBombs; i++) {
    bombs.push({
      targetX: Math.random() * W, targetY: Math.random() * H,
      delay: Math.random() * 240,
      landed: false, shadowSize: 0, explosionFrame: 0,
    });
  }
  return { type: 'volcano', bombs, duration: 480, age: 0, pools: [] };
}

function createWildfire() {
  const edge = Math.floor(Math.random() * 4);
  const flames = [];
  const numFlames = 30;
  const gapSize = Math.max(0.12, 0.28 - difficultyLevel * 0.015);
  const gapStart = 0.15 + Math.random() * (0.7 - gapSize);
  const gapEnd = gapStart + gapSize;
  for (let i = 0; i < numFlames; i++) {
    const t = i / numFlames;
    if (t > gapStart && t < gapEnd) continue;
    let x, y, vx, vy;
    const speed = 1.0 + difficultyLevel * 0.05;
    if (edge === 0) { x = t * W; y = -20; vx = 0; vy = speed; }
    else if (edge === 1) { x = W + 20; y = t * H; vx = -speed; vy = 0; }
    else if (edge === 2) { x = t * W; y = H + 20; vx = 0; vy = -speed; }
    else { x = -20; y = t * H; vx = speed; vy = 0; }
    flames.push({ x, y, vx, vy, radius: 25 + Math.random() * 15, flicker: Math.random() * Math.PI * 2 });
  }
  return { type: 'wildfire', flames, duration: 540, age: 0, edge, gapStart, gapEnd };
}

function createTornado() {
