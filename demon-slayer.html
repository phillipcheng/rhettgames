<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEON FORTRESS — Tower Defense</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Major+Mono+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070d;
    --panel: #0e0e1a;
    --panel-2: #14142a;
    --grid: #1a1a35;
    --path: #2a1a3a;
    --neon-pink: #ff2bd6;
    --neon-cyan: #00ffe1;
    --neon-yellow: #ffe600;
    --neon-green: #39ff7a;
    --neon-red: #ff3860;
    --text: #e8e8ff;
    --muted: #6e6e9a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'VT323', monospace;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    background:
      radial-gradient(circle at 20% 0%, rgba(255, 43, 214, 0.08), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(0, 255, 225, 0.08), transparent 50%),
      var(--bg);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 8px;
    min-height: 100vh;
  }

  /* CRT scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0) 0,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.15) 3px,
      rgba(0,0,0,0) 4px
    );
    z-index: 9999;
    mix-blend-mode: multiply;
  }

  .app {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 12px;
    max-width: 1100px;
    width: 100%;
  }

  @media (max-width: 820px) {
    .app { grid-template-columns: 1fr; gap: 8px; }
    .sidebar { order: 2; }
    .hud { font-size: 16px; padding: 6px 10px; }
    .hud .stat .label { font-size: 10px; }
    .title { font-size: 18px; padding: 4px 0; }
    .title .sub { font-size: 11px; }
    .panel { padding: 8px; }
    .tower-btn { padding: 8px 4px; font-size: 14px; }
    .tower-btn .icon { font-size: 20px; }
    .tower-btn .name { font-size: 11px; }
    .tower-btn .cost { font-size: 12px; }
    .btn { padding: 8px; font-size: 16px; }
    .info-list { font-size: 14px; }
  }

  .stage {
    position: relative;
    background: var(--panel);
    border: 2px solid var(--panel-2);
    border-radius: 8px;
    box-shadow:
      0 0 0 1px rgba(255, 43, 214, 0.15),
      0 30px 60px rgba(0,0,0,0.7),
      inset 0 0 60px rgba(0, 255, 225, 0.04);
    overflow: hidden;
    aspect-ratio: 16 / 11;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    cursor: crosshair;
  }

  .hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 10px 14px;
    background: linear-gradient(180deg, rgba(7,7,13,0.95), rgba(7,7,13,0));
    pointer-events: none;
    font-size: 22px;
    letter-spacing: 1px;
    z-index: 5;
  }

  .hud .stat {
    display: flex;
    align-items: center;
    gap: 8px;
    text-shadow: 0 0 8px currentColor;
  }
  .hud .stat .label { color: var(--muted); font-size: 14px; letter-spacing: 2px; }
  .hud .lives { color: var(--neon-red); }
  .hud .gold { color: var(--neon-yellow); }
  .hud .wave { color: var(--neon-cyan); }
  .hud .score { color: var(--neon-pink); }

  /* Side panel */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .title {
    font-family: 'Major Mono Display', monospace;
    font-size: 24px;
    letter-spacing: 2px;
    line-height: 1;
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-align: center;
    padding: 8px 0;
    border-bottom: 2px dashed var(--panel-2);
  }
  .title .sub {
    display: block;
    font-family: 'VT323', monospace;
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--muted);
    margin-top: 4px;
    -webkit-text-fill-color: var(--muted);
  }

  .panel {
    background: var(--panel);
    border: 2px solid var(--panel-2);
    border-radius: 6px;
    padding: 10px;
  }

  .panel h3 {
    font-family: 'Major Mono Display', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--neon-cyan);
    margin-bottom: 8px;
    text-transform: lowercase;
  }

  .towers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .tower-btn {
    position: relative;
    background: var(--panel-2);
    border: 2px solid transparent;
    color: var(--text);
    padding: 10px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'VT323', monospace;
    font-size: 18px;
    text-align: center;
    transition: all 0.15s;
    line-height: 1.1;
  }
  .tower-btn:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.2); }
  .tower-btn.selected { border-color: var(--neon-pink); box-shadow: 0 0 14px rgba(255,43,214,0.5); }
  .tower-btn[disabled] { opacity: 0.4; cursor: not-allowed; transform: none; }
  .tower-btn .icon { font-size: 26px; display:block; margin-bottom: 2px; }
  .tower-btn .cost { color: var(--neon-yellow); font-size: 14px; }
  .tower-btn .name { font-size: 13px; letter-spacing: 1px; color: var(--muted); }

  .tower-btn[data-tower="gun"] .icon { color: var(--neon-cyan); }
  .tower-btn[data-tower="cannon"] .icon { color: var(--neon-pink); }
  .tower-btn[data-tower="laser"] .icon { color: var(--neon-green); }
  .tower-btn[data-tower="frost"] .icon { color: #66e0ff; }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .btn {
    background: var(--panel-2);
    border: 2px solid var(--panel-2);
    color: var(--text);
    padding: 10px;
    cursor: pointer;
    font-family: 'VT323', monospace;
    font-size: 18px;
    letter-spacing: 1px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }
  .btn.primary {
    background: linear-gradient(90deg, rgba(255,43,214,0.2), rgba(0,255,225,0.2));
    border-color: var(--neon-pink);
    color: var(--neon-pink);
  }
  .btn.primary:hover { box-shadow: 0 0 14px rgba(255,43,214,0.4); }

  .info-list {
    font-size: 16px;
    line-height: 1.4;
    color: var(--muted);
  }
  .info-list b { color: var(--text); }
  .info-list .key {
    display: inline-block;
    background: var(--panel-2);
    padding: 0 6px;
    border-radius: 3px;
    color: var(--neon-yellow);
  }

  /* Modal overlay (game over / victory) */
  .modal {
    position: absolute;
    inset: 0;
    background: rgba(7, 7, 13, 0.85);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    flex-direction: column;
    text-align: center;
    padding: 20px;
  }
  .modal.show { display: flex; animation: fadeIn 0.4s ease; }
  .modal h2 {
    font-family: 'Major Mono Display', monospace;
    font-size: 48px;
    letter-spacing: 4px;
    margin-bottom: 12px;
  }
  .modal.lose h2 { color: var(--neon-red); text-shadow: 0 0 20px var(--neon-red); }
  .modal.win h2 { color: var(--neon-green); text-shadow: 0 0 20px var(--neon-green); }
  .modal p { font-size: 22px; color: var(--muted); margin-bottom: 24px; }
  .modal .score-final { color: var(--neon-pink); font-size: 32px; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Floating cost preview */
  #costPreview {
    position: absolute;
    pointer-events: none;
    font-size: 16px;
    color: var(--neon-yellow);
    text-shadow: 0 0 4px var(--bg);
    z-index: 10;
    transform: translate(8px, -22px);
    display: none;
  }

  @media (max-width: 820px) {
    .modal h2 { font-size: 32px; }
    .modal p { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="stage" id="stage">
    <div class="hud">
      <div class="stat lives"><span class="label">LIVES</span><span id="lives">20</span></div>
      <div class="stat wave"><span class="label">WAVE</span><span id="wave">0</span>/15</div>
      <div class="stat gold"><span class="label">GOLD</span><span id="gold">150</span></div>
      <div class="stat score"><span class="label">SCORE</span><span id="score">0</span></div>
    </div>
    <canvas id="game"></canvas>
    <div id="costPreview"></div>
    <div class="modal" id="modal">
      <h2 id="modalTitle">GAME OVER</h2>
      <p id="modalMsg">The fortress has fallen.</p>
      <p class="score-final"><span id="modalScore">0</span> pts</p>
      <button class="btn primary" id="restart" style="margin-top:14px; width: 200px;">RESTART</button>
    </div>
  </div>

  <aside class="sidebar">
    <div class="title">
      Neon Fortress
      <span class="sub">// tower defense</span>
    </div>

    <div class="panel">
      <h3>// arsenal</h3>
      <div class="towers" id="towers">
        <button class="tower-btn" data-tower="gun">
          <span class="icon">▲</span>
          <span class="name">PULSE</span>
          <span class="cost">$50</span>
        </button>
        <button class="tower-btn" data-tower="cannon">
          <span class="icon">◆</span>
          <span class="name">MORTAR</span>
          <span class="cost">$120</span>
        </button>
        <button class="tower-btn" data-tower="laser">
          <span class="icon">✦</span>
          <span class="name">LASER</span>
          <span class="cost">$180</span>
        </button>
        <button class="tower-btn" data-tower="frost">
          <span class="icon">❄</span>
          <span class="name">FROST</span>
          <span class="cost">$90</span>
        </button>
      </div>
    </div>

    <div class="panel">
      <h3>// controls</h3>
      <div class="actions">
        <button class="btn primary" id="startWave">START WAVE</button>
        <button class="btn" id="speedBtn">SPEED ×1</button>
        <button class="btn" id="sellBtn">SELL MODE: OFF</button>
      </div>
    </div>

    <div class="panel">
      <h3>// info</h3>
      <div class="info-list">
        <p><b>Click</b> a tower, then place on grid.</p>
        <p><b>Click</b> a placed tower to upgrade.</p>
        <p><span class="key">SPACE</span> next wave</p>
        <p><span class="key">F</span> toggle speed</p>
        <p><span class="key">ESC</span> deselect</p>
      </div>
    </div>
  </aside>
</div>

<script>
/* ============================================================
   NEON FORTRESS — Tower Defense
   Single-file vanilla canvas implementation.
============================================================ */

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const stage = document.getElementById('stage');

// Logical resolution (game grid: 20 x 14 tiles, each 32px)
const TILE = 32;
const COLS = 20;
const ROWS = 14;
const W = COLS * TILE; // 640
const H = ROWS * TILE; // 448

// Hi-DPI scaling
function resizeCanvas() {
  const rect = stage.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

/* --------------------- PATH --------------------- */
// Waypoints in tile coordinates (centered).
// Snake-y path across the map.
const PATH_TILES = [
  [-1, 2], [4, 2], [4, 6], [9, 6], [9, 10], [14, 10],
  [14, 4], [18, 4], [18, 11], [COLS, 11]
];
const PATH = PATH_TILES.map(([c, r]) => ({ x: c * TILE + TILE/2, y: r * TILE + TILE/2 }));

// Mark which tiles are path-blocked
const blocked = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
function markPath() {
  for (let i = 0; i < PATH_TILES.length - 1; i++) {
    const [c1, r1] = PATH_TILES[i];
    const [c2, r2] = PATH_TILES[i+1];
    if (c1 === c2) {
      const [a, b] = [Math.min(r1,r2), Math.max(r1,r2)];
      for (let r = a; r <= b; r++) if (c1 >= 0 && c1 < COLS && r >=0 && r < ROWS) blocked[r][c1] = true;
    } else if (r1 === r2) {
      const [a, b] = [Math.min(c1,c2), Math.max(c1,c2)];
      for (let c = a; c <= b; c++) if (c >= 0 && c < COLS && r1 >=0 && r1 < ROWS) blocked[r1][c] = true;
    }
  }
}
markPath();

/* --------------------- STATE --------------------- */
const STATE = {
  lives: 20,
  gold: 150,
  score: 0,
  wave: 0,
  maxWave: 15,
  speed: 1,
  running: true,
  inWave: false,
  selectedTower: null, // tower type to place
  selectedPlaced: null, // existing tower selected for upgrade
  sellMode: false,
  enemiesToSpawn: [], // queue { type, delay }
  spawnTimer: 0,
  towers: [],
  enemies: [],
  projectiles: [],
  particles: [],
  lasers: [], // active laser beams (visual)
  mouse: { x: 0, y: 0, gx: 0, gy: 0, over: false },
  gameOver: false,
};

/* --------------------- TOWER DEFS --------------------- */
const TOWER_DEFS = {
  gun: {
    name: 'Pulse',
    cost: 50,
    range: 110,
    fireRate: 0.4, // seconds between shots
    damage: 10,
    color: '#00ffe1',
    projectile: { speed: 360, color: '#00ffe1', size: 3 },
    upgrades: [
      { cost: 60,  damage: 18, range: 130, fireRate: 0.32 },
      { cost: 120, damage: 32, range: 150, fireRate: 0.25 },
    ],
    shape: 'triangle',
  },
  cannon: {
    name: 'Mortar',
    cost: 120,
    range: 140,
    fireRate: 1.2,
    damage: 35,
    color: '#ff2bd6',
    projectile: { speed: 220, color: '#ff2bd6', size: 5, splash: 40 },
    upgrades: [
      { cost: 140, damage: 60, range: 160, fireRate: 1.0,  splash: 50 },
      { cost: 240, damage: 110, range: 180, fireRate: 0.85, splash: 65 },
    ],
    shape: 'diamond',
  },
  laser: {
    name: 'Laser',
    cost: 180,
    range: 130,
    fireRate: 0.05, // continuous-ish
    damage: 60, // damage per second
    color: '#39ff7a',
    beam: true,
    upgrades: [
      { cost: 200, damage: 110, range: 150 },
      { cost: 350, damage: 200, range: 170 },
    ],
    shape: 'star',
  },
  frost: {
    name: 'Frost',
    cost: 90,
    range: 100,
    fireRate: 0.6,
    damage: 5,
    slow: 0.5, // multiplier applied to enemy speed
    slowDuration: 1.5,
    color: '#66e0ff',
    projectile: { speed: 300, color: '#aef0ff', size: 4 },
    upgrades: [
      { cost: 100, damage: 10, range: 120, slow: 0.4, slowDuration: 2.0 },
      { cost: 180, damage: 20, range: 140, slow: 0.3, slowDuration: 2.5 },
    ],
    shape: 'snowflake',
  },
};

/* --------------------- ENEMY DEFS --------------------- */
const ENEMY_DEFS = {
  grunt:  { hp: 30,  speed: 60,  reward: 6,  color: '#ff8a3d', size: 10 },
  fast:   { hp: 18,  speed: 110, reward: 7,  color: '#ffe600', size: 8  },
  tank:   { hp: 140, speed: 35,  reward: 18, color: '#7a4dff', size: 14 },
  swarm:  { hp: 12,  speed: 80,  reward: 3,  color: '#39ff7a', size: 7  },
  boss:   { hp: 800, speed: 30,  reward: 80, color: '#ff3860', size: 20 },
};

/* --------------------- WAVES --------------------- */
function makeWaves() {
  // Each wave is array of { type, delay (seconds before this enemy spawns relative to previous) }
  const W = [];
  // 1
  W.push(spawnList([['grunt', 8, 0.8]]));
  // 2
  W.push(spawnList([['grunt', 12, 0.7]]));
  // 3
  W.push(spawnList([['grunt', 6, 0.7], ['fast', 6, 0.5]]));
  // 4
  W.push(spawnList([['fast', 14, 0.45]]));
  // 5
  W.push(spawnList([['grunt', 8, 0.6], ['tank', 2, 1.5]]));
  // 6
  W.push(spawnList([['swarm', 25, 0.25]]));
  // 7
  W.push(spawnList([['fast', 10, 0.4], ['tank', 4, 1.2]]));
  // 8
  W.push(spawnList([['grunt', 12, 0.5], ['fast', 8, 0.4], ['tank', 3, 1.0]]));
  // 9
  W.push(spawnList([['swarm', 30, 0.2], ['tank', 4, 1.0]]));
  // 10 - mini boss
  W.push(spawnList([['boss', 1, 0], ['grunt', 10, 0.4]]));
  // 11
  W.push(spawnList([['fast', 20, 0.3], ['tank', 5, 0.8]]));
  // 12
  W.push(spawnList([['tank', 12, 0.7]]));
  // 13
  W.push(spawnList([['swarm', 40, 0.18], ['fast', 15, 0.3]]));
  // 14
  W.push(spawnList([['grunt', 15, 0.4], ['tank', 8, 0.7], ['fast', 15, 0.3]]));
  // 15 - final
  W.push(spawnList([['boss', 2, 0.5], ['tank', 10, 0.7], ['fast', 20, 0.25], ['boss', 1, 1]]));
  return W;
}
function spawnList(groups) {
  const list = [];
  for (const [type, count, delay] of groups) {
    for (let i = 0; i < count; i++) list.push({ type, delay });
  }
  return list;
}
const WAVES = makeWaves();

/* --------------------- HELPERS --------------------- */
const dist = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);
const lerp = (a,b,t) => a + (b-a)*t;

function pixelToTile(px, py) {
  return { c: Math.floor(px / TILE), r: Math.floor(py / TILE) };
}
function tileCenter(c, r) {
  return { x: c*TILE + TILE/2, y: r*TILE + TILE/2 };
}
function canPlace(c, r) {
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return false;
  if (blocked[r][c]) return false;
  if (STATE.towers.some(t => t.c === c && t.r === r)) return false;
  return true;
}

/* --------------------- ENEMY --------------------- */
class Enemy {
  constructor(type) {
    const def = ENEMY_DEFS[type];
    // Scale HP a bit by wave for difficulty
    const hpScale = 1 + STATE.wave * 0.08;
    this.type = type;
    this.def = def;
    this.maxHp = Math.floor(def.hp * hpScale);
    this.hp = this.maxHp;
    this.speed = def.speed;
    this.baseSpeed = def.speed;
    this.color = def.color;
    this.size = def.size;
    this.reward = def.reward;
    this.alive = true;
    this.pathIdx = 0;
    this.x = PATH[0].x;
    this.y = PATH[0].y;
    this.slowTimer = 0;
    this.slowFactor = 1;
    this.flash = 0;
  }
  update(dt) {
    if (!this.alive) return;
    if (this.slowTimer > 0) {
      this.slowTimer -= dt;
      if (this.slowTimer <= 0) this.slowFactor = 1;
    }
    if (this.flash > 0) this.flash -= dt;

    const next = PATH[this.pathIdx + 1];
    if (!next) {
      // Reached end
      this.alive = false;
      STATE.lives = Math.max(0, STATE.lives - 1);
      if (STATE.lives <= 0) endGame(false);
      return;
    }
    const dx = next.x - this.x;
    const dy = next.y - this.y;
    const d = Math.hypot(dx, dy);
    const step = this.speed * this.slowFactor * dt;
    if (step >= d) {
      this.x = next.x; this.y = next.y;
      this.pathIdx++;
    } else {
      this.x += (dx/d) * step;
      this.y += (dy/d) * step;
    }
  }
  damage(amt) {
    this.hp -= amt;
    this.flash = 0.08;
    if (this.hp <= 0 && this.alive) {
      this.alive = false;
      STATE.gold += this.reward;
      STATE.score += this.reward * 2;
      spawnExplosion(this.x, this.y, this.color, 14);
    }
  }
  applySlow(factor, dur) {
    if (factor < this.slowFactor || this.slowTimer <= 0) {
      this.slowFactor = factor;
      this.slowTimer = dur;
    }
  }
  draw() {
    // Body - chunky pixel-y diamond/blob
    const s = this.size;
    ctx.save();
    ctx.translate(this.x, this.y);

    // Glow
    ctx.shadowBlur = 14;
    ctx.shadowColor = this.color;

    if (this.type === 'boss') {
      // Boss: hexagon
      ctx.fillStyle = this.flash > 0 ? '#fff' : this.color;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI/3)*i + Math.PI/6;
        const x = Math.cos(a)*s, y = Math.sin(a)*s;
        if (i === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    } else if (this.type === 'fast') {
      ctx.fillStyle = this.flash > 0 ? '#fff' : this.color;
      ctx.beginPath();
      ctx.moveTo(s, 0); ctx.lineTo(-s*0.6, s*0.8); ctx.lineTo(-s*0.3, 0); ctx.lineTo(-s*0.6, -s*0.8);
      ctx.closePath(); ctx.fill();
    } else if (this.type === 'tank') {
      ctx.fillStyle = this.flash > 0 ? '#fff' : this.color;
      ctx.fillRect(-s, -s*0.7, s*2, s*1.4);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.strokeRect(-s, -s*0.7, s*2, s*1.4);
    } else if (this.type === 'swarm') {
      ctx.fillStyle = this.flash > 0 ? '#fff' : this.color;
      ctx.beginPath();
      ctx.arc(0,0,s,0,Math.PI*2);
      ctx.fill();
    } else { // grunt
      ctx.fillStyle = this.flash > 0 ? '#fff' : this.color;
      ctx.beginPath();
      ctx.moveTo(0,-s); ctx.lineTo(s,0); ctx.lineTo(0,s); ctx.lineTo(-s,0);
      ctx.closePath(); ctx.fill();
    }

    // Slow tint
    if (this.slowTimer > 0) {
      ctx.fillStyle = 'rgba(102,224,255,0.35)';
      ctx.beginPath(); ctx.arc(0,0,s+2,0,Math.PI*2); ctx.fill();
    }

    ctx.restore();

    // HP bar
    const barW = s*2.2;
    const barH = 3;
    const px = this.x - barW/2;
    const py = this.y - s - 8;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(px, py, barW, barH);
    const pct = Math.max(0, this.hp / this.maxHp);
    ctx.fillStyle = pct > 0.5 ? '#39ff7a' : pct > 0.25 ? '#ffe600' : '#ff3860';
    ctx.fillRect(px, py, barW * pct, barH);
  }
}

/* --------------------- TOWER --------------------- */
class Tower {
  constructor(type, c, r) {
    this.type = type;
    this.def = TOWER_DEFS[type];
    this.c = c; this.r = r;
    const center = tileCenter(c, r);
    this.x = center.x; this.y = center.y;
    this.level = 0; // upgrade level
    this.range = this.def.range;
    this.damage = this.def.damage;
    this.fireRate = this.def.fireRate;
    this.cooldown = 0;
    this.angle = -Math.PI/2;
    this.target = null;
    this.totalCost = this.def.cost;
    // frost-specific
    this.slow = this.def.slow;
    this.slowDuration = this.def.slowDuration;
    // cannon-specific
    this.splash = this.def.projectile?.splash || 0;
    this.kills = 0;
    this.pulse = 0;
  }
  upgrade() {
    const u = this.def.upgrades[this.level];
    if (!u) return false;
    if (STATE.gold < u.cost) return false;
    STATE.gold -= u.cost;
    this.totalCost += u.cost;
    if (u.damage)       this.damage = u.damage;
    if (u.range)        this.range = u.range;
    if (u.fireRate)     this.fireRate = u.fireRate;
    if (u.slow)         this.slow = u.slow;
    if (u.slowDuration) this.slowDuration = u.slowDuration;
    if (u.splash)       this.splash = u.splash;
    this.level++;
    spawnExplosion(this.x, this.y, this.def.color, 10);
    return true;
  }
  sellValue() {
    return Math.floor(this.totalCost * 0.6);
  }
  update(dt) {
    this.cooldown -= dt;
    this.pulse += dt;

    // Find target (closest in range, prioritize furthest along path)
    let best = null, bestProgress = -1;
    for (const e of STATE.enemies) {
      if (!e.alive) continue;
      const d = dist(this, e);
      if (d <= this.range) {
        const progress = e.pathIdx + (1 - dist({x:e.x,y:e.y}, PATH[Math.min(e.pathIdx+1, PATH.length-1)]) / 1000);
        if (progress > bestProgress) { bestProgress = progress; best = e; }
      }
    }
    this.target = best;

    if (best) {
      const desired = Math.atan2(best.y - this.y, best.x - this.x);
      // smooth rotate
      let diff = desired - this.angle;
      while (diff > Math.PI) diff -= Math.PI*2;
      while (diff < -Math.PI) diff += Math.PI*2;
      this.angle += diff * Math.min(1, dt*10);

      if (this.def.beam) {
        // Continuous laser
        best.damage(this.damage * dt);
        STATE.lasers.push({ x1: this.x, y1: this.y, x2: best.x, y2: best.y, color: this.def.color });
        if (Math.random() < 0.4) spawnExplosion(best.x, best.y, this.def.color, 1);
      } else if (this.cooldown <= 0) {
        this.cooldown = this.fireRate;
        this.fire(best);
      }
    }
  }
  fire(target) {
    const proj = this.def.projectile;
    STATE.projectiles.push(new Projectile({
      x: this.x, y: this.y,
      target,
      speed: proj.speed,
      color: proj.color,
      size: proj.size,
      damage: this.damage,
      splash: this.splash,
      slow: this.type === 'frost' ? this.slow : 0,
      slowDuration: this.type === 'frost' ? this.slowDuration : 0,
      fromType: this.type,
    }));
    spawnExplosion(this.x + Math.cos(this.angle)*16, this.y + Math.sin(this.angle)*16, proj.color, 4);
  }
  draw(showRange) {
    // Base
    ctx.save();
    ctx.translate(this.x, this.y);
    // platform
    ctx.fillStyle = '#1a1a35';
    ctx.fillRect(-13, -13, 26, 26);
    ctx.strokeStyle = this.def.color;
    ctx.lineWidth = 1.5;
    ctx.shadowBlur = 8;
    ctx.shadowColor = this.def.color;
    ctx.strokeRect(-13, -13, 26, 26);

    // upgrade pips
    for (let i = 0; i < this.level; i++) {
      ctx.fillStyle = this.def.color;
      ctx.fillRect(-12 + i*5, -12, 3, 3);
    }

    // turret
    ctx.rotate(this.angle);
    ctx.fillStyle = this.def.color;
    ctx.shadowBlur = 12;
    if (this.type === 'gun') {
      ctx.fillRect(0, -2, 14, 4);
      ctx.beginPath();
      ctx.moveTo(-6, -6); ctx.lineTo(6, 0); ctx.lineTo(-6, 6); ctx.closePath();
      ctx.fill();
    } else if (this.type === 'cannon') {
      ctx.fillRect(0, -3, 12, 6);
      ctx.beginPath();
      ctx.arc(0, 0, 8, 0, Math.PI*2);
      ctx.fill();
    } else if (this.type === 'laser') {
      ctx.fillRect(0, -2, 16, 4);
      // crystal head
      ctx.beginPath();
      const r = 6;
      for (let i=0;i<4;i++){
        const a = (Math.PI/2)*i;
        const x = Math.cos(a)*r, y = Math.sin(a)*r;
        if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.closePath();
      ctx.fill();
    } else if (this.type === 'frost') {
      ctx.fillRect(0, -2, 12, 4);
      // snowflake head
      ctx.strokeStyle = this.def.color;
      ctx.lineWidth = 2;
      for (let i=0;i<3;i++) {
        ctx.save();
        ctx.rotate((Math.PI/3)*i);
        ctx.beginPath(); ctx.moveTo(-7,0); ctx.lineTo(7,0); ctx.stroke();
        ctx.restore();
      }
    }

    ctx.restore();

    // range indicator
    if (showRange) {
      ctx.strokeStyle = this.def.color + '88';
      ctx.fillStyle = this.def.color + '11';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(this.x, this.y, this.range, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
    }
  }
}

/* --------------------- PROJECTILE --------------------- */
class Projectile {
  constructor(opts) {
    Object.assign(this, opts);
    // pre-aim
    const dx = this.target.x - this.x, dy = this.target.y - this.y;
    const d = Math.hypot(dx, dy) || 1;
    this.vx = dx/d * this.speed;
    this.vy = dy/d * this.speed;
    this.life = 2;
    this.alive = true;
  }
  update(dt) {
    this.life -= dt;
    if (this.life <= 0) { this.alive = false; return; }

    // Home slightly toward target if alive
    if (this.target && this.target.alive) {
      const dx = this.target.x - this.x, dy = this.target.y - this.y;
      const d = Math.hypot(dx,dy) || 1;
      const desiredVx = dx/d * this.speed;
      const desiredVy = dy/d * this.speed;
      const homing = this.fromType === 'cannon' ? 2 : 6;
      this.vx = lerp(this.vx, desiredVx, Math.min(1, dt*homing));
      this.vy = lerp(this.vy, desiredVy, Math.min(1, dt*homing));
    }

    this.x += this.vx * dt;
    this.y += this.vy * dt;

    // Hit detection
    for (const e of STATE.enemies) {
      if (!e.alive) continue;
      if (dist(this, e) < e.size + this.size) {
        this.hit(e);
        return;
      }
    }
    // out of bounds
    if (this.x < -20 || this.x > W+20 || this.y < -20 || this.y > H+20) this.alive = false;
  }
  hit(primary) {
    this.alive = false;
    if (this.splash > 0) {
      // AoE
      for (const e of STATE.enemies) {
        if (!e.alive) continue;
        const d = dist(this, e);
        if (d <= this.splash) {
          const falloff = 1 - (d / this.splash) * 0.5;
          e.damage(this.damage * falloff);
          if (this.slow > 0) e.applySlow(this.slow, this.slowDuration);
        }
      }
      spawnExplosion(this.x, this.y, this.color, 22);
    } else {
      primary.damage(this.damage);
      if (this.slow > 0) primary.applySlow(this.slow, this.slowDuration);
      spawnExplosion(this.x, this.y, this.color, 6);
    }
  }
  draw() {
    ctx.save();
    ctx.shadowBlur = 12;
    ctx.shadowColor = this.color;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

/* --------------------- PARTICLES --------------------- */
function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 30 + Math.random() * 90;
    STATE.particles.push({
      x, y,
      vx: Math.cos(a)*sp,
      vy: Math.sin(a)*sp,
      life: 0.3 + Math.random()*0.4,
      maxLife: 0.6,
      color,
      size: 1 + Math.random()*2,
    });
  }
}
function updateParticles(dt) {
  for (let i = STATE.particles.length - 1; i >= 0; i--) {
    const p = STATE.particles[i];
    p.life -= dt;
    if (p.life <= 0) { STATE.particles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.96;
    p.vy *= 0.96;
  }
}
function drawParticles() {
  for (const p of STATE.particles) {
    const a = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 8; ctx.shadowColor = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

/* --------------------- BACKGROUND --------------------- */
function drawBackground() {
  // base
  ctx.fillStyle = '#07070d';
  ctx.fillRect(0, 0, W, H);

  // grid
  ctx.strokeStyle = '#14142a';
  ctx.lineWidth = 1;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(c*TILE + 0.5, 0);
    ctx.lineTo(c*TILE + 0.5, H);
    ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(0, r*TILE + 0.5);
    ctx.lineTo(W, r*TILE + 0.5);
    ctx.stroke();
  }

  // path background
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (blocked[r][c]) {
        ctx.fillStyle = '#1a0e2a';
        ctx.fillRect(c*TILE, r*TILE, TILE, TILE);
      }
    }
  }

  // path glow line
  ctx.strokeStyle = '#ff2bd6';
  ctx.lineWidth = 2;
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#ff2bd6';
  ctx.beginPath();
  for (let i = 0; i < PATH.length; i++) {
    const p = PATH[i];
    if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // animated dashes along path
  ctx.strokeStyle = '#00ffe1';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 8]);
  ctx.lineDashOffset = -performance.now() * 0.05;
  ctx.beginPath();
  for (let i = 0; i < PATH.length; i++) {
    const p = PATH[i];
    if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // entry / exit markers
  const start = PATH[0], end = PATH[PATH.length-1];
  ctx.fillStyle = '#39ff7a';
  ctx.shadowBlur = 14; ctx.shadowColor = '#39ff7a';
  ctx.fillRect(start.x - 6, start.y - 16, 12, 32);
  ctx.fillStyle = '#ff3860';
  ctx.shadowColor = '#ff3860';
  ctx.fillRect(end.x - 6, end.y - 16, 12, 32);
  ctx.shadowBlur = 0;
}

/* --------------------- INPUT --------------------- */
function getMouse(evt) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const x = (evt.clientX - rect.left) * scaleX;
  const y = (evt.clientY - rect.top) * scaleY;
  return { x, y };
}

canvas.addEventListener('mousemove', (e) => {
  const { x, y } = getMouse(e);
  STATE.mouse.x = x; STATE.mouse.y = y;
  const t = pixelToTile(x, y);
  STATE.mouse.gx = t.c; STATE.mouse.gy = t.r;
  STATE.mouse.over = true;

  const cp = document.getElementById('costPreview');
  if (STATE.selectedTower) {
    cp.style.display = 'block';
    cp.style.left = e.clientX - stage.getBoundingClientRect().left + 'px';
    cp.style.top  = e.clientY - stage.getBoundingClientRect().top + 'px';
    cp.textContent = '$' + TOWER_DEFS[STATE.selectedTower].cost;
    cp.style.color = canPlace(t.c, t.r) && STATE.gold >= TOWER_DEFS[STATE.selectedTower].cost ? '#ffe600' : '#ff3860';
  } else {
    cp.style.display = 'none';
  }
});
canvas.addEventListener('mouseleave', () => { STATE.mouse.over = false; document.getElementById('costPreview').style.display='none'; });

canvas.addEventListener('click', (e) => {
  if (STATE.gameOver) return;
  const { x, y } = getMouse(e);
  const t = pixelToTile(x, y);

  // Sell mode
  if (STATE.sellMode) {
    const tw = STATE.towers.find(tw => tw.c === t.c && tw.r === t.r);
    if (tw) {
      STATE.gold += tw.sellValue();
      STATE.towers = STATE.towers.filter(x => x !== tw);
      spawnExplosion(tw.x, tw.y, tw.def.color, 16);
    }
    return;
  }

  // Place tower
  if (STATE.selectedTower) {
    const def = TOWER_DEFS[STATE.selectedTower];
    if (canPlace(t.c, t.r) && STATE.gold >= def.cost) {
      STATE.gold -= def.cost;
      const tower = new Tower(STATE.selectedTower, t.c, t.r);
      STATE.towers.push(tower);
      spawnExplosion(tower.x, tower.y, def.color, 12);
      // keep selected for rapid placement
    }
    return;
  }

  // Click existing tower → upgrade or select
  const tw = STATE.towers.find(tw => tw.c === t.c && tw.r === t.r);
  if (tw) {
    if (STATE.selectedPlaced === tw) {
      // try upgrade
      if (!tw.upgrade()) {
        // not enough gold or maxed
      }
    } else {
      STATE.selectedPlaced = tw;
    }
    return;
  }

  STATE.selectedPlaced = null;
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); startWave(); }
  if (e.code === 'Escape') { selectTower(null); STATE.selectedPlaced = null; STATE.sellMode = false; updateUI(); }
  if (e.code === 'KeyF') toggleSpeed();
  if (e.code === 'Digit1') selectTower('gun');
  if (e.code === 'Digit2') selectTower('cannon');
  if (e.code === 'Digit3') selectTower('laser');
  if (e.code === 'Digit4') selectTower('frost');
});

// Tower buttons
document.querySelectorAll('.tower-btn').forEach(btn => {
  btn.addEventListener('click', () => selectTower(btn.dataset.tower));
});
function selectTower(type) {
  STATE.selectedTower = STATE.selectedTower === type ? null : type;
  STATE.selectedPlaced = null;
  STATE.sellMode = false;
  document.querySelectorAll('.tower-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.tower === STATE.selectedTower);
  });
  document.getElementById('sellBtn').textContent = 'SELL MODE: OFF';
}

document.getElementById('startWave').addEventListener('click', startWave);
document.getElementById('speedBtn').addEventListener('click', toggleSpeed);
document.getElementById('sellBtn').addEventListener('click', () => {
  STATE.sellMode = !STATE.sellMode;
  STATE.selectedTower = null;
  document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('sellBtn').textContent = 'SELL MODE: ' + (STATE.sellMode ? 'ON' : 'OFF');
});
document.getElementById('restart').addEventListener('click', () => location.reload());

function toggleSpeed() {
  STATE.speed = STATE.speed === 1 ? 2 : STATE.speed === 2 ? 3 : 1;
  document.getElementById('speedBtn').textContent = 'SPEED ×' + STATE.speed;
}

/* --------------------- WAVE LOGIC --------------------- */
function startWave() {
  if (STATE.gameOver) return;
  if (STATE.inWave) return;
  if (STATE.wave >= WAVES.length) return;
  STATE.wave++;
  STATE.inWave = true;
  STATE.enemiesToSpawn = WAVES[STATE.wave - 1].slice();
  STATE.spawnTimer = 0;
  // Bonus gold for starting early
  STATE.gold += 10 + STATE.wave * 2;
  updateUI();
}

function updateWave(dt) {
  if (!STATE.inWave) return;
  if (STATE.enemiesToSpawn.length > 0) {
    STATE.spawnTimer -= dt;
    if (STATE.spawnTimer <= 0) {
      const e = STATE.enemiesToSpawn.shift();
      STATE.enemies.push(new Enemy(e.type));
      STATE.spawnTimer = e.delay;
    }
  } else if (STATE.enemies.every(e => !e.alive)) {
    STATE.inWave = false;
    if (STATE.wave >= WAVES.length) endGame(true);
  }
}

/* --------------------- UI --------------------- */
function updateUI() {
  document.getElementById('lives').textContent = STATE.lives;
  document.getElementById('gold').textContent = STATE.gold;
  document.getElementById('wave').textContent = STATE.wave;
  document.getElementById('score').textContent = STATE.score;

  // disable towers we can't afford
  document.querySelectorAll('.tower-btn').forEach(b => {
    const c = TOWER_DEFS[b.dataset.tower].cost;
    b.disabled = STATE.gold < c;
  });

  document.getElementById('startWave').textContent =
    STATE.inWave ? 'WAVE IN PROGRESS' :
    STATE.wave >= WAVES.length ? 'ALL WAVES DONE' :
    'START WAVE ' + (STATE.wave + 1);
  document.getElementById('startWave').disabled = STATE.inWave || STATE.wave >= WAVES.length;
}

function endGame(victory) {
  STATE.gameOver = true;
  STATE.running = false;
  const m = document.getElementById('modal');
  m.classList.add('show');
  m.classList.toggle('win', victory);
  m.classList.toggle('lose', !victory);
  document.getElementById('modalTitle').textContent = victory ? 'VICTORY' : 'DEFEAT';
  document.getElementById('modalMsg').textContent = victory
    ? 'The fortress holds. The grid is yours.'
    : 'The signal has fallen. Try again, operative.';
  document.getElementById('modalScore').textContent = STATE.score;
}

/* --------------------- RENDER LOOP --------------------- */
let lastTime = performance.now();
function loop(now) {
  let dt = (now - lastTime) / 1000;
  lastTime = now;
  if (dt > 0.1) dt = 0.1;
  if (STATE.running) {
    const stepDt = dt * STATE.speed;
    STATE.lasers.length = 0;
    updateWave(stepDt);
    for (const t of STATE.towers) t.update(stepDt);
    for (const e of STATE.enemies) e.update(stepDt);
    for (const p of STATE.projectiles) p.update(stepDt);
    STATE.enemies = STATE.enemies.filter(e => e.alive || e.flash > 0);
    STATE.projectiles = STATE.projectiles.filter(p => p.alive);
    updateParticles(stepDt);
  }

  // Render
  drawBackground();

  // Hover preview tile
  if (STATE.mouse.over && STATE.selectedTower) {
    const t = pixelToTile(STATE.mouse.x, STATE.mouse.y);
    if (t.c >= 0 && t.c < COLS && t.r >= 0 && t.r < ROWS) {
      const def = TOWER_DEFS[STATE.selectedTower];
      const ok = canPlace(t.c, t.r) && STATE.gold >= def.cost;
      ctx.fillStyle = ok ? def.color + '33' : '#ff386033';
      ctx.fillRect(t.c*TILE, t.r*TILE, TILE, TILE);
      ctx.strokeStyle = ok ? def.color : '#ff3860';
      ctx.lineWidth = 2;
      ctx.strokeRect(t.c*TILE+1, t.r*TILE+1, TILE-2, TILE-2);
      // range preview
      const center = tileCenter(t.c, t.r);
      ctx.strokeStyle = def.color + '88';
      ctx.fillStyle = def.color + '11';
      ctx.beginPath(); ctx.arc(center.x, center.y, def.range, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
    }
  }

  // Sell hover
  if (STATE.mouse.over && STATE.sellMode) {
    const t = pixelToTile(STATE.mouse.x, STATE.mouse.y);
    const tw = STATE.towers.find(x => x.c === t.c && x.r === t.r);
    if (tw) {
      ctx.fillStyle = '#ff386033';
      ctx.fillRect(t.c*TILE, t.r*TILE, TILE, TILE);
      ctx.strokeStyle = '#ff3860';
      ctx.lineWidth = 2;
      ctx.strokeRect(t.c*TILE+1, t.r*TILE+1, TILE-2, TILE-2);
    }
  }

  // Towers
  for (const t of STATE.towers) {
    t.draw(t === STATE.selectedPlaced);
  }

  // Lasers
  for (const l of STATE.lasers) {
    ctx.save();
    ctx.strokeStyle = l.color;
    ctx.lineWidth = 3;
    ctx.shadowBlur = 16; ctx.shadowColor = l.color;
    ctx.globalAlpha = 0.85;
    ctx.beginPath(); ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2);
    ctx.stroke();
    ctx.lineWidth = 1;
    ctx.strokeStyle = '#fff';
    ctx.stroke();
    ctx.restore();
  }

  // Enemies
  for (const e of STATE.enemies) e.draw();

  // Projectiles
  for (const p of STATE.projectiles) p.draw();

  // Particles
  drawParticles();

  // Tower upgrade panel (selected placed tower)
  if (STATE.selectedPlaced) {
    const t = STATE.selectedPlaced;
    const u = t.def.upgrades[t.level];
    const canUp = u && STATE.gold >= u.cost;
    const sellV = t.sellValue();

    const px = Math.min(W - 160, t.x + 20);
    const py = Math.max(8, t.y - 60);
    ctx.fillStyle = 'rgba(14,14,26,0.92)';
    ctx.fillRect(px, py, 150, 60);
    ctx.strokeStyle = t.def.color;
    ctx.lineWidth = 1;
    ctx.strokeRect(px+0.5, py+0.5, 150, 60);

    ctx.fillStyle = t.def.color;
    ctx.font = '16px VT323, monospace';
    ctx.fillText(t.def.name.toUpperCase() + ' Lv.' + (t.level+1), px+8, py+18);

    ctx.fillStyle = '#e8e8ff';
    ctx.font = '14px VT323, monospace';
    ctx.fillText('DMG ' + Math.round(t.damage) + '  RNG ' + Math.round(t.range), px+8, py+34);

    if (u) {
      ctx.fillStyle = canUp ? '#ffe600' : '#ff3860';
      ctx.fillText('Click again: UPGRADE $' + u.cost, px+8, py+50);
    } else {
      ctx.fillStyle = '#39ff7a';
      ctx.fillText('MAX LEVEL — sell $' + sellV, px+8, py+50);
    }
  }

  updateUI();
  requestAnimationFrame(loop);
}

requestAnimationFrame((t) => { lastTime = t; loop(t); });
</script>
</body>
</html>
