    "<div class='helpcard'><h3>Barbarians ☠️</h3><p>Raiders emerge from the wilderness and attack nearby units and cities. They can't capture cities, but they'll pillage and kill — keep a defender close to your borders and patrol with scouts.</p></div>"+
    "<div class='helpcard'><h3>The Bomb \u2622\uFE0F</h3><p>Race for the <span class='k'>Manhattan Project</span> wonder (Industrialization) \u2014 only its owner may ever build the <span class='k'>Atomic Bomb</span>. Walk one within 2 tiles of an enemy city and <span class='k'>DETONATE</span>: everything in the blast dies, the city's defenses turn to ash (\u22123 pop), and the land is scorched bare. Every nation loses 2 favor with you \u2014 the world never forgets. If a rival wins the race, at least no bombs will ever fall.</p></div>"+
    "<div class='helpcard'><h3>Espionage \uD83D\uDD75\uFE0F</h3><p>Banking unlocks the <span class='k'>Spy</span>. Slip one beside any rival city and choose: <span class='k'>Steal Technology</span> (a random tech they know and you don't) or <span class='k'>Siphon Gold</span> (30% of their treasury, up to 80g). 70% success, then 6 turns lying low \u2014 but get <span class='k'>caught</span> (30%) and the spy dies in a scandal costing 2 favor.</p></div>"+
    "<div class='helpcard'><h3>Undo Move \u21A9\uFE0F</h3><p>Fat-fingered a move? Select the unit and tap <span class='k'>Undo Move</span> \u2014 it returns exactly where it stood with its movement refunded. Works until the unit acts, and never after grabbing ruins or camps (no take-backs on treasure).</p></div>"+
    "<div class='helpcard'><h3>Naval Warfare \u26F5</h3><p>Coastal cities build <span class='k'>Galleys</span> (Pottery) and ranged <span class='k'>Frigates</span> (Gunpowder) that rule the waves and bombard the shore. Your land units can <span class='k'>embark</span>: simply move onto water \uD83D\uDEF6 \u2014 they sail slowly, cannot fight, and defend poorly, so escort them. Settle islands, raid coasts, own the ocean.</p></div>"+
    "<div class='helpcard'><h3>Religion \u26EA</h3><p>Your first <span class='k'>Temple</span> founds a Religion \u2014 choose a belief: <span class='k'>God of War</span> (+15% strength near your cities), <span class='k'>Harvest Goddess</span> (farms +1 food), or <span class='k'>Sacred Forge</span> (mines +1 prod). Every faithful city pays: your own <span class='k'>+1 culture/turn</span>, foreign ones <span class='k'>+2 gold/turn</span>. Build <span class='k'>Missionaries</span> (Writing) and spread the word \u2014 converting a city-state also earns +10 influence.</p></div>"+
    "<div class='helpcard'><h3>The Horde \uD83D\uDC79</h3><p>Around turn 34 the barbarian tribes unite under a named <span class='k'>Warlord</span> \u2B50 who raids every empire and spawns raiders endlessly. Slay him for <span class='k'>+150 gold and +1 favor with every nation</span> \u2014 the world remembers its savior. Ignore him at your peril.</p></div>"+
    "<div class='helpcard'><h3>World Congress \uD83C\uDFDB\uFE0F</h3><p>Every <span class='k'>15 turns</span> the nations convene. Your voting bloc = your empire + <span class='k'>city-state allies</span> + <span class='k'>friends (favor 2+)</span> + <span class='k'>vassals</span>. The biggest bloc is crowned <span class='k'>Host</span> (+1 point, +50 gold) and, if that's you, <span class='k'>chooses the world resolution</span>. Host <span class='k'>3 sessions</span> to claim the <span class='k'>Diplomatic Victory</span> \u2014 but rivals earn points too.</p></div>"+
    "<div class='helpcard'><h3>Vassal States \uD83D\uDC51</h3><p>Crush an enemy in war and <span class='k'>demand vassalage</span> \u2014 from the peace-offer popup or the Diplomacy panel when you're overwhelming. A vassal pays <span class='k'>tribute every turn</span>, <span class='k'>fights all your wars</span>, votes for you in Congress, never attacks you, and doesn't block your conquest victory. But stay strong \u2014 a vassal mightier than its master may <span class='k'>rebel</span>. Release one anytime for +2 favor.</p></div>"+
    "<div class='helpcard'><h3>Automation \uD83E\uDD16</h3><p>Toggle <span class='k'>Auto-Improve</span> on a worker and it develops your empire by itself every turn, forever. Toggle <span class='k'>Auto-Explore</span> on a scout and it hunts the fog for ruins and wonders on its own. Tap the toggle again for manual control.</p></div>"+
    "<div class='helpcard'><h3>Pillage & Plunder \uD83D\uDD25</h3><p>March a military unit onto an enemy <span class='k'>farm, mine, pasture, or road</span> while at war and <span class='k'>pillage</span> it: the improvement burns, you loot gold, and your unit <span class='k'>heals +20</span>. War finally starves the enemy economy. Beware \u2014 barbarians burn improvements they cross too.</p></div>"+
    "<div class='helpcard'><h3>Corps & Armies \u2694</h3><p>Two identical units side by side can <span class='k'>merge</span>: normal + normal forms a <span class='k'>Corps (+50% strength)</span>; merge again for an <span class='k'>Army (+100%)</span>. The merged unit keeps the best XP, every perk from both, and any hero name. Quality over quantity.</p></div>"+
    "<div class='helpcard'><h3>Annex or Raze \uD83C\uDFDB\uFE0F</h3><p>When you capture a city, choose its fate: <span class='k'>Annex</span> it into your empire, or <span class='k'>Raze</span> it \u2014 sack a pile of gold instantly, then it burns one population per turn (paying you as it burns) until nothing remains and the land goes free. Change your mind in the city screen before the ash settles.</p></div>"+
    "<div class='helpcard'><h3>Sworn Enemy \uD83C\uDFAF</h3><p>You are bound to no destiny \u2014 <span class='k'>help any enemy or attack any friend</span>. Your \uD83C\uDF81 <span class='k'>gift boxes are your shield</span>: an empire with <span class='k'>positive favor never attacks you</span>. At favor 0 (no gifts) they tolerate you only <span class='k'>from afar</span> \u2014 march soldiers near their cities or onto their soil without tribute and, after one warning, <span class='k'>they strike</span>. Every soldier of theirs you slay costs one \uD83C\uDF81, and <span class='k'>negative</span> favor means vengeance anywhere until gifts (50g each) mend it. Favor 2+ friends grant free peace and join your wars. Or swear a \uD83C\uDFAF <span class='k'>Vendetta</span> against anyone you choose: your units strike them <span class='k'>15% harder</span>, and destroying their empire by your own hand claims the <span class='k'>Nemesis Victory</span>. Renounce or redirect your vendetta at any time \u2014 but the marked empire resents you. Empires that cherish your friendship (favor 2+) may <span class='k'>join your wars</span> unbidden, or <span class='k'>Call them to Arms</span> yourself for one favor \u2014 your friends march on your enemies.</p></div>"+
    "<div class='helpcard'><h3>City-State Quests \uD83D\uDCEF</h3><p>City-states now post <span class='k'>quests</span> \u2014 destroy a camp, raise a wonder, defeat a rival\u2019s soldiers, grow your capital, amass gold. Complete one for a massive <span class='k'>+40 influence</span> jump \u2014 often an instant alliance, no gold spent. Active quests show in the Diplomacy panel.</p></div>"+
    "<div class='helpcard'><h3>Trade Routes \uD83D\uDC2A</h3><p>Research <span class='k'>Currency</span> to build Caravans. Walk one to any other city and open a <span class='k'>20-turn trade route</span>: your own cities pay +3 gold, rivals +5 gold and +2 science, city-states +4 gold and +1 influence every turn, plus a +30 gold completion bonus. But guard them \u2014 enemies and barbarians <span class='k'>plunder</span> caravans for 60 gold, and war severs routes.</p></div>"+
    "<div class='helpcard'><h3>Named Heroes \u2B50</h3><p>A unit that reaches <span class='k'>Veteran Lv4</span> becomes a named legend \u2014 \u201CMarcus the Unbroken\u201D \u2014 with a \u2B50 badge and an <span class='k'>aura</span>: allies on adjacent tiles fight <span class='k'>15% harder</span>. Keep your legends alive and your armies rally around them.</p></div>"+
    "<div class='helpcard'><h3>Social Policies \uD83D\uDCDC</h3><p>Your culture now also fills a spendable pool. Open the \uD83D\uDCDC Policies panel and adopt laws in four branches \u2014 <span class='k'>Tradition</span> (tall capital), <span class='k'>Liberty</span> (wide empire), <span class='k'>Honor</span> (war), and <span class='k'>Commerce</span> (gold & city-states). Each policy is a permanent perk; each costs more than the last. Spending never slows your Culture Victory.</p></div>"+
    "<div class='helpcard'><h3>Golden Ages \u2728</h3><p>Wonders (+10), Great People (+8), and new policies (+5) fill your Golden Age meter. When it peaks, your empire enters a <span class='k'>10-turn Golden Age</span>: every city's yields +25% and the interface gleams gold. Each age is harder to earn than the last.</p></div>"+
    "<div class='helpcard'><h3>Barbarian Camps \u26FA</h3><p>Barbarians now muster from <span class='k'>camps</span> \u26FA in the wilds instead of appearing from thin air. Each camp keeps raising raiders until you <span class='k'>storm it</span> \u2014 move any unit onto the camp to burn it for a <span class='k'>gold bounty</span> that grows with the eras.</p></div>"+
    "<div class='helpcard'><h3>Wonder Speed \u2728</h3><p>Your empire raises <span class='k'>World Wonders 10\u00D7 faster</span> than the old ways \u2014 most complete in a turn or two once your city has decent production. Rivals still build them at full cost, so the great works of the world are yours to claim.</p></div>"+
    "<div class='helpcard'><h3>Unique Civilizations</h3><p>Every nation now has a <span class='k'>trait</span> and a <span class='k'>unique unit</span>: Rome's Legions hit +12% harder, Egypt raises wonders 20% cheaper with War Chariots, Greece researches +15% faster with Hoplites, China births Great People 30% sooner with Chu-Ko-Nu, Mongolia's mounted Keshiks ride +1 tile, and Maya's Jaguar Warriors spread +30% culture. Rivals wield their traits too.</p></div>"+
    "<div class='helpcard'><h3>Culture & Borders \uD83C\uDFAD</h3><p>Cities generate <span class='k'>culture</span> from temples, libraries, universities, and wonders. As culture builds, a city's <span class='k'>borders expand</span> outward \u2014 claiming resources and letting citizens work distant tiles. Amass <span class='k'>1000 culture</span> as an empire and you achieve a <span class='k'>Culture Victory</span> without firing a shot. Beware: rivals can win this way too.</p></div>"+
    "<div class='helpcard'><h3>City-States \uD83C\uDFDB\uFE0F</h3><p>Neutral one-city nations dot the map. Send them <span class='k'>gifts of gold</span> in the Diplomacy panel to raise influence \u2014 at <span class='k'>60</span> they become your <span class='k'>ally</span> and pay tribute every turn: science, gold, culture, or free soldiers. Influence slowly fades, so keep the gifts flowing. You can conquer them instead\u2026 but the others will remember.</p></div>"+
    "<div class='helpcard'><h3>Diplomacy \uD83D\uDD4A\uFE0F</h3><p>Nations now begin at <span class='k'>peace</span>. Rivals only attack after a formal <span class='k'>declaration of war</span> \u2014 and attacking them declares war too. Open the \uD83D\uDD4A\uFE0F Diplomacy panel to see each leader\u2019s attitude, compare armies, declare war, or negotiate peace. Losing enemies will sue for peace and pay you gold tribute. Barbarians respect no treaties.</p></div>"+
    "<div class='helpcard'><h3>Upgrade Units \u2B06</h3><p>Units earn their strength: a unit must reach <span class='k'>Veteran Lv1</span> in battle (or be barracks-trained) before it can upgrade. Then, standing in <span class='k'>your territory</span>, pay gold and it spends <span class='k'>2 turns training</span> \u2014 frozen and vulnerable \u2014 before emerging as its successor (Warrior \u2192 Swordsman \u2192 Musketman\u2026). Veteran levels and perks carry over. Rivals must walk the same path.</p></div>"+
    "<div class='helpcard'><h3>Great People \u2728</h3><p>Your cities, buildings, and wonders build up your civilization\u2019s <span class='k'>legacy</span>. When it peaks, a Great Person emerges \u2014 choose a <span class='k'>Scientist</span> (instant tech), <span class='k'>Engineer</span> (finish a build), <span class='k'>Merchant</span> (gold windfall), or <span class='k'>General</span> (legendary veteran unit).</p></div>"+
    "<div class='helpcard'><h3>Capture Workers</h3><p>Rival empires now send <span class='k'>Workers</span> to farm and mine their land, just like you. Move a military unit onto an undefended enemy Worker or Settler to <span class='k'>capture</span> it \u2014 it defects and joins your empire as a Worker. Guard your own Workers near the front, or the enemy can take them too!</p></div>"+
    "<div class='helpcard'><h3>Build Queue</h3><p>In a city, tap the <span class='k'>+</span> on any unit, building, or wonder to add it to that city\u2019s build queue. When the current item finishes, the next in line starts automatically \u2014 set up a whole build order and let the city run itself. Tap a queued item to remove it.</p></div>"+
    "<div class='helpcard'><h3>Natural Wonders</h3><p>Scattered across the world are <span class='k'>natural wonders</span> \u2014 a volcano, crystal caverns, a mirror lake, a sky-piercing peak. Move a unit onto one to claim a one-time reward, and found a city nearby to work its rich tiles for powerful yields.</p></div>"+
    "<div class='helpcard'><h3>Random Events</h3><p>As the ages pass, fortune intervenes \u2014 treasures, bountiful harvests, eureka moments and wandering heroes aid your empire, while the occasional plague or fire tests it. Toggle <span class='k'>No Events</span> in the start menu to play without them.</p></div>"+
    "<div class='helpcard'><h3>World Wonders ✦</h3><p>Open a city to build a <span class='k'>Wonder</span> — each exists only once in the whole world, so race rivals to claim it. They grant powerful perks: extra production or food across your empire, free technology, stronger defenses, and more.</p></div>"+
    "<div class='helpcard'><h3>Veterans ⭐</h3><p>Units earn XP for every enemy they destroy and for taking cities. Each level (gold pips above the unit) makes them hit harder and survive longer. When a unit levels up in battle you'll <span class='k'>choose a promotion</span> — stronger attack, tougher defense, or extra movement — and it heals. Build a <span class='k'>Barracks</span> to train new units as veterans instantly.</p></div>"+
    "<div class='helpcard'><h3>Winning a fight</h3><p>Bring a city's HP to zero with a <span class='k'>melee unit</span> attacking from an adjacent tile to <span class='k'>capture</span> it — units fight from beside the city, never on it. Defend your own cities; losing your last one ends the game.</p></div>"+
    "<button id='help-newgame' style='width:100%;padding:13px;border-radius:12px;border:1px solid #caa13e;cursor:pointer;background:linear-gradient(180deg,#f0c061,#d9a23f);color:#241a06;font-weight:800;font-size:15px;margin-top:4px;'>Start New Game (pick civ, rivals & difficulty)</button>"+
    "<div class='hint'>Your current game is autosaved — you can Continue it from the menu instead of starting fresh.</div>";
}

/* ---- audio ---- */
let AC=null,master=null,muted=false;
function initAudio(){if(AC) return; try{AC=new (window.AudioContext||window.webkitAudioContext)(); master=AC.createGain(); master.gain.value=0.25; master.connect(AC.destination);}catch(e){AC=null;}}
function tone(freq,dur,type,vol,when){if(!AC||muted) return; const t=when||AC.currentTime; const o=AC.createOscillator(),g=AC.createGain(); o.type=type||'sine'; o.frequency.value=freq; o.connect(g); g.connect(master); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol||0.3,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+0.02);}
function noise(dur,vol,when){if(!AC||muted) return; const t=when||AC.currentTime; const n=AC.createBufferSource(); const buf=AC.createBuffer(1,Math.floor(AC.sampleRate*dur),AC.sampleRate); const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length); n.buffer=buf; const g=AC.createGain(); g.gain.value=vol||0.2; const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=1200; n.connect(f); f.connect(g); g.connect(master); n.start(t);}
function sfx(name){
  initAudio(); if(!AC||muted) return; const t=AC.currentTime;
  if(name==="click") tone(520,0.07,'triangle',0.18);
  else if(name==="move") tone(330,0.08,'sine',0.12);
  else if(name==="attack"){noise(0.14,0.25); tone(160,0.12,'sawtooth',0.18);}
  else if(name==="shoot"){tone(880,0.06,'square',0.12,t); tone(440,0.1,'triangle',0.1,t+0.03);}
  else if(name==="found"){[392,494,587,784].forEach((f,k)=>tone(f,0.35,'triangle',0.16,t+k*0.07));}
  else if(name==="grow"){tone(523,0.12,'sine',0.16,t); tone(659,0.14,'sine',0.14,t+0.06);}
  else if(name==="tech"){[523,659,784,1046].forEach((f,k)=>tone(f,0.25,'sine',0.14,t+k*0.06));}
  else if(name==="capture"){noise(0.3,0.3); [262,330,392,523].forEach((f,k)=>tone(f,0.4,'sawtooth',0.14,t+k*0.05));}
  else if(name==="victory"){[523,659,784,1046,1318].forEach((f,k)=>tone(f,0.5,'triangle',0.2,t+k*0.12));}
  else if(name==="defeat"){[392,330,262,196].forEach((f,k)=>tone(f,0.5,'sine',0.2,t+k*0.14));}
}

/* ---- save / load ---- */
function saveGame(){
  if(!G) return;
  try{
    const s={map:G.map.map(t=>({t:t.t,res:t.res,owner:t.owner,ownerCity:t.ownerCity,improv:t.improv,road:t.road,ruin:t.ruin,camp:t.camp,nat:t.nat,natDiscovered:t.natDiscovered,explored:t.explored,visible:t.visible,elev:t.elev})),
      players:G.players,turn:G.turn,cur:G.cur,seed:G.seed,diff:G.diff,units:G.units.map(u=>Object.assign({},u)),cities:G.cities.map(c=>Object.assign({},c)),
      nextUnitId:G.nextUnitId,nextCityId:G.nextCityId,era:G.era,over:G.over,cityNamePool:G.cityNamePool,wonderOwner:G.wonderOwner,mods:G.mods,nemesis:G.nemesis==null?null:G.nemesis,nemesisSlainBy:G.nemesisSlainBy==null?null:G.nemesisSlainBy,congress:G.congress||null,religion:G.religion||null,horde:G.horde||null};
    localStorage.setItem(SAVE_KEY,JSON.stringify(s));
  }catch(e){}
}
function loadGame(){
  try{const raw=localStorage.getItem(SAVE_KEY); if(!raw) return false; const s=JSON.parse(raw); if(!s||!s.map||!s.players) return false;
    RNG=mulberry32((s.seed||1)>>>0);
    G={map:s.map,players:s.players,turn:s.turn,cur:s.cur===1?1:0,seed:s.seed,diff:s.diff||"normal",units:s.units,cities:s.cities,nextUnitId:s.nextUnitId,nextCityId:s.nextCityId,era:s.era||"Ancient",over:!!s.over,cityNamePool:s.cityNamePool||CITY_NAMES.slice(),wonderOwner:s.wonderOwner||{},mods:s.mods||{},nemesis:(s.nemesis!=null?s.nemesis:null),nemesisSlainBy:(s.nemesisSlainBy!=null?s.nemesisSlainBy:null),congress:(s.congress||null),religion:(s.religion||null),horde:(s.horde||null),promoQueue:[],selUnit:null,selCity:null,anim:{shake:0,particles:[],floats:[]},log:[]};
    for(const u of G.units){const p=xy(u.tile); if(u.px==null){u.px=p[0]; u.py=p[1];} u.promos=u.promos||{}; if(u._promoLvl==null) u._promoLvl=unitLevel(u);}
    for(const p of G.players){if(p._goldInc==null)p._goldInc=0; if(p._sciInc==null)p._sciInc=0; if(!p.atWar)p.atWar={}; if(!p.peaceUntil)p.peaceUntil={}; if(!p._warTurns)p._warTurns={}; if(p.dipCool==null)p.dipCool=0; if(p.gpp==null)p.gpp=0; if(p.gppNeed==null)p.gppNeed=25; if(p.gpCount==null)p.gpCount=0; if(p.culture==null)p.culture=0; if(p.minor&&p.influence==null)p.influence=0; if(p.favor==null)p.favor=0; if(p.culPool==null)p.culPool=0; if(!p.policies)p.policies={};}
    for(const c of G.cities){if(c.culture==null)c.culture=0; if(c.ring==null)c.ring=1;}
    if(G.players[0]&&(G.players[0].gpp||0)>=(G.players[0].gppNeed||25)) G._gpReady=true;
    if(!G.congress) G.congress={next:Math.max(20,G.turn+8),points:{},host:null};
    if(!G.religion) G.religion={belief:null,name:null};
    if(!G.horde) G.horde={up:false,slain:false};
    recomputeVisibility();
    const c=G.cities.find(c=>c.owner===0),u=G.units.find(u=>u.owner===0); if(c) centerOn(c.tile); else if(u) centerOn(u.tile);
    applyStartZoom();
    return true;
  }catch(e){return false;}
}
function hasSave(){try{return !!localStorage.getItem(SAVE_KEY);}catch(e){return false;}}

/* ---- start menu ---- */
let selCivIndex=0,selDiff="normal",selRivals=3;
let selMods={noBarbs:false,fastWork:false,goldRush:false,noEvents:false};
const MODLIST=[{key:"noBarbs",em:"🛡️",nm:"No Raids",ds:"No barbarians"},{key:"fastWork",em:"⚡",nm:"Fast Work",ds:"Instant build"},{key:"goldRush",em:"💰",nm:"Gold Rush",ds:"+Gold income"},{key:"noEvents",em:"🚫",nm:"No Events",ds:"Disable events"}];
function renderStartMenu(showContinue){
  const c=$('start-content'); let html="";
  if(showContinue) html+="<button id='btn-continue' style='width:100%;padding:14px;border-radius:12px;border:1px solid #caa13e;cursor:pointer;background:linear-gradient(180deg,#f0c061,#d9a23f);color:#241a06;font-weight:800;font-size:16px;margin-bottom:14px;'>▶ Continue Empire</button>";
  html+="<div class='sectlbl'>Choose your civilization</div><div id='civpick'></div>";
  html+="<div class='sectlbl'>Rival empires</div><div class='pickrow' id='rivpick'></div>";
  html+="<div class='sectlbl'>Difficulty</div><div class='pickrow' id='diffpick'></div>";
  html+="<div class='sectlbl'>Modifiers <span style='color:var(--faint);font-weight:500;text-transform:none;letter-spacing:0'>— optional, tap to toggle</span></div><div class='pickrow' id='modpick'></div>";
  html+="<button id='btn-newgame' style='width:100%;padding:14px;border-radius:12px;border:1px solid var(--line);cursor:pointer;background:var(--panel2);color:var(--ink);font-weight:800;font-size:16px;margin-top:6px;'>Begin New Empire</button>";
  html+="<button id='btn-fullscreen' style='width:100%;padding:11px;border-radius:12px;border:1px solid var(--line);cursor:pointer;background:transparent;color:var(--dim);font-weight:700;font-size:14px;margin-top:10px;'>\u26F6 Fullscreen</button>";
  html+="<div style='font-size:11px;color:var(--faint);text-align:center;margin-top:6px;'>True fullscreen works in a browser (Safari/Chrome). Inside the Claude app this switches to Focus Mode.</div>";
  html+="<div class='hint'>Found cities, research technology, raise an army, and win by conquest, Spaceflight, 1000 Culture, hosting 3 World Congresses \uD83C\uDFDB\uFE0F, or a sworn Vendetta \uD83C\uDFAF.<br>Pinch to zoom · drag to pan · tap to act.</div>";
  c.innerHTML=html;
  const cp=$('civpick');
  for(let r=0;r<2;r++){const row=document.createElement('div'); row.className='pickrow';
    for(let k=0;k<3;k++){const i=r*3+k,civ=CIVS[i]; const d=document.createElement('div'); d.className='pick'+(i===selCivIndex?' sel':''); d.innerHTML="<div class='em'>"+civ.em+"</div><div class='nm'>"+civ.name+"</div><div class='ds'>"+civ.leader+"</div><div class='ds' style='color:var(--gold);font-size:10px;margin-top:2px;'>"+civ.tdesc+"</div>"; d.onclick=()=>{selCivIndex=i; if(selRivals>CIVS.length-1) selRivals=CIVS.length-1; renderStartMenu(showContinue);}; row.appendChild(d);}
    cp.appendChild(row);}
  const rp=$('rivpick'); const maxRiv=CIVS.length-1;
  for(let n=1;n<=maxRiv;n++){const el=document.createElement('div'); el.className='pick'+(n===selRivals?' sel':''); el.innerHTML="<div class='em'>"+(n>=4?"⚔️":"🚩")+"</div><div class='nm'>"+n+"</div><div class='ds'>"+(n===1?"rival":"rivals")+"</div>"; el.onclick=()=>{selRivals=n; renderStartMenu(showContinue);}; rp.appendChild(el);}
  const dp=$('diffpick');
  for(const key in DIFFS){const d=DIFFS[key]; const el=document.createElement('div'); el.className='pick'+(key===selDiff?' sel':''); el.innerHTML="<div class='em'>"+d.em+"</div><div class='nm'>"+d.name+"</div><div class='ds'>"+d.ds+"</div>"; el.onclick=()=>{selDiff=key; renderStartMenu(showContinue);}; dp.appendChild(el);}
  const modp=$('modpick'); modp.style.flexWrap='wrap';
  MODLIST.forEach(m=>{const el=document.createElement('div'); el.className='pick'+(selMods[m.key]?' sel':''); el.innerHTML="<div class='em'>"+m.em+"</div><div class='nm'>"+m.nm+"</div><div class='ds'>"+m.ds+"</div>"; el.onclick=()=>{selMods[m.key]=!selMods[m.key]; renderStartMenu(showContinue);}; modp.appendChild(el);});
  if(showContinue) $('btn-continue').onclick=()=>{initAudio(); if(loadGame()){hideOverlay('startmenu'); updateHUD(); nextUnit();}};
  $('btn-newgame').onclick=()=>{initAudio(); startNewGame();};
  const _bf=$('btn-fullscreen'); if(_bf) _bf.onclick=()=>toggleFullscreen();
}
function startNewGame(){
  const seed=(Date.now()^(Math.random()*1e9))>>>0;
  newGame(seed,selCivIndex,selDiff,selRivals,selMods);
  hideOverlay('startmenu'); document.getElementById('banner').style.display='none';
  updateHUD(); nextUnit();
  toast("Welcome, "+G.players[0].leader+". "+selRivals+" rival"+(selRivals>1?"s":"")+" await — found your first city!");
}

/* ---- boot ---- */
function boot(){
  setupCanvas(); bindInput(); renderHelp();
  document.getElementById('endturn').onclick=()=>{initAudio(); sfx("click"); endTurn();};
  document.getElementById('btn-tech').onclick=()=>{if(!G) return; sfx("click"); renderTechScreen(); showOverlay('techscreen');};
  document.getElementById('btn-dip').onclick=()=>{if(!G) return; sfx("click"); renderDipScreen(); showOverlay('dipscreen');};
  document.getElementById('btn-pol').onclick=()=>{if(!G) return; sfx("click"); renderPolScreen(); showOverlay('polscreen');};
  document.getElementById('z-in').onclick=()=>{sfx("click"); zoomBy(1.25);};
  document.getElementById('z-out').onclick=()=>{sfx("click"); zoomBy(0.8);};
  document.getElementById('z-fs').onclick=()=>{sfx("click"); toggleFullscreen();};
  document.addEventListener('fullscreenchange',()=>{try{resize();}catch(e){}});
  document.addEventListener('webkitfullscreenchange',()=>{try{resize();}catch(e){}});
  document.getElementById('btn-cities').onclick=()=>{if(!G) return; sfx("click"); renderCityList(); showOverlay('citylist');};
  document.getElementById('btn-help').onclick=()=>{sfx("click"); showOverlay('helpscreen');};
  { const hn=document.getElementById('help-newgame'); if(hn) hn.onclick=()=>{sfx("click"); hideOverlay('helpscreen'); renderStartMenu(hasSave()); showOverlay('startmenu');}; }
  document.getElementById('btn-mute').onclick=()=>{muted=!muted; document.getElementById('btn-mute').textContent=muted?"🔇":"🔊"; if(!muted){initAudio(); sfx("click");}};
  document.getElementById('sel-close').onclick=(e)=>{e.stopPropagation(); deselect();};
  document.getElementById('banner-btn').onclick=()=>{document.getElementById('banner').style.display='none'; renderStartMenu(false); showOverlay('startmenu');};
  document.querySelectorAll('[data-close]').forEach(b=>{b.onclick=()=>hideOverlay(b.getAttribute('data-close'));});
  document.querySelectorAll('.overlay').forEach(o=>{o.addEventListener('pointerdown',e=>{if(e.target===o&&o.id!=='startmenu'&&o.id!=='banner') hideOverlay(o.id);});});
  renderStartMenu(hasSave());
  lastT=performance.now(); requestAnimationFrame(loop);
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot); else boot();
</script>
</body>
</html>
