<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>EMPIRE — Rise of Civilization</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EMPIRE">
  <meta name="theme-color" content="#0c1a2b">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1118; --panel:#161c28; --panel2:#1d2533; --line:#2c3647;
    --ink:#e9eef6; --dim:#9fb0c6; --faint:#65748c;
    --gold:#e8b44a; --gold2:#caa13e; --azure:#3f8efc; --crimson:#e8503f;
    --good:#5fcf80; --warn:#f0b44a;
    --shadow:0 8px 30px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg);
    font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--ink);
    -webkit-user-select:none;user-select:none;touch-action:none;}
  #game{position:fixed;inset:0;}
  canvas#map{position:absolute;inset:0;display:block;touch-action:none;}
  #topbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:6px;
    padding:calc(env(safe-area-inset-top) + 6px) 10px 6px 10px;
    background:linear-gradient(180deg,rgba(14,17,24,.96),rgba(14,17,24,.72) 70%,rgba(14,17,24,0));
    pointer-events:none;z-index:20;flex-wrap:wrap;}
  .stat{pointer-events:auto;display:flex;align-items:center;gap:6px;background:var(--panel);
    border:1px solid var(--line);border-radius:10px;padding:5px 9px;font-size:13px;font-weight:600;
    box-shadow:var(--shadow);white-space:nowrap;}
  .stat .ico{font-size:14px;line-height:1;}
  .stat .sub{color:var(--faint);font-weight:500;font-size:11px;}
  .stat b{color:var(--gold);}
  #civname{font-family:'Cinzel',serif;font-weight:700;letter-spacing:.5px;color:var(--gold);}
  #sidebtns{position:absolute;top:calc(env(safe-area-inset-top) + 54px);right:8px;display:flex;
    flex-direction:column;gap:8px;z-index:18;}
  .iconbtn{pointer-events:auto;width:46px;height:46px;border-radius:12px;background:var(--panel);
    border:1px solid var(--line);color:var(--ink);font-size:20px;display:flex;align-items:center;
    justify-content:center;box-shadow:var(--shadow);cursor:pointer;transition:transform .08s,background .15s;}
  .iconbtn:active{transform:scale(.92);background:var(--panel2);}
  .iconbtn.alert{border-color:var(--gold);box-shadow:0 0 0 2px rgba(232,180,74,.25),var(--shadow);}
  #selpanel{position:absolute;left:8px;bottom:calc(env(safe-area-inset-bottom) + 8px);
    width:min(330px,calc(100% - 16px));background:var(--panel);border:1px solid var(--line);
    border-radius:14px;box-shadow:var(--shadow);z-index:16;overflow:hidden;display:none;}
  #selhead{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--panel2);
    border-bottom:1px solid var(--line);}
  #selemblem{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    font-size:19px;flex:0 0 auto;border:1.5px solid rgba(255,255,255,.25);}
  #seltitle{font-weight:700;font-size:15px;line-height:1.1;}
  #selsub{color:var(--dim);font-size:12px;}
  #selbody{padding:9px 12px 4px;}
  .hpwrap{height:7px;border-radius:6px;background:#0c1119;overflow:hidden;margin:3px 0 8px;}
  .hpfill{height:100%;border-radius:6px;transition:width .25s;}
  .actions{display:flex;flex-wrap:wrap;gap:7px;padding:4px 10px 11px;}
  .abtn{flex:1 1 auto;min-width:86px;padding:9px 8px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel2);color:var(--ink);font-weight:600;font-size:13px;cursor:pointer;text-align:center;
    transition:transform .07s,background .12s;}
  .abtn:active{transform:scale(.95);}
  .abtn.primary{background:linear-gradient(180deg,#f0c061,#d9a23f);color:#241a06;border-color:#caa13e;}
  .abtn.danger{color:#ffb3a8;border-color:#5a2a26;}
  .abtn[disabled]{opacity:.4;}
  #endturn{position:absolute;right:8px;bottom:calc(env(safe-area-inset-bottom) + 8px);z-index:17;
    min-width:120px;padding:14px 18px;border-radius:14px;border:1px solid #caa13e;cursor:pointer;
    background:linear-gradient(180deg,#f0c061,#d9a23f);color:#241a06;font-weight:800;font-size:15px;
    box-shadow:0 6px 22px rgba(232,180,74,.35);font-family:'Inter',sans-serif;letter-spacing:.3px;
    transition:transform .08s,filter .15s;}
  #endturn:active{transform:scale(.96);}
  #endturn.busy{filter:grayscale(.5) brightness(.8);}
  #endturn .et-sub{display:block;font-size:10px;font-weight:600;opacity:.7;letter-spacing:.4px;}
  .overlay{position:absolute;inset:0;z-index:40;background:rgba(8,11,16,.72);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;padding:14px;}
  .sheet{width:min(560px,100%);max-height:88vh;background:var(--panel);border:1px solid var(--line);
    border-radius:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;}
  .sheethead{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);
    background:var(--panel2);}
  .sheethead h2{margin:0;font-family:'Cinzel',serif;font-size:18px;font-weight:700;flex:1;letter-spacing:.4px;}
  .sheethead h2 .sm{font-family:'Inter';font-size:12px;color:var(--dim);font-weight:500;display:block;letter-spacing:0;}
  .xbtn{width:36px;height:36px;border-radius:10px;background:var(--panel);border:1px solid var(--line);
    color:var(--ink);font-size:18px;cursor:pointer;flex:0 0 auto;}
  .sheetbody{padding:14px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .yieldrow{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;}
  .ypill{flex:1 1 0;min-width:64px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;
    padding:8px 6px;text-align:center;}
  .ypill .v{font-size:17px;font-weight:800;}
  .ypill .l{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}
  .bar{height:9px;border-radius:6px;background:#0c1119;overflow:hidden;margin:4px 0;}
  .bar > i{display:block;height:100%;border-radius:6px;}
  .barlbl{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);margin-top:6px;}
  .sectlbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--faint);margin:14px 0 7px;
    font-weight:700;}
  .builditem{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid var(--line);
    border-radius:10px;margin-bottom:7px;background:var(--panel2);cursor:pointer;transition:border-color .12s,transform .07s;}
  .builditem:active{transform:scale(.99);}
  .builditem.cur{border-color:var(--gold);box-shadow:0 0 0 1px rgba(232,180,74,.3) inset;}
  .bi-ico{width:30px;height:30px;border-radius:8px;background:#0c1119;display:flex;align-items:center;
    justify-content:center;font-size:16px;flex:0 0 auto;}
  .bi-main{flex:1;min-width:0;}
  .bi-name{font-weight:700;font-size:14px;}
  .bi-desc{font-size:11px;color:var(--dim);line-height:1.3;}
  .bi-cost{font-size:12px;font-weight:700;color:var(--gold);white-space:nowrap;text-align:right;}
  .bi-cost .t{display:block;font-size:10px;color:var(--faint);font-weight:500;}
  .tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:6px;background:#0c1119;
    color:var(--dim);margin-right:4px;margin-bottom:4px;}
  .tcols{display:flex;flex-direction:column;gap:8px;}
  .techitem{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--line);border-radius:10px;
    background:var(--panel2);cursor:pointer;transition:border-color .12s,transform .07s;}
  .techitem:active{transform:scale(.99);}
  .techitem.done{border-color:#2f6b43;background:#13241a;}
  .techitem.cur{border-color:var(--azure);box-shadow:0 0 0 1px rgba(63,142,252,.35) inset;}
  .techitem.locked{opacity:.5;}
  .ti-ico{width:32px;height:32px;border-radius:8px;background:#0c1119;display:flex;align-items:center;
    justify-content:center;font-size:17px;flex:0 0 auto;}
  .ti-main{flex:1;min-width:0;}
  .ti-name{font-weight:700;font-size:14px;}
  .ti-unlock{font-size:11px;color:var(--dim);}
  .ti-cost{font-size:12px;font-weight:700;color:var(--azure);white-space:nowrap;text-align:right;}
  .ti-cost .t{display:block;font-size:10px;color:var(--faint);font-weight:500;}
  .ti-prog{height:4px;border-radius:4px;background:#0c1119;margin-top:5px;overflow:hidden;}
  .ti-prog > i{display:block;height:100%;background:var(--azure);}
  #toast{position:absolute;left:50%;top:calc(env(safe-area-inset-top) + 60px);transform:translateX(-50%);
    z-index:50;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none;width:90%;max-width:420px;}
  .toastmsg{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--gold);
    padding:9px 14px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--shadow);
    animation:tin .3s ease, tout .4s ease 3s forwards;max-width:100%;text-align:center;}
  @keyframes tin{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
  @keyframes tout{to{opacity:0;transform:translateY(-8px);}}
  #banner{position:absolute;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
    background:rgba(6,8,12,.82);backdrop-filter:blur(4px);padding:20px;text-align:center;}
  #banner .inner{max-width:460px;}
  #banner .big{font-family:'Cinzel',serif;font-size:34px;font-weight:900;letter-spacing:1px;margin:0 0 6px;}
  #banner .lead{color:var(--dim);font-size:15px;margin:0 0 18px;line-height:1.5;}
  #banner button{padding:13px 26px;border-radius:12px;border:1px solid #caa13e;cursor:pointer;
    background:linear-gradient(180deg,#f0c061,#d9a23f);color:#241a06;font-weight:800;font-size:15px;}
  .helpcard{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;}
  .helpcard h3{margin:0 0 6px;font-size:14px;color:var(--gold);}
  .helpcard p{margin:0;font-size:13px;color:var(--dim);line-height:1.5;}
  .helpcard .k{color:var(--ink);font-weight:600;}
  .menu-title{font-family:'Cinzel',serif;font-size:30px;font-weight:900;text-align:center;margin:2px 0 2px;
    letter-spacing:1.5px;color:var(--gold);text-shadow:0 2px 18px rgba(232,180,74,.25);animation:titleGlow 3.4s ease-in-out infinite;}
  @keyframes titleGlow{0%,100%{text-shadow:0 2px 16px rgba(232,180,74,.22);}50%{text-shadow:0 2px 30px rgba(232,180,74,.6),0 0 8px rgba(232,180,74,.35);}}
  .menu-sub{text-align:center;color:var(--dim);font-size:13px;margin:0 0 16px;letter-spacing:2px;text-transform:uppercase;}
  .pickrow{display:flex;gap:8px;margin:10px 0;}
  .pick{flex:1;background:var(--panel2);border:1.5px solid var(--line);border-radius:12px;padding:12px 8px;
    text-align:center;cursor:pointer;transition:border-color .12s,transform .07s;}
  .pick:active{transform:scale(.97);}
  .pick.sel{border-color:var(--gold);box-shadow:0 0 0 1px rgba(232,180,74,.3) inset;}
  .pick .em{font-size:22px;}
  .pick .nm{font-weight:700;font-size:13px;margin-top:4px;}
  .pick .ds{font-size:10px;color:var(--faint);margin-top:2px;line-height:1.3;}
  #zoomctl{position:absolute;right:8px;bottom:calc(env(safe-area-inset-bottom) + 168px);z-index:15;display:none;flex-direction:column;gap:6px;}
  .zbtn{width:40px;height:40px;border-radius:11px;background:var(--panel);border:1px solid var(--line);color:var(--ink);font-size:19px;box-shadow:var(--shadow);cursor:pointer;pointer-events:auto;display:flex;align-items:center;justify-content:center;}
  .zbtn:active{transform:scale(0.94);background:#1a2530;}
  @media (max-height:640px){
    .stat{padding:3px 7px;font-size:11.5px;border-radius:8px;gap:4px;}
    .iconbtn{width:36px;height:36px;font-size:16px;border-radius:10px;}
    #topbar{gap:4px;padding:calc(env(safe-area-inset-top) + 4px) 8px 4px 8px;}
    .minimapwrap{transform:scale(0.82);transform-origin:bottom right;}
    #zoomctl{bottom:calc(env(safe-area-inset-bottom) + 150px);}
    .zbtn{width:36px;height:36px;font-size:17px;}
    #selpanel{width:min(300px,calc(100% - 12px));}
  }
  .minimapwrap{position:absolute;right:8px;bottom:calc(env(safe-area-inset-bottom) + 64px);z-index:15;
    border:1px solid var(--line);border-radius:8px;overflow:hidden;box-shadow:var(--shadow);background:var(--panel);
    display:none;}
  #minimap{display:block;}
  #forecast{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 116px);z-index:30;display:none;
    background:rgba(14,20,28,0.97);border:1.5px solid var(--gold);border-radius:14px;padding:12px 14px;width:min(86vw,344px);box-shadow:0 12px 34px rgba(0,0,0,0.55);}
  .fc-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .fc-side{flex:1;text-align:center;min-width:0;}
  .fc-ico{font-size:26px;line-height:1;}
  .fc-nm{font-size:12px;font-weight:700;color:var(--ink);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fc-hp{font-size:11px;color:var(--dim);}
  .fc-vs{font-size:13px;font-weight:800;color:var(--gold);padding:0 2px;}
  .fc-dmg{display:flex;justify-content:space-between;font-size:12.5px;font-weight:700;margin-top:9px;padding-top:8px;border-top:1px solid var(--line);}
  .fc-verdict{font-size:12px;text-align:center;margin-top:7px;}
  .fc-btns{display:flex;gap:8px;margin-top:11px;}
  .fc-go{flex:2;padding:11px;border:none;border-radius:10px;background:linear-gradient(180deg,#f0a861,#d9603f);color:#fff;font-weight:800;font-size:14px;cursor:pointer;}
  .fc-no{flex:1;padding:11px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);color:var(--ink);font-weight:700;font-size:14px;cursor:pointer;}
  #promo{position:fixed;inset:0;z-index:62;display:none;align-items:center;justify-content:center;background:rgba(4,7,11,0.66);padding:16px;}
  #dipoffer{position:fixed;inset:0;z-index:63;display:none;align-items:center;justify-content:center;background:rgba(4,7,11,0.66);padding:16px;}
  #gppick{position:fixed;inset:0;z-index:64;display:none;align-items:center;justify-content:center;background:rgba(4,7,11,0.7);padding:16px;}
  #citychoice{position:fixed;inset:0;z-index:65;display:none;align-items:center;justify-content:center;background:rgba(4,7,11,0.7);padding:16px;}
  #congress{position:fixed;inset:0;z-index:66;display:none;align-items:center;justify-content:center;background:rgba(4,7,11,0.72);padding:16px;}
  #faithpick{position:fixed;inset:0;z-index:66;display:none;align-items:center;justify-content:center;background:rgba(4,7,11,0.72);padding:16px;}
  .diprow{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--panel2);margin-bottom:10px;}
  .dip-em{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid;}
  .dip-main{flex:1;min-width:0;}
  .dip-nm{font-weight:800;font-size:15px;}
  .dip-ds{font-size:12px;color:var(--dim);margin-top:2px;}
  .dip-st{font-size:11px;font-weight:800;letter-spacing:0.4px;padding:4px 8px;border-radius:8px;margin-top:5px;display:inline-block;}
  .dip-st.war{background:rgba(232,80,63,0.16);color:#ff8d7e;border:1px solid rgba(232,80,63,0.5);}
  .dip-st.peace{background:rgba(95,207,128,0.12);color:#7fdfa0;border:1px solid rgba(95,207,128,0.4);}
  .dipbtn{padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--ink);font-weight:700;font-size:12.5px;cursor:pointer;flex-shrink:0;}
  .dipbtn.war{border-color:rgba(232,80,63,0.6);color:#ff8d7e;}
  .dipbtn.peace{border-color:rgba(95,207,128,0.5);color:#7fdfa0;}
  .fc-war{font-size:11.5px;font-weight:800;color:#ff8d7e;margin-top:6px;letter-spacing:0.3px;}
  body.goldenage #topbar{box-shadow:0 0 22px rgba(232,180,74,0.45), inset 0 0 14px rgba(232,180,74,0.12); border-color:rgba(232,180,74,0.55);}
  body.focusmode #topbar{display:none;}
  body.focusmode .minimapwrap{display:none !important;}
  body.focusmode #zoomctl{bottom:calc(env(safe-area-inset-bottom) + 64px);}
  body.goldenage #ga-stat b{color:var(--gold);}
  .promo-card{background:linear-gradient(180deg,#141d27,#0e151d);border:1.5px solid var(--gold);border-radius:16px;padding:18px;width:min(90vw,360px);box-shadow:0 16px 44px rgba(0,0,0,0.6);text-align:center;}
  .promo-hd{font-family:'Cinzel',serif;font-size:19px;font-weight:800;color:var(--gold);}
  .promo-sub{font-size:12px;color:var(--dim);margin:4px 0 14px;}
  .promo-opts{display:flex;flex-direction:column;gap:9px;}
  .promo-opt{display:flex;align-items:center;gap:12px;text-align:left;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;background:var(--panel2);color:var(--ink);cursor:pointer;}
  .promo-opt:active{border-color:var(--gold);background:#1a2530;}
  .po-ico{font-size:22px;}
  .po-nm{font-weight:800;font-size:14px;flex:1;}
  .po-ds{font-size:12px;color:var(--dim);}
  .queuewrap{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 8px;}
  .qitem{font-size:12px;padding:6px 9px;border:1px solid var(--line);border-radius:9px;background:var(--panel2);color:var(--ink);cursor:pointer;}
  .qitem:active{border-color:var(--crimson);color:var(--crimson);}
  .bi-q{margin-left:8px;width:32px;min-width:32px;height:36px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);color:var(--gold);font-size:22px;font-weight:800;line-height:1;cursor:pointer;flex-shrink:0;align-self:center;}
  .bi-q:active{background:#1a2530;border-color:var(--gold);}
  #eventpop{position:absolute;left:50%;top:calc(env(safe-area-inset-top) + 62px);transform:translateX(-50%) translateY(-14px);z-index:40;display:none;opacity:0;
    background:linear-gradient(180deg,rgba(20,28,38,0.98),rgba(13,19,27,0.98));border:1.5px solid var(--gold);border-radius:14px;padding:12px 18px;width:min(86vw,360px);
    box-shadow:0 12px 34px rgba(0,0,0,0.55);text-align:center;transition:opacity .32s ease,transform .32s ease;pointer-events:none;}
  #eventpop.show{display:block;opacity:1;transform:translateX(-50%) translateY(0);}
  #eventpop .ev-ico{font-size:30px;line-height:1;}
  #eventpop .ev-title{font-family:'Cinzel',serif;font-size:16px;font-weight:800;color:var(--gold);margin-top:4px;}
  #eventpop .ev-desc{font-size:13px;color:var(--ink);margin-top:3px;line-height:1.35;}
  .hint{font-size:11px;color:var(--faint);text-align:center;margin-top:8px;line-height:1.4;}
</style>
</head>
<body>
<div id="game">
  <canvas id="map"></canvas>
  <div id="topbar">
    <div class="stat" id="civname">—</div>
    <div class="stat"><span class="ico">📅</span><span>Turn <b id="t-turn">1</b> <span class="sub" id="t-era">Ancient</span></span></div>
    <div class="stat"><span class="ico">💰</span><span><b id="t-gold">0</b> <span class="sub" id="t-goldinc">+0</span></span></div>
    <div class="stat"><span class="ico">🔬</span><span id="t-sci"><b>—</b></span></div>
    <div class="stat"><span class="ico">🎭</span><span><b id="t-cul">0</b> <span class="sub" id="t-culinc">+0</span></span></div>
    <div class="stat" id="ga-stat" style="display:none"><span class="ico">✨</span><span><b id="t-ga">0</b> <span class="sub">golden</span></span></div>
    <div class="stat"><span class="ico">🏆</span><span><b id="t-score">0</b></span></div>
  </div>
  <div id="sidebtns">
    <div class="iconbtn" id="btn-tech" title="Research">🔬</div>

function makePlayer(id,civ,human){

/* ---- map generation ---- */
function genMap(np){
  np=np||2;
  const map=new Array(MAP_W*MAP_H);
  const elev=new Float32Array(MAP_W*MAP_H);
  for(let b=0;b<18;b++){
    const cx=rrange(MAP_W*0.12,MAP_W*0.88),cy=rrange(MAP_H*0.15,MAP_H*0.85),r=rrange(3,7),h=rrange(0.6,1.2);
    for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){const d=dist2(x,y,cx,cy);elev[idx(x,y)]+=h*Math.exp(-(d*d)/(2*r*r));}
  }
  const moist=new Float32Array(MAP_W*MAP_H);
  for(let b=0;b<10;b++){
    const cx=rrange(0,MAP_W),cy=rrange(0,MAP_H),r=rrange(4,9),h=rrange(-1,1);
    for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){const d=dist2(x,y,cx,cy);moist[idx(x,y)]+=h*Math.exp(-(d*d)/(2*r*r));}
  }
  for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){
    const ex=Math.min(x,MAP_W-1-x)/(MAP_W*0.5),ey=Math.min(y,MAP_H-1-y)/(MAP_H*0.5);
    const edge=clamp(Math.min(ex,ey)*1.4,0,1); elev[idx(x,y)]*=lerp(0.25,1,edge);
  }
  let emax=0; for(let i=0;i<elev.length;i++) emax=Math.max(emax,elev[i]);
  for(let i=0;i<elev.length;i++) elev[i]/=(emax||1);
  const sea=0.34;
  for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){
    const i=idx(x,y),e=elev[i],m=moist[i],lat=Math.abs((y/(MAP_H-1))-0.5)*2; let terr;
    if(e<sea) terr="ocean";
    else if(e<sea+0.04) terr="coast";
    else if(e>0.82) terr="mtn";
    else if(e>0.66) terr="hills";
    else if(lat>0.82) terr=e>0.5?"snow":"tundra";
    else if(lat>0.62) terr=m>0.1?"forest":"tundra";
    else if(m<-0.35&&lat<0.5) terr="desert";
    else if(m>0.25) terr="forest";
    else if(m>-0.05) terr="grass";
    else terr="plains";
    map[i]={t:terr,res:null,ownerCity:-1,owner:-1,improv:null,road:false,ruin:false,explored:new Array(np).fill(false),visible:new Array(np).fill(false),elev:e};
  }
  for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){
    const i=idx(x,y); if(map[i].t!=="ocean") continue;
    const nb=neigh(x,y);
    for(let k=0;k<nb.length;k++){const nx=nb[k][0],ny=nb[k][1]; if(inb(nx,ny)&&TERR[map[idx(nx,ny)].t].land){map[i].t="coast";break;}}
  }
  const resKeys=Object.keys(RES);
  for(let i=0;i<map.length;i++){
    const t=map[i].t;
    if(RNG()<0.085){const opts=resKeys.filter(k=>RES[k].on.includes(t)); if(opts.length) map[i].res=pick(opts);}
  }
  // ancient ruins to explore
  let placed=0,guard=0; const want=11;
  while(placed<want&&guard++<4000){
    const i=rint(map.length),tk=map[i].t;
    if(!TERR[tk].land||TERR[tk].block||map[i].ruin||map[i].res) continue;
    map[i].ruin=true; placed++;
  }
  // natural wonders (spread out, discoverable, rich tiles)
  var natKeys=Object.keys(NATWONDERS);
  for(var sh=natKeys.length-1;sh>0;sh--){var rr=rint(sh+1),tmp=natKeys[sh];natKeys[sh]=natKeys[rr];natKeys[rr]=tmp;}
  var nwWant=3,nwPlaced=0,nguard=0;
  while(nwPlaced<nwWant&&nguard++<6000){
    var ii=rint(map.length),tk2=map[ii].t;
    if(!TERR[tk2].land||TERR[tk2].block||map[ii].ruin||map[ii].res||map[ii].nat) continue;
    var ax=ii%MAP_W,ay=(ii/MAP_W)|0,ok=true;
    for(var j=0;j<map.length;j++){ if(map[j].nat){var bx=j%MAP_W,by=(j/MAP_W)|0; if(Math.max(Math.abs(ax-bx),Math.abs(ay-by))<4){ok=false;break;}}}
    if(!ok) continue;
    map[ii].nat=natKeys[nwPlaced%natKeys.length]; nwPlaced++;
  }
  return map;
}
function landScore(i){
  const[x,y]=xy(i); if(!TERR[G.map[i].t].land||TERR[G.map[i].t].block) return -1; let s=0;
  for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){
    const nx=x+dx,ny=y+dy; if(!inb(nx,ny))continue; const tt=G.map[idx(nx,ny)];
    if(TERR[tt.t].land&&!TERR[tt.t].block) s+=(TERR[tt.t].food+TERR[tt.t].prod)+(tt.res?2:0);
    if(tt.t==="coast") s+=1;
  }
  const em=Math.min(x,MAP_W-1-x,y,MAP_H-1-y); if(em<2) s-=6; return s;
}
function chooseStarts(map,n){
  const cand=[]; for(let i=0;i<map.length;i++){const s=landScore(i); if(s>6) cand.push({i,s});}
  cand.sort((a,b)=>b.s-a.s);
  for(let space=9; space>=3; space--){
    const chosen=[];
    for(const c of cand){let ok=true;
      for(const ch of chosen){const a=xy(c.i),b=xy(ch); if(cheby(a[0],a[1],b[0],b[1])<space){ok=false;break;}}
      if(ok) chosen.push(c.i); if(chosen.length>=n) break;
    }
    if(chosen.length>=n) return chosen;
  }
  const fb=[]; for(const c of cand){fb.push(c.i); if(fb.length>=n) break;}
  let g=0; while(fb.length<n&&cand.length) fb.push(cand[(g++)%cand.length].i);
  return fb;
}
function adjacentLand(i,exclude){
  exclude=exclude||[];
  const ns=neighIdx(i);
  for(const ni of ns){const t=G.map[ni].t; if(TERR[t].land&&!TERR[t].block&&exclude.indexOf(ni)<0&&!unitAt(ni)&&!cityAt(ni)) return ni;}
  return null;
}

/* ---- visibility / fog ---- */
function revealAround(i,player,r){

  for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){const nx=x+dx,ny=y+dy; if(inb(nx,ny)&&cheby(x,y,nx,ny)<=r) G.map[idx(nx,ny)].explored[player]=true;}

/* ---- tile & city yields ---- */
function tileYield(i){
  const tt=G.map[i],base=TERR[tt.t]; let f=base.food,p=base.prod,g=base.gold;
  if(tt.res){const r=RES[tt.res]; f+=r.food; p+=r.prod; g+=r.gold;}
  if(tt.nat&&NATWONDERS[tt.nat]){const nw=NATWONDERS[tt.nat]; f+=nw.f; p+=nw.p; g+=nw.g;}
  if(tt.improv==="farm") f+=2+((tt.owner===0&&hasBelief("harvest"))?1:0);
  if(tt.improv==="mine") p+=2+((tt.owner===0&&hasBelief("forge"))?1:0);
  if(tt.improv==="pasture"){p+=1; f+=1;}
  return {f,p,g};
}
function cityYields(city){
  const own=tileYield(city.tile);
  let food=2+own.f,prod=1+own.p,gold=1+own.g,sci=1+Math.floor(city.pop/2);
  const[cx,cy]=xy(city.tile); const ring=[];
  for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){
    if(dx===0&&dy===0)continue; const nx=cx+dx,ny=cy+dy; if(!inb(nx,ny))continue; const ti=idx(nx,ny),tt=G.map[ti];
    const _d=Math.max(Math.abs(dx),Math.abs(dy));
    if(_d===1){ if(tt.ownerCity!==-1&&tt.ownerCity!==city.id) continue; }
    else { if(tt.ownerCity!==city.id) continue; }
    const y=tileYield(ti); ring.push({score:y.f+y.p+y.g*0.6,y});
  }
  ring.sort((a,b)=>b.score-a.score);
  const work=Math.min(city.pop,ring.length);
  for(let k=0;k<work;k++){food+=ring[k].y.f; prod+=ring[k].y.p; gold+=ring[k].y.g;}
  for(const bk in city.buildings){const b=bDef(bk); if(!b)continue; if(b.food)food+=b.food; if(b.prod)prod+=b.prod; if(b.gold)gold+=b.gold; if(b.sci)sci+=b.sci;}
  if((city.buildings.harbor)&&isCoastal(city)){food+=2; gold+=1;}
  if(G.wonderOwner){ for(const wk in WONDERS){const wd=WONDERS[wk]; if(wd.empire&&G.wonderOwner[wk]===city.owner){ if(wd.empire.food)food+=wd.empire.food; if(wd.empire.prod)prod+=wd.empire.prod; if(wd.empire.gold)gold+=wd.empire.gold; if(wd.empire.sci)sci+=wd.empire.sci; }} }
  const popcap=city.buildings.aqueduct?14:6;
  const _T=civT(city.owner); if(_T.sci) sci=Math.round(sci*_T.sci); if(_T.gold) gold=Math.round(gold*_T.gold);
  if(city.owner===0){
    const _cap=playerCapital(), _isCap=_cap&&_cap.id===city.id;
    if(hasPol("landed")) food+=2;
    if(hasPol("republic")) prod+=1;
    if(hasPol("merit")) gold+=1;
    if(_isCap&&hasPol("aristo")) prod+=3;
    if(_isCap&&hasPol("monarchy")) gold+=4;
    if(hasPol("guilds")) gold=Math.round(gold*1.1);
  }
  if(city.owner===0){ food=Math.round(food*1.25); prod=Math.round(prod*1.4); gold=Math.round(gold*1.3); sci=Math.round(sci*1.35);
    if(gaActive()){ food=Math.round(food*1.25); prod=Math.round(prod*1.25); gold=Math.round(gold*1.25); sci=Math.round(sci*1.25); } }
  else { sci=Math.round(sci*1.5); }
  const foodNeed=city.pop*2;
  return {food,prod,gold,sci,foodNeed,foodSurplus:food-foodNeed,popcap};
}

/* ---- production helpers ---- */
function buildCost(item,owner){let c=item.kind==="unit"?UNITS[item.id].cost:item.kind==="building"?BUILDINGS[item.id].cost:item.kind==="wonder"?WONDERS[item.id].cost:item.kind==="none"?Infinity:9999;
  if(owner!=null&&item.kind==="wonder"){const T=civT(owner); if(T.wonderDisc) c=Math.round(c*T.wonderDisc);
    if(owner===0) c=Math.max(12,Math.round(c/10)); // your masons work miracles: wonders 10x faster
  }
  if(owner===0&&item.kind==="unit"&&item.id==="settler"&&hasPol("settlers")) c=Math.round(c*0.67);
  if(owner===0&&item.kind==="building"&&hasPol("mercant")) c=Math.round(c*0.85);
  return c;}
function buildName(item){return item.kind==="unit"?UNITS[item.id].name:item.kind==="building"?BUILDINGS[item.id].name:item.kind==="wonder"?WONDERS[item.id].name:item.kind==="none"?"Nothing":"?";}

function isCoastal(city){for(const ni of neighIdx(city.tile)){const t=G.map[ni].t; if(t==="coast"||t==="ocean") return true;} return false;}

function availableBuilds(city){
  const p=G.players[city.owner],out=[];
  for(const k in UNITS){const u=UNITS[k]; if(u.tech&&!p.techs[u.tech])continue; if(u.naval&&!cityCoastal(city))continue; if(k==="nuke"&&(city.owner!==0||!G.wonderOwner||G.wonderOwner.manhattan!==0))continue; if(k==="spy"&&city.owner!==0)continue; if(u.uniq&&(!p.uu||p.uu.id!==k))continue; if(p.uu&&p.uu.base===k)continue; out.push({kind:"unit",id:k});}
  for(const k in BUILDINGS){const b=BUILDINGS[k]; if(b.tech&&!p.techs[b.tech])continue; if(city.buildings[k])continue; out.push({kind:"building",id:k});}
  for(const k in WONDERS){const w=WONDERS[k]; if(w.tech&&!p.techs[w.tech])continue; if(city.buildings[k]||wonderTaken(k))continue; out.push({kind:"wonder",id:k});}
  return out;
}

/* ---- pathfinding ---- */
function moveCost(toIndex,u){
  const tt=G.map[toIndex],base=TERR[tt.t]; if(base.block) return 99;
  const nav=u&&UNITS[u.type]&&UNITS[u.type].naval;
  if(nav) return base.land?99:1;
  if(!base.land) return (u&&u.owner===0)?2:99; // land units embark (player only)
  if(tt.road) return 1; return base.move;
}
function reachable(unit){
  const start=unit.tile,startMP=unit.mp; const rem=new Map(),prev=new Map(); rem.set(start,startMP);
  const open=[[start,startMP]];
  while(open.length){
    let bi=0; for(let k=1;k<open.length;k++) if(open[k][1]>open[bi][1]) bi=k;
    const cell=open.splice(bi,1)[0],cur=cell[0],curMP=cell[1];
    if(curMP<(rem.has(cur)?rem.get(cur):-1)) continue;
    if(curMP<=0) continue;
    for(const ni of neighIdx(cur)){
      const occ=unitAt(ni),oc=cityAt(ni);
      if(oc) continue;                              // city tiles are never enterable
      if(occ&&occ.owner!==unit.owner) continue;     // enemy unit
      if(occ&&occ.owner===unit.owner) continue;     // friendly unit
      const cst=moveCost(ni,unit); if(cst>=99) continue;
      let nm=curMP-cst; if(nm<0) nm=0;
      if(nm>(rem.has(ni)?rem.get(ni):-1)){rem.set(ni,nm); prev.set(ni,cur); open.push([ni,nm]);}
    }
  }
  rem.delete(start); return {rem,prev,startMP};
}
function pathTo(prev,target){const path=[target]; let c=target; while(prev.has(c)){c=prev.get(c); path.unshift(c);} return path;}
/* ---- camera & canvas ---- */
const cam={x:0,y:0,scale:1,tx:0,ty:0,ts:1};

function zoomBy(f){ cam.scale=clamp(cam.scale*f,0.45,2.6); cam.ts=cam.scale; clampCam(); try{localStorage.setItem("empireZoom",String(cam.scale.toFixed(3)));}catch(e){} }

function toggleFullscreen(){
  const d=document, el=d.documentElement;
  const isFs=d.fullscreenElement||d.webkitFullscreenElement;
  try{
    if(isFs){ (d.exitFullscreen||d.webkitExitFullscreen).call(d); return; }
    if(d.body.classList.contains("focusmode")){ setFocusMode(false); return; }

let pendingAtk=null, fcAtt=null, fcTarget=null;
function canAttackNow(unit,target){
  const u=UNITS[unit.type]; if(u.civilian||unit.attacked) return false;
  const ut=xy(unit.tile),tt=xy(target),range=u.range||1;
  if(u.ranged) return cheby(ut[0],ut[1],tt[0],tt[1])<=range;
  if(cheby(ut[0],ut[1],tt[0],tt[1])===1) return true;
  const R=reachable(unit); for(const ni of neighIdx(target)){ if(R.rem.has(ni)) return true; } return false;
}
function combatForecast(att,target){
  const tu=unitAt(target),tc=cityAt(target),ranged=!!UNITS[att.type].ranged;
  let aStr=unitStrength(att,true)*aiCombatMult(att.owner); const out={ranged:ranged};
  { const _ft=civT(att.owner); if(_ft.atk) aStr*=_ft.atk;
    const _tu=unitAt(target),_tc=cityAt(target),_ow=_tu?_tu.owner:(_tc?_tc.owner:null);
    if(att.owner===0&&_ow===G.nemesis) aStr*=1.15; }
  if(tu){

    let dStr=unitStrength(tu,false)*aiCombatMult(tu.owner);
    if(UNITS[att.type].antiMounted&&UNITS[tu.type].mounted) dStr*=0.6;
    const ratio=aStr/dStr;
    out.dmgDef=Math.round(clamp(26*Math.pow(ratio,1.35),3,80));
    out.dmgAtt=ranged?0:Math.round(clamp(18*Math.pow(1/ratio,1.35),2,55));
    out.defName=UNITS[tu.type].name; out.defIco=UNITS[tu.type].ico; out.defHp=Math.max(0,Math.round(tu.hp)); out.defMax=tu.maxhp; out.isCity=false;
    out.killsDef=out.dmgDef>=tu.hp; out.diesAtt=out.dmgAtt>=att.hp;
  } else if(tc){
    let dStr=cityStrength(tc)*aiCombatMult(tc.owner); if(UNITS[att.type].siege) dStr*=0.6;
    const ratio=aStr/dStr;
    out.dmgDef=Math.round(clamp(26*Math.pow(ratio,1.3),4,60));
    out.dmgAtt=ranged?0:Math.round(clamp(16*Math.pow(1/ratio,1.2),2,40));
    out.defName=tc.name; out.defIco="\u{1F3DB}\uFE0F"; out.defHp=Math.max(0,Math.round(tc.hp)); out.defMax=tc.maxhp; out.isCity=true;

function showForecast(att,target){

function handleTap(sx,sy){
  if(G.over||moving) return; const i=screenToTile(sx,sy); const prevPending=pendingAtk; pendingAtk=null; clearForecast(); if(i<0){deselect(); return;} if(G.cur!==0) return;
  const tu=unitAt(i),tc=cityAt(i); const sel=G.selUnit!=null?unitById(G.selUnit):null;

    if(enemyUnit||enemyCity){ if(enemyUnit&&UNITS[tu.type].civilian){ tryAttack(sel,i); } else if(canAttackNow(sel,i)){ if(prevPending===i){tryAttack(sel,i);} else {pendingAtk=i; showForecast(sel,i);} } else tryAttack(sel,i); return; }
    if(tc&&tc.owner===0){selectCity(tc); openCity(tc); return;} // tapped your own city -> open it, don't move in

let moving=null;
function tryMove(unit,target){
  if(unit.moved&&unit.mp<=0){toast("No moves left."); return;}
  const R=reachable(unit);
  if(R.rem.has(target)){
    const path=pathTo(R.prev,target);
    G._undo={id:unit.id,from:unit.tile,mp:unit.mp,fortified:unit.fortified,embarked:!!unit.embarked,turn:G.turn};
    animateMove(unit,path,()=>{unit.mp=R.rem.get(target); unit.moved=true; unit.fortified=0; afterUnitAct(unit);});
  } else {
    const ut=xy(unit.tile),tt=xy(target); let best=null,bd=cheby(ut[0],ut[1],tt[0],tt[1]);
    for(const[k,v] of R.rem){const kk=xy(k); const d=cheby(kk[0],kk[1],tt[0],tt[1]); if(d<bd){bd=d;best=k;}}
    if(best!=null){const path=pathTo(R.prev,best); animateMove(unit,path,()=>{unit.mp=R.rem.get(best); unit.moved=true; unit.fortified=0; afterUnitAct(unit);});}
    else toast("Can't reach there.");
  }
}
function afterUnitAct(unit){recomputeVisibility(); if(G.selUnit===unit.id) selectUnit(unit); updateHUD(); checkVictory(); saveGame();}
function animateMove(unit,path,done){if(path.length<=1){done(); return;} moving={unit,path,seg:0,t:0,done}; sfx("move");}
function stepMovingAnim(dt){
  if(!moving) return; const m=moving,speed=8; m.t+=dt*speed;
  while(m.t>=1&&m.seg<m.path.length-1){m.t-=1; m.seg++; const ti=m.path[m.seg]; m.unit.tile=ti; const p=xy(ti); m.unit.px=p[0]; m.unit.py=p[1]; revealAround(ti,m.unit.owner,2);}

  const a=xy(m.path[m.seg]),b=xy(m.path[m.seg+1]); m.unit.px=lerp(a[0],b[0],m.t); m.unit.py=lerp(a[1],b[1],m.t);

function unitStrength(unit,attacking){
  const u=UNITS[unit.type]; let s=attacking?u.atk:u.def;

  s*=(0.5+0.5*(unit.hp/unit.maxhp));

function stepHorde(){

function autoExplore(u){

    const t=G.map[i]; if(t.explored[0]) continue; if(!TERR[t.t].land||TERR[t.t].block) continue;
    const p=xy(i),d=cheby(up[0],up[1],p[0],p[1]);

function runAutomation(){
  const p0=G.players[0]; if(!p0||p0.defeated||G.over) return;

function vassalTurn(p){

/* ---- world congress ---- */
const CONGRESS_RES=[
 {id:"peace",ico:"\uD83D\uDD4A\uFE0F",nm:"Peace Accords",ds:"All wars end at once"},
 {id:"sci",ico:"\uD83D\uDD2C",nm:"Science Fund",ds:"Every nation gains +40 science"},
 {id:"charter",ico:"\uD83D\uDCB0",nm:"Trade Charter",ds:"Every nation gains +50 gold"},
 {id:"aid",ico:"\uD83E\uDD32",nm:"Aid the Weak",ds:"The smallest empire receives +120 gold"},
 {id:"denounce",ico:"\u2696\uFE0F",nm:"Wealth Levy",ds:"The richest empire is taxed 20%, split among the rest"}
];
function applyResolution(r){
  const majors=G.players.filter(q=>!q.defeated&&!q.minor);
  if(r.id==="peace"){
    for(let a=0;a<G.players.length;a++)for(let b=a+1;b<G.players.length;b++){
      const A=G.players[a],B=G.players[b];
      if(A.defeated||B.defeated) continue;
      if(isAtWar(a,b)) makePeace(a,b);
    }
    return "All wars across the world have ended.";
  }
  if(r.id==="sci"){ for(const q of majors) q.science+=40; return "Every nation gains +40 science."; }
  if(r.id==="charter"){ for(const q of majors) q.gold+=50; return "Every nation gains +50 gold."; }
  if(r.id==="aid"){ let w2=null,wc=1e9; for(const q of majors){const n=G.cities.filter(c=>c.owner===q.id).length; if(n<wc){wc=n;w2=q;}} if(w2){w2.gold+=120; return w2.civ+" (smallest empire) receives +120 gold.";} return "No aid was needed."; }
  if(r.id==="denounce"){ let rich=null,rg=-1; for(const q of majors){ if((q.gold||0)>rg){rg=q.gold||0;rich=q;} } if(rich&&rg>20){ const tax=Math.round(rg*0.2); rich.gold-=tax; const others=majors.filter(q=>q!==rich); const cut=others.length?Math.floor(tax/others.length):0; for(const o of others) o.gold+=cut; return rich.civ+" is taxed "+tax+" gold, shared among the rest."; } return "The levy found no great fortune."; }
  return "";
}
function congressVotes(){
  const v={}; let pv=2;
  for(const q of G.players){
    if(q.id===0||q.defeated) continue;
    if(q.minor){ if((q.influence||0)>=60&&!isAtWar(0,q.id)) pv+=1; continue; }
    const bq=2+Math.floor(G.cities.filter(c=>c.owner===q.id).length/3);
    if(q.vassalOf===0){ pv+=bq; continue; }
    if((q.favor||0)>=2&&!isAtWar(0,q.id)){ pv+=bq; continue; }
    v[q.id]=bq;
  }
  v[0]=pv; return v;
}
function congressStandings(){
  const pts=(G.congress&&G.congress.points)||{}; let best=0,bid=null;
  for(const k in pts){ if(k!=="0"&&pts[k]>best){best=pts[k];bid=k;} }
  return {you:pts[0]||0,best:best,bid:bid};
}
function runCongress(){
  if(!G.congress||G.over) return;
  G.congress.next=G.turn+15;
  const votes=congressVotes();
  let host=null,hv=-1,tie=false;
  for(const k in votes){ const n=votes[k]; if(n>hv){hv=n;host=parseInt(k,10);tie=false;} else if(n===hv) tie=true; }
  if(tie) host=null;
  let winLine="Deadlock \u2014 no host was crowned this session.";
  if(host!=null){
    G.congress.points[host]=(G.congress.points[host]||0)+1;
    const hp2=G.players[host]; hp2.gold+=50;

    const hpw=G.players[host];
    endGame(host===0,host===0?"Diplomatic Victory":"Defeat",host===0?"Three times the world crowned you Host. The nations of the earth now follow your voice \u2014 the World Congress is yours forever.":hpw.leader+" has been crowned permanent Ruler of the World Congress. The nations follow another voice.");
    return;

  const el=$('congress'); if(!el) return;
  const std=congressStandings();
  const standLine="Points \u2014 You: "+std.you+"/3"+(std.bid!=null?" \u00B7 "+G.players[std.bid].civ+": "+std.best+"/3":"");
  const voteLine="Your bloc: "+votes[0]+" votes";
  if(host===0){
    const picks=[]; const pool=CONGRESS_RES.slice();
    while(picks.length<3&&pool.length){ picks.push(pool.splice(rint(pool.length),1)[0]); }
    let html="<div class='promo-card'><div class='promo-hd'>\uD83C\uDFDB\uFE0F WORLD CONGRESS</div><div class='promo-sub'>"+winLine+"<br>"+voteLine+" \u00B7 "+standLine+"<br><b>As Host, choose the resolution:</b></div><div class='promo-opts'>";
    for(const r of picks) html+="<button class='promo-opt' data-r='"+r.id+"'><div class='po-ico'>"+r.ico+"</div><div class='po-nm'>"+r.nm+"</div><div class='po-ds'>"+r.ds+"</div></button>";
    html+="</div></div>"; el.innerHTML=html; el.style.display='flex'; try{sfx("victory");}catch(e){}
    el.querySelectorAll('[data-r]').forEach(btn=>{btn.onclick=()=>{
      const r=CONGRESS_RES.find(x=>x.id===btn.getAttribute('data-r'));
      const line=applyResolution(r);
      el.style.display='none'; toast("\uD83C\uDFDB\uFE0F "+r.nm+": "+line); updateHUD(); saveGame();
    };});
  } else {
    const r=CONGRESS_RES[rint(CONGRESS_RES.length)];
    const line=applyResolution(r);
    el.innerHTML="<div class='promo-card'><div class='promo-hd'>\uD83C\uDFDB\uFE0F WORLD CONGRESS</div><div class='promo-sub'>"+winLine+"<br>"+voteLine+" \u00B7 "+standLine+"</div><div class='promo-opts'><button class='promo-opt' data-c='ok'><div class='po-ico'>"+r.ico+"</div><div class='po-nm'>"+r.nm+"</div><div class='po-ds'>"+line+"</div></button></div></div>";
    el.style.display='flex'; try{sfx("found");}catch(e){}
    el.querySelector('[data-c]').onclick=()=>{el.style.display='none';};
    updateHUD(); saveGame();
  }
}

/* ---- pillage & merge ---- */
function canPillage(u){
  if(UNITS[u.type].civilian||u.mp<=0||u.moved) return null;
  const t=G.map[u.tile];
  if(t.owner<0||t.owner===u.owner) return null;
  if(!isAtWar(u.owner,t.owner)) return null;
  if(t.improv) return t.improv;
  if(t.road) return "road";
  return null;
}
function pillage(u){

  const p=G.players[u.owner]; if(p) p.gold+=loot;

  if(u.owner===0){
    toast("\uD83D\uDD25 Pillaged the "+what+" \u2014 +"+loot+" gold, +20 HP!");

function mergeTarget(u){

    const a=unitAt(ni);

function mergeUnits(u,a){

function sharedWarTarget(fid){

  city.owner=byUnit.owner; city.captured=true; city.hp=Math.round(city.maxhp*0.4); city.pop=Math.max(1,city.pop-1);
  city.building=pickDefaultBuild(city); city.buildProg=0;
  for(const t of G.map){if(t.ownerCity===city.id) t.owner=city.owner;}
  claimTiles(city); byUnit.xp=(byUnit.xp||0)+2; checkPromotion(byUnit); checkHero(byUnit); // attacker stays adjacent — nothing occupies the city tile
  fx_found(city.tile); sfx("capture"); shake(12); flashScreen("#e8b44a",0.4);
  if(byUnit.owner===0) toast("Captured "+city.name+"!"); else toast(city.name+" has fallen to "+G.players[byUnit.owner].leader+"!");
  if(G.players[_old]&&G.players[_old].minor&&byUnit.owner===0){ for(const q of G.players){ if(q.minor&&!q.defeated&&q.id!==_old) q.influence=Math.max(0,(q.influence||0)-30);} toast("The remaining city-states denounce your conquest!"); }
  if(_old===G.nemesis&&byUnit.owner===0&&!G.cities.some(cc=>cc.owner===_old)) G.nemesisSlainBy=0;
  if(byUnit.owner===0) offerAnnexRaze(city);
}

/* ---- worker ---- */
function workerBuild(unit,kind){
  const tt=G.map[unit.tile];
  if(tt.nat){toast("A natural wonder can't be improved."); return;}
  if(kind==="farm"&&["grass","plains","desert"].indexOf(tt.t)<0){toast("Farms need grass/plains/desert."); return;}
  if(kind==="mine"&&["hills"].indexOf(tt.t)<0){toast("Mines need hills."); return;}
  if(kind==="pasture"&&["plains","grass"].indexOf(tt.t)<0){toast("Pasture needs plains/grass."); return;}
  if(kind==="chop"&&tt.t!=="forest"){toast("You can only chop forests."); return;}
  const turns=kind==="road"?2:3; unit.moved=true; unit.mp=0;
  if(G.mods&&G.mods.fastWork){ unit.work={kind,turns:1,left:1}; finishWorkerTask(unit); selectUnit(unit); updateHUD(); saveGame(); return; }
  unit.work={kind,turns,left:turns};
  toast(kind==="chop"?"Worker clearing the forest...":"Worker building "+kind+"..."); selectUnit(unit); updateHUD(); saveGame();
}
function finishWorkerTask(u){
  const tt=G.map[u.tile],kind=u.work?u.work.kind:null; if(!kind){u.work=null; return;}
  if(kind==="road") tt.road=true;
  else if(kind==="chop"){
    tt.t="grass"; tt.improv=null;
    let bestC=null,bd=5; const up=xy(u.tile);
    for(const c of G.cities){if(c.owner!==u.owner)continue; const cp=xy(c.tile); const d=cheby(up[0],up[1],cp[0],cp[1]); if(d<bd){bd=d;bestC=c;}}
    if(bestC){bestC.buildProg+=20; if(u.owner===0) toast("Forest cleared — 20⚒ rushed to "+bestC.name+"!");}
    else if(u.owner===0) toast("Forest cleared to grassland.");
    if(u.owner===0) fx_grow(u.tile);
  }
  else { tt.improv=kind; if(u.owner===0){toast("Worker finished "+kind+"."); fx_grow(u.tile);} }
  u.work=null;
}
function progressWorkers(owner){
  for(const u of G.units){
    if(u.owner!==owner||!u.work) continue; u.work.left--;
    if(u.work.left<=0) finishWorkerTask(u);
  }
}

/* ---- turn loop ---- */
function endTurn(){
  if(G.over||moving) return; if(G.cur!==0) return; deselect();
  processPlayerTurn(0); checkVictory(); if(G.over){updateHUD(); return;}
  aiTurnStep(1);
}
function aiTurnStep(idx){
  while(idx<G.players.length && G.players[idx].defeated) idx++;
  if(idx>=G.players.length){ try{ runBarbarians(); }catch(e){console&&console.warn&&console.warn(e);} checkVictory(); if(G.over){updateHUD(); return;} endRound(); return; }
  G.cur=idx; updateHUD();
  setTimeout(function(){
    try{ runAI(idx); }catch(e){console&&console.warn&&console.warn(e);}
    processPlayerTurn(idx); checkVictory();
    if(G.over){ updateHUD(); return; }
    aiTurnStep(idx+1);
  },120);
}
function endRound(){
  G.turn++; G.cur=0;
  // Heal every kingdom's units (while this round's attacked/work flags still apply).
  for(const u of G.units){
    if(u.work||u.attacked) continue;
    if(G.diff==="chill"&&u.owner!==0) continue; // Settler difficulty: rivals & barbarians don't heal
    const onCity=!!cityAt(u.tile), home=G.map[u.tile].owner===u.owner;
    let h=onCity?12:(home?8:(u.fortified>0?5:3));
    if(G.diff==="chill"&&u.owner===0) h+=5;
    u.hp=Math.min(u.maxhp,u.hp+h);
  }
  stepHorde();
  stepFaith();
  stepCongress();
  processRazing();
  stepQuests();
  processTrade();
  progressTraining();
  // Refresh units for the new round.
  for(const u of G.units){u.mp=UNITS[u.type].move+(u.promos&&u.promos.move?1:0)+(UNITS[u.type].mounted?(civT(u.owner).mountedMove||0):0); u.moved=false; u.attacked=false; if(u.train||u.trading){u.mp=0; u.moved=true;}}
  runAutomation();
  stepGoldenAge();
  stepCulture();
  stepCityStates();
  accrueGP();
  recomputeVisibility(); updateEra(); updateHUD(); checkVictory(); maybeEvent(); saveGame(); nextUnit(); flushPromos(); flushGP();
}
function processPlayerTurn(owner){
  const p=G.players[owner]; if(p.defeated) return; let goldInc=0,sciInc=0;
  for(const c of G.cities){
    if(c.owner!==owner) continue; const y=cityYields(c); c.food+=y.foodSurplus; const growReq=12+c.pop*8;
    if(c.food<0){if(c.pop>1&&c.food<-growReq*0.5){c.pop--; c.food=0; if(owner===0) toast(c.name+" is starving!");} else c.food=Math.max(c.food,0);}
    else if(c.food>=growReq&&c.pop<y.popcap){c.food-=growReq; c.pop++; if(owner===0){toast(c.name+" grew to pop "+c.pop+"."); fx_grow(c.tile);} claimTiles(c);}
    else if(c.food>=growReq&&c.pop>=y.popcap) c.food=growReq;
    if(!c.building) c.building=pickDefaultBuild(c);
    if(c.building.kind!=="none"){
      c.buildProg+=Math.max(1,y.prod); const cost=buildCost(c.building,c.owner);
      if(c.buildProg>=cost){completeBuild(c); c.buildProg=0;}
    }
    goldInc+=y.gold; sciInc+=y.sci; if(!(G.diff==="chill"&&owner!==0)) c.hp=Math.min(c.maxhp,c.hp+(c.captured?4:8));
  }
  const units=G.units.filter(u=>u.owner===owner).length, cityCount=G.cities.filter(c=>c.owner===owner).length;
  goldInc-=Math.max(0,units-cityCount*2);
  if(G.mods&&G.mods.goldRush&&owner===0) goldInc=Math.round(goldInc*1.6)+cityCount*3;
  progressWorkers(owner);
  p.gold+=goldInc;
  if(p.researching){const t=techById[p.researching]; p.science+=sciInc;
    if(p.science>=t.cost){p.science-=t.cost; p.techs[t.id]=true; p.researchedOrder.push(t.id); p.researching=null;
      if(owner===0){toast("Researched "+t.name+"! ("+t.unlock+")"); sfx("tech"); pickAutoResearch(p,true);} else pickAutoResearch(p,false); checkVictory();}
  } else if(owner!==0) pickAutoResearch(p,false);
  p._goldInc=goldInc; p._sciInc=sciInc;
}
function buildStillValid(c,item){
  if(!item) return false; var p=G.players[c.owner];
  if(item.kind==="unit"){var u=UNITS[item.id]; return !!u&&(!u.tech||p.techs[u.tech]);}
  if(item.kind==="building"){var b=BUILDINGS[item.id]; return !!b&&!c.buildings[item.id]&&(!b.tech||p.techs[b.tech]);}
  if(item.kind==="wonder"){var w=WONDERS[item.id]; return !!w&&!c.buildings[item.id]&&!wonderTaken(item.id)&&(!w.tech||p.techs[w.tech]);}
  return false;
}
function dequeueBuild(c){ if(!c.queue) return null; while(c.queue.length){var it=c.queue.shift(); if(buildStillValid(c,it)) return it;} return null; }
function completeBuild(c){
  const item=c.building;
  if(item.kind==="unit"){
    // Units never spawn on the city tile itself — find an adjacent free tile (water for ships).
    let spot=null;
    const _nav=!!UNITS[item.id].naval;
    for(const ni of neighIdx(c.tile)){const tt=G.map[ni]; const okTerr=_nav?(!TERR[tt.t].land&&!TERR[tt.t].block):(TERR[tt.t].land&&!TERR[tt.t].block); if(okTerr&&!unitAt(ni)&&!cityAt(ni)){spot=ni; break;}}
    if(spot==null){
      c.buildProg=Math.min(c.buildProg,buildCost(item,c.owner)); // ready, but no room to deploy
      if(c.owner===0&&!c._noRoom){toast(c.name+": no space to deploy "+UNITS[item.id].name+" — move a unit aside."); c._noRoom=true;}
      return;
    }
    c._noRoom=false;
    const nu=spawnUnit(spot,item.id,c.owner);
    if(c.buildings.barracks&&!UNITS[item.id].civilian){ nu.xp=(BUILDINGS.barracks.vetXP||3); nu._promoLvl=unitLevel(nu); } // trained as veterans
    if(c.owner===0&&hasPol("warcode")&&!UNITS[item.id].civilian){ nu.xp=(nu.xp||0)+3; nu._promoLvl=unitLevel(nu); }
    if(item.id==="caravan") nu.home=c.id;
    if(c.owner===0) toast(c.name+" trained "+UNITS[item.id].name+(nu.xp>0?" (veteran)":"")+".");
    c.building=dequeueBuild(c)||item; // pull the queue, else keep producing the same unit
  } else if(item.kind==="wonder"){
    const wd=WONDERS[item.id];
    if(wonderTaken(item.id)){ if(c.owner===0) toast(wd.name+" was completed elsewhere first!"); c.buildProg=0; c.building=dequeueBuild(c)||pickSmartBuild(c); }
    else {
      if(!G.wonderOwner) G.wonderOwner={}; G.wonderOwner[item.id]=c.owner; c.buildings[item.id]=true;
      if(wd.freeTech){const pl=G.players[c.owner],opts=TECHS.filter(t=>t.id!=="sflight"&&canResearch(pl,t)); if(opts.length){const t=pick(opts); pl.techs[t.id]=true; pl.researchedOrder.push(t.id); if(c.owner===0) toast("Great Library reveals "+t.name+"!");}}
      if(c.owner===0){toast("✦ WONDER COMPLETE — "+wd.name+"!"); fx_found(c.tile); shake(10); sfx("victory"); gaBoost(10); questEvent("wonder",item.id);}
      else toast(G.players[c.owner].leader+" has completed "+wd.name+"!");
      c.building=dequeueBuild(c)||pickSmartBuild(c);
    }
  } else {
    c.buildings[item.id]=true;
    if(item.kind==="building"&&item.id==="temple"&&c.owner===0){ if(!G.religion||!G.religion.belief){ foundReligion(); } else { c.faith=0; toast(c.name+" joins "+G.religion.name+"."); } }
    if(item.kind==="building"&&(BUILDINGS[item.id].wallHP)){c.maxhp=100+(c.buildings.walls?50:0)+(c.buildings.castle?90:0); c.hp=Math.min(c.maxhp,c.hp+ (BUILDINGS[item.id].wallHP||0));}
    if(c.owner===0){toast(c.name+" built "+BUILDINGS[item.id].name+"."); fx_grow(c.tile);}
    c.building=dequeueBuild(c)||pickSmartBuild(c);
  }
  if(c.owner===0&&G.selCity===c.id&&isOpen("cityscreen")) renderCityScreen(c);
}
function pickSmartBuild(c){
  const avail=availableBuilds(c); const bld=avail.filter(b=>b.kind==="building");
  if(bld.length&&RNG()<0.5) return pick(bld);
  const mil=avail.filter(b=>b.kind==="unit"&&!UNITS[b.id].civilian); mil.sort((a,b)=>UNITS[b.id].atk-UNITS[a.id].atk);
  return mil[0]?{kind:"unit",id:mil[0].id}:{kind:"unit",id:"warrior"};
}

/* ---- research ---- */
function canResearch(p,t){if(p.techs[t.id]) return false; return t.prereq.every(r=>p.techs[r]);}
function pickAutoResearch(p,human){
  const options=TECHS.filter(t=>canResearch(p,t)); if(!options.length){p.researching=null; return;}
  options.sort((a,b)=>a.cost-b.cost);
  if(human){p.researching=options[0].id; toast("Now researching "+techById[p.researching].name+".");}
  else p.researching=options[Math.min(options.length-1,rint(2))].id;
}
function setResearch(id){
  const p=G.players[0],t=techById[id]; if(!canResearch(p,t)){toast("Prerequisites not met."); return;}
  p.researching=id; updateHUD(); renderTechScreen(); saveGame(); toast("Researching "+t.name+".");
}

/* ---- AI ---- */
function runAI(owner){
  const p=G.players[owner]; if(p.defeated) return; const diff=DIFFS[G.diff];
  if(p.minor){ csRunTurn(p); return; }
  aiDiplomacy(p,diff);
  aiMaybeUpgrade(p);
  for(const c of G.cities){if(c.owner!==owner) continue; c.building=aiChooseProduction(c,p,diff);}
  if(!p.researching) pickAutoResearch(p,false);
  const myUnits=G.units.filter(u=>u.owner===owner).slice();
  for(const u of myUnits){if(!unitById(u.id)) continue; try{aiMoveUnit(u,p,diff);}catch(e){}}
}
function aiCityCount(owner){return G.cities.filter(c=>c.owner===owner).length;}
function aiChooseProduction(c,p,diff){
  const avail=availableBuilds(c); const myCities=aiCityCount(p.id);
  const mySettlers=G.units.filter(u=>u.owner===p.id&&u.type==="settler").length;
  const _cp=xy(c.tile);
  const hasDef=G.units.some(function(u){if(u.owner!==p.id||UNITS[u.type].civilian)return false; const up=xy(u.tile); return cheby(up[0],up[1],_cp[0],_cp[1])<=1;});
  // 1) every city should have a defender
  if(!hasDef){const m=bestMilitary(avail); if(m&&RNG()<0.92) return {kind:"unit",id:m};}
  // 2) expand early
  if(myCities<5&&mySettlers<1&&G.turn>2&&c.pop>=2&&RNG()<0.5) return {kind:"unit",id:"settler"};
  // 2b) build a worker to develop the land — farms/mines boost the AI's cities
  const myWorkers=G.units.filter(function(x){return x.owner===p.id&&x.type==="worker";}).length;
  if(myWorkers<myCities&&c.pop>=2&&RNG()<0.4) return {kind:"unit",id:"worker"};
  // 3) economy buildings (helps the AI keep up long-term)
  const bld=avail.filter(b=>b.kind==="building");
  if(bld.length&&RNG()<0.4) return pick(bld);
  // 3b) sometimes race for a wonder
  const won=avail.filter(b=>b.kind==="wonder");
  if(won.length&&c.pop>=3&&RNG()<0.22) return pick(won);
  // 4) build a varied army (archers, horsemen, scouts, frontline), scaled by aggression
  const m=aiPickMilitary(avail);
  const _atWarNow=warCount(p.id)>0;
  if(m&&RNG()<(_atWarNow?0.55:0.36)+(_atWarNow?0.45:0.3)*diff.aiAggro) return {kind:"unit",id:m};
  return m?{kind:"unit",id:m}:{kind:"unit",id:"warrior"};
}
function bestMilitary(avail){const mil=avail.filter(b=>b.kind==="unit"&&!UNITS[b.id].civilian); mil.sort((a,b)=>(UNITS[b.id].atk+UNITS[b.id].def)-(UNITS[a.id].atk+UNITS[a.id].def)); return mil[0]?mil[0].id:null;}
function aiPickMilitary(avail){
  const mil=avail.filter(b=>b.kind==="unit"&&!UNITS[b.id].civilian); if(!mil.length) return null;
  function best(fn){const f=mil.filter(fn); f.sort((a,b)=>(UNITS[b.id].atk+UNITS[b.id].def)-(UNITS[a.id].atk+UNITS[a.id].def)); return f[0]?f[0].id:null;}
  const ranged=best(b=>UNITS[b.id].ranged), mounted=best(b=>UNITS[b.id].mounted), frontline=best(b=>!UNITS[b.id].ranged);
  const hasScout=mil.some(b=>b.id==="scout"), r=RNG();
  if(r<0.26&&ranged) return ranged;            // archers / catapults / artillery
  if(r<0.48&&mounted) return mounted;           // horsemen / chariots / knights
  if(r<0.58&&hasScout&&G.turn<30) return "scout"; // early recon
  return frontline||bestMilitary(avail);
}
function aiImprovKind(terr){ return terr==="hills"?"mine":(terr==="grass"||terr==="plains"||terr==="desert")?"farm":null; }
function aiWorkerStart(u){ const t=G.map[u.tile],k=aiImprovKind(t.t); if(!k||t.improv||t.nat) return; u.work={kind:k,turns:3,left:3}; u.mp=0; u.moved=true; }
function aiWorkerAct(u,p){
  if(u.work){ u.mp=0; u.moved=true; return; } // already improving a tile
  let best=null,bd=1e9; const up=xy(u.tile);
  for(let i=0;i<G.map.length;i++){ const t=G.map[i]; if(t.owner!==p.id||t.improv||t.nat) continue; if(!aiImprovKind(t.t)) continue; const v=unitAt(i); if(v&&i!==u.tile) continue; const tp=xy(i),d=cheby(up[0],up[1],tp[0],tp[1]); if(d<bd){bd=d;best=i;} }
  if(best==null){ aiWander(u); return; }
  if(best===u.tile){ aiWorkerStart(u); return; }
  aiStepToward(u,best);
  if(u.tile===best) aiWorkerStart(u);
}
function aiMoveUnit(u,p,diff){
  const U=UNITS[u.type];
  if(u.train){u.mp=0; u.moved=true; return;}
  if(u.type==="settler"){
    if(aiGoodSettle(u.tile)){foundCity(u); return;}
    const tgt=aiFindSettleSpot(u);
    if(tgt!=null){aiStepToward(u,tgt); if(aiGoodSettle(u.tile)) foundCity(u);} else aiWander(u); return;
  }
  if(u.type==="worker"){aiWorkerAct(u,p); return;}
  const targets=[];
  for(const e of G.units){if(e.owner!==p.id&&isAtWar(p.id,e.owner)&&G.map[e.tile].explored[p.id]) targets.push({i:e.tile});}
  for(const c of G.cities){if(c.owner!==p.id&&isAtWar(p.id,c.owner)&&G.map[c.tile].explored[p.id]) targets.push({i:c.tile});}
  const aggressive=RNG()<diff.aiAggro||aiCityThreatened(p.id);
  if(targets.length&&aggressive){
    const up=xy(u.tile);
    targets.sort((a,b)=>cheby(up[0],up[1],...xy(a.i))-cheby(up[0],up[1],...xy(b.i)));
    const tgt=targets[0],range=U.range||1,tp=xy(tgt.i);
    if(U.ranged&&cheby(up[0],up[1],tp[0],tp[1])<=range&&!u.attacked){doCombat(u,tgt.i,true); return;}
    if(!U.ranged&&cheby(up[0],up[1],tp[0],tp[1])===1&&!u.attacked){doCombat(u,tgt.i,false); return;}
    aiStepToward(u,tgt.i);
    const np=xy(u.tile);
    if(!u.attacked){if(U.ranged&&cheby(np[0],np[1],tp[0],tp[1])<=range) doCombat(u,tgt.i,true); else if(!U.ranged&&cheby(np[0],np[1],tp[0],tp[1])===1) doCombat(u,tgt.i,false);}
    return;
  }
  const mc=aiNearestOwnCity(u.tile,p.id);
  if(mc!=null){
    const up=xy(u.tile),cp=xy(mc),d=cheby(up[0],up[1],cp[0],cp[1]);

    aiStepToward(u,mc);
    const np=xy(u.tile); if(cheby(np[0],np[1],cp[0],cp[1])<=1){ u.fortified=1; u.mp=0; }
    return;
  }
  aiWander(u);
}
function aiCityThreatened(owner){
  for(const c of G.cities){if(c.owner!==owner) continue; const cp=xy(c.tile);
    for(const e of G.units){if(e.owner!==owner&&isAtWar(owner,e.owner)){const ep=xy(e.tile); if(cheby(cp[0],cp[1],ep[0],ep[1])<=3) return true;}}}
  return false;
}
function aiNearestOwnCity(i,owner){let best=null,bd=1e9; const ip=xy(i); for(const c of G.cities){if(c.owner!==owner)continue; const cp=xy(c.tile); const d=cheby(ip[0],ip[1],cp[0],cp[1]); if(d<bd){bd=d;best=c.tile;}} return best;}
function aiGoodSettle(i){const[x,y]=xy(i); if(!TERR[G.map[i].t].land||TERR[G.map[i].t].block) return false; for(const c of G.cities){const cp=xy(c.tile); if(cheby(x,y,cp[0],cp[1])<3) return false;} return landScore(i)>5;}
function aiFindSettleSpot(u){const up=xy(u.tile); let best=null,bs=-1; for(let i=0;i<G.map.length;i++){if(!aiGoodSettle(i))continue; const p=xy(i); const d=cheby(up[0],up[1],p[0],p[1]); if(d>10)continue; const sc=landScore(i)-d*0.5; if(sc>bs){bs=sc;best=i;}} return best;}
function aiStepToward(u,target){

}
function aiWander(u){

}

var EVENTS=[

/* ---- FX ---- */
function shake(a){if(G) G.anim.shake=Math.max(G.anim.shake,a);}
function flashScreen(col,amt){if(G){G.anim.flash=Math.max(G.anim.flash||0,amt); G.anim.flashCol=col;}}
function stepFX(dt){
  G.anim.shake=Math.max(0,G.anim.shake-dt*40);
  if(G.anim.flash) G.anim.flash=Math.max(0,G.anim.flash-dt*1.7);
  const P=G.anim.particles; for(let i=P.length-1;i>=0;i--){const p=P[i]; p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=p.g*dt; if(p.life<=0) P.splice(i,1);}
  const F=G.anim.floats; for(let i=F.length-1;i>=0;i--){const f=F[i]; f.life-=dt; f.y-=dt*0.7; if(f.life<=0) F.splice(i,1);}
}
function drawFX(){
  for(const p of G.anim.particles){ctx.globalAlpha=clamp(p.life/p.max,0,1); ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x*TILE,p.y*TILE,p.r,0,7); ctx.fill();}
  ctx.globalAlpha=1; ctx.textAlign="center"; ctx.textBaseline="middle";
  for(const f of G.anim.floats){ctx.globalAlpha=clamp(f.life/f.max,0,1); ctx.font="bold "+(TILE*0.28)+"px Inter,sans-serif"; ctx.fillStyle="rgba(0,0,0,0.6)"; ctx.fillText(f.txt,f.x*TILE+1,f.y*TILE+1); ctx.fillStyle=f.col; ctx.fillText(f.txt,f.x*TILE,f.y*TILE);}
  ctx.globalAlpha=1;
}
function burst(i,col,n,spd){const p=xy(i),cx=p[0]+0.5,cy=p[1]+0.5; for(let k=0;k<n;k++){const a=rrange(0,Math.PI*2),s=rrange(spd*0.3,spd); G.anim.particles.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,g:rrange(1.5,3),r:rrange(1.5,3.5),col,life:rrange(0.4,0.8),max:0.8});}}
function floatText(i,txt,col){const p=xy(i); G.anim.floats.push({x:p[0]+0.5,y:p[1]+0.3,txt,col,life:1.1,max:1.1});}

function openCity(c){openCityId=c.id; G.selCity=c.id; showOverlay('cityscreen'); renderCityScreen(c);}
function renderCityScreen(c){
  if(c.id!==openCityId){const cc=cityById(openCityId); if(cc) c=cc;}
  $('cs-name').innerHTML=c.name+"<span class='sm'>Population "+c.pop+"</span>";
  $('cs-emblem').style.background=G.players[c.owner].color+"33";
  const y=cityYields(c),growReq=12+c.pop*8,growPct=clamp(c.food/growReq*100,0,100);
  const item=c.building,cost=item?buildCost(item,c.owner):0,prPct=cost?clamp(c.buildProg/cost*100,0,100):0;
  const effProd=Math.max(1,y.prod);
  const turnsLeft=item?Math.max(1,Math.ceil((cost-c.buildProg)/effProd)):"—";
  let html="";
  html+="<div class='yieldrow'>"+yp(y.food,"🍞 Food",y.foodSurplus>=0?"#5fcf80":"#e8503f",(y.foodSurplus>=0?"+":"")+y.foodSurplus+"/turn")+yp(y.prod,"⚒ Prod","#e8b44a","")+yp(y.gold,"🪙 Gold","#e8b44a","")+yp(y.sci,"🔬 Sci","#3f8efc","")+"</div>";
  html+="<div class='barlbl'><span>Growth → pop "+(c.pop+1)+(c.pop>=y.popcap?" (needs Aqueduct)":"")+"</span><span>"+Math.max(0,Math.floor(c.food))+"/"+growReq+"</span></div><div class='bar'><i style='width:"+growPct+"%;background:#5fcf80'></i></div>";
  const isNone=item&&item.kind==="none";
  html+="<div class='barlbl'><span>Producing: "+(item?(isNone?"Nothing (idle)":buildName(item)):"Choose below")+"</span><span>"+(item&&!isNone?(Math.floor(c.buildProg)+"/"+cost+" · "+turnsLeft+"t"):"")+"</span></div><div class='bar'><i style='width:"+(isNone?0:prPct)+"%;background:#e8b44a'></i></div>";
  const owned=Object.keys(c.buildings);
  if(owned.length){html+="<div class='sectlbl'>Buildings & Wonders</div><div>"; owned.forEach(k=>{const bd=bDef(k); if(bd) html+="<span class='tag'"+(WONDERS[k]?" style='border:1px solid var(--gold);color:var(--gold)'":"")+">"+bd.ico+" "+bd.name+"</span>";}); html+="</div>";}
  const p=G.players[c.owner];
  const garr=unitAt(c.tile);
  if(garr){
    html+="<div class='sectlbl'>Garrison</div>";
    html+="<div class='builditem' data-garr='sel'><div class='bi-ico'>"+UNITS[garr.type].ico+"</div><div class='bi-main'><div class='bi-name'>"+UNITS[garr.type].name+" on city</div><div class='bi-desc'>Tap to select it and move it off the city.</div></div><div class='bi-cost' style='color:var(--dim)'>HP "+Math.round(garr.hp/garr.maxhp*100)+"%</div></div>";
  }
  if(c.razing){ html+="<div style='font-size:13px;color:#ff8d7e;margin:0 0 10px;font-weight:700;'>\uD83D\uDD25 Razing \u2014 "+c.pop+" turn"+(c.pop===1?"":"s")+" until ash <button class='qitem' data-stopraze='1' style='margin-left:8px'>\uD83D\uDED1 Stop the fires</button></div>"; }
  const _cc=cityCulture(c),_ring=c.ring||1,_nx=_ring<3?Math.max(1,Math.ceil((CUL_TH[_ring]-(c.culture||0))/_cc)):0;
  html+="<div style='font-size:12.5px;color:var(--dim);margin:0 0 10px;'>\uD83C\uDFAD +"+_cc+" culture/turn \u00B7 "+(_ring<3?("borders expand in "+_nx+" turn"+(_nx===1?"":"s")):"borders at maximum reach")+"</div>";
  if(c.queue&&c.queue.length){ html+="<div class='sectlbl'>Build Queue <span style='color:var(--faint);font-weight:500;text-transform:none;letter-spacing:0'>\u2014 tap to remove</span></div><div class='queuewrap'>"; c.queue.forEach(function(q,qi){ html+="<button class='qitem' data-qr='"+qi+"'>"+(qi+1)+". "+buildIco(q)+" "+buildName(q)+" \u2715</button>"; }); html+="</div>"; }
  html+="<div class='sectlbl'>Production</div>";
  html+="<div class='builditem"+(item&&item.kind==="none"?" cur":"")+"' data-bk='none' data-bkind='none'><div class='bi-ico'>⏸️</div><div class='bi-main'><div class='bi-name'>Build Nothing"+(item&&item.kind==="none"?" · idle":"")+"</div><div class='bi-desc'>Pause production — this city makes no units or buildings.</div></div><div class='bi-cost' style='color:var(--dim)'>—</div></div>";
  html+="<div class='sectlbl'>Produce — Units</div>";
  for(const k in UNITS){const u=UNITS[k],locked=u.tech&&!p.techs[u.tech]; if(locked) continue; html+=buildRow(c,{kind:"unit",id:k});}
  html+="<div class='sectlbl'>Produce — Buildings</div>"; let anyB=false;
  for(const k in BUILDINGS){const b=BUILDINGS[k]; if(c.buildings[k]) continue; if(b.tech&&!p.techs[b.tech]) continue; anyB=true; html+=buildRow(c,{kind:"building",id:k});}
  if(!anyB) html+="<div class='hint'>Research new technologies to unlock buildings.</div>";
  let anyW=false,wHtml="";
  for(const k in WONDERS){const w=WONDERS[k]; if(c.buildings[k]||wonderTaken(k)) continue; if(w.tech&&!p.techs[w.tech]) continue; anyW=true; wHtml+=buildRow(c,{kind:"wonder",id:k});}
  if(anyW) html+="<div class='sectlbl' style='color:var(--gold)'>✦ World Wonders <span style='color:var(--faint);font-weight:500;text-transform:none;letter-spacing:0'>— one of each, ever</span></div>"+wHtml;
  $('cs-body').innerHTML=html;
  $('cs-body').querySelectorAll('[data-bk]').forEach(el=>{el.onclick=()=>{setCityProduction(c,{kind:el.getAttribute('data-bkind'),id:el.getAttribute('data-bk')});};});
  $('cs-body').querySelectorAll('[data-q]').forEach(function(el){el.onclick=function(ev){ev.stopPropagation(); c.queue=c.queue||[]; if(c.queue.length<8){c.queue.push({kind:el.getAttribute('data-qkind'),id:el.getAttribute('data-q')}); try{sfx('click');}catch(e){}} renderCityScreen(c);};});
  const _sr=$('cs-body').querySelector('[data-stopraze]'); if(_sr) _sr.onclick=function(){c.razing=false; toast("The fires are quenched \u2014 "+c.name+" is spared."); renderCityScreen(c); saveGame();};
  $('cs-body').querySelectorAll('[data-qr]').forEach(function(el){el.onclick=function(){var qi=parseInt(el.getAttribute('data-qr'),10); if(c.queue){c.queue.splice(qi,1); try{sfx('click');}catch(e){}} renderCityScreen(c);};});
  const gsel=$('cs-body').querySelector("[data-garr='sel']");
  if(gsel) gsel.onclick=()=>{const u=unitAt(c.tile); if(u){hideOverlay('cityscreen'); selectUnit(u); centerOn(u.tile);}};
}
function yp(v,l,col,sub){return "<div class='ypill'><div class='v' style='color:"+col+"'>"+v+"</div><div class='l'>"+l+"</div>"+(sub?"<div class='l' style='color:"+col+"'>"+sub+"</div>":"")+"</div>";}
function buildRow(c,item){
  const cur=c.building&&c.building.kind===item.kind&&c.building.id===item.id,cost=buildCost(item,c.owner),y=cityYields(c),effProd=Math.max(1,y.prod),remain=cur?Math.max(0,cost-c.buildProg):cost,turns=Math.max(1,Math.ceil(remain/effProd)); let desc="";
  if(item.kind==="unit"){const u=UNITS[item.id]; desc=u.civilian?(item.id==="settler"?"Founds a new city":"Builds farms, mines, roads"):("⚔ "+u.atk+"  🛡 "+u.def+"  ◆"+u.move+(u.ranged?"  range "+u.range:""));}
  else desc=(BUILDINGS[item.id]||WONDERS[item.id]).desc;
  return "<div class='builditem"+(cur?' cur':'')+"' data-bk='"+item.id+"' data-bkind='"+item.kind+"'><div class='bi-ico'>"+buildIco(item)+"</div><div class='bi-main'><div class='bi-name'>"+buildName(item)+(cur?" · building":"")+"</div><div class='bi-desc'>"+desc+"</div></div><div class='bi-cost'>"+cost+"<span class='t'>"+turns+" turns</span></div><button class='bi-q' data-q='"+item.id+"' data-qkind='"+item.kind+"'>+</button></div>";
}
function setCityProduction(c,item){c.building=item; sfx("click"); renderCityScreen(c); renderSelPanel(); updateHUD(); saveGame();}

/* ---- tech screen ---- */
function renderTechScreen(){
  const p=G.players[0],list=$('ts-list'); list.innerHTML="";
  $('ts-cur').textContent=p.researching?("Researching "+techById[p.researching].name):"Choose a technology";
  let curEra="";
  for(const t of TECHS){
    if(t.era!==curEra){curEra=t.era; const h=document.createElement('div'); h.className='sectlbl'; h.textContent=curEra+" Era"; list.appendChild(h);}
    const done=p.techs[t.id],cur=p.researching===t.id,can=canResearch(p,t);
    const div=document.createElement('div'); div.className='techitem'+(done?' done':cur?' cur':(!can&&!done)?' locked':'');
    const prog=cur?clamp(p.science/t.cost*100,0,100):(done?100:0); const need=t.prereq.filter(r=>!p.techs[r]).map(r=>techById[r].name);
    div.innerHTML="<div class='ti-ico'>"+t.ico+"</div><div class='ti-main'><div class='ti-name'>"+t.name+(done?" ✓":"")+"</div><div class='ti-unlock'>"+(done?"Unlocked: "+t.unlock:can?("Unlocks: "+t.unlock):("Requires: "+need.join(", ")))+"</div>"+((cur||done)?"<div class='ti-prog'><i style='width:"+prog+"%'></i></div>":"")+"</div><div class='ti-cost'>"+(done?"":t.cost+"<span class='t'>science</span>")+"</div>";
    if(can&&!done) div.onclick=()=>{setResearch(t.id);}; else div.style.cursor='default';
    list.appendChild(div);
  }
}

/* ---- overlays ---- */
function dipAttitude(q){
  if(isAtWar(0,q.id)) return {em:"\uD83D\uDE20",nm:"Hostile"};
  const d=DIFFS[G.diff]; const sc=d.aiAggro+(powerOf(q.id)/(powerOf(0)||1)-1)*0.35-(q.favor||0)*0.18;
  if(sc<0.42) return {em:"\uD83D\uDE0A",nm:"Friendly"};
  if(sc<0.75) return {em:"\uD83D\uDE10",nm:"Wary"};
  return {em:"\uD83D\uDE20",nm:"Hostile"};
}
function renderDipScreen(){
  const body=$('dip-body'); if(!body) return; let html="";

  if(!rivals.length) html="<div style='color:var(--dim);font-size:14px;padding:8px;'>No rivals remain. The world is yours.</div>";

    const nc=G.cities.filter(c=>c.owner===q.id).length;
