<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>KI LEGENDS: HYPERCLASH</title>
<style>
html,body{margin:0;padding:0;background:#05050c;overflow:hidden;position:fixed;width:100%;height:100%;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:none}
canvas{display:block;position:fixed;left:0;top:0;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
/* ============================================================
   KI LEGENDS: HYPERCLASH - a tag-team anime fighter remix
   3v3 tag battles / autocombos / ki blasts / beam clashes /
   vanish strikes / sparking awakenings / assists / arcade ladder
   ES5 only. Single file. Web Audio. Touch-first (iPad Safari).
   ============================================================ */
var CV=document.getElementById('c');
var CTX=CV.getContext('2d');
var W=1024,H=768,DPR=1;
function resize(){
  W=window.innerWidth||1024;H=window.innerHeight||768;
  DPR=Math.min(2,window.devicePixelRatio||1);
  CV.width=Math.floor(W*DPR);CV.height=Math.floor(H*DPR);
  CV.style.width=W+'px';CV.style.height=H+'px';
  if(INP&&INP.layout)INP.layout();
}
window.addEventListener('resize',function(){resize();});
/* ---------- utils ---------- */
var TAU=Math.PI*2;
function sr(r){return r>0.0001?r:0.0001;}
function clamp(v,a,b){return v<a?a:(v>b?b:v);}
function lerp(a,b,t){return a+(b-a)*t;}
function rnd(a,b){return a+Math.random()*(b-a);}
function rndi(a,b){return Math.floor(rnd(a,b+0.999));}
function sgn(v){return v<0?-1:(v>0?1:0);}
function dst(dx,dy){return Math.sqrt(dx*dx+dy*dy);}
function pick(arr){return arr[rndi(0,arr.length-1)];}
function pad2(n){return n<10?'0'+n:''+n;}
/* ---------- save ---------- */
var SAVE={ac:0,sv:0,mute:false};
function loadSave(){
  try{var s=localStorage.getItem('kiclash_save');if(s){var o=JSON.parse(s);
    if(o){SAVE.ac=o.ac||0;SAVE.sv=o.sv||0;SAVE.mute=!!o.mute;}}}catch(e){}
}
function doSave(){
  try{localStorage.setItem('kiclash_save',JSON.stringify(SAVE));}catch(e){}
}
loadSave();
/* ---------- audio ---------- */
var A=(function(){
  var ac=null,master=null,comp=null,musGain=null,muted=SAVE.mute;
  var echoIn=null;
  var musTimer=null,musStep=0,musNext=0,musName=null;
  var beamNode=null,chargeNode=null;
  function init(){
    if(ac)return;
    try{
      var AC=window.AudioContext||window.webkitAudioContext;
      if(!AC)return;
      ac=new AC();
      master=ac.createGain();master.gain.value=muted?0:0.8;
      var out=ac.destination;
      if(ac.createDynamicsCompressor){
        try{
          comp=ac.createDynamicsCompressor();
          comp.threshold.value=-16;comp.knee.value=18;comp.ratio.value=5;
          comp.attack.value=0.004;comp.release.value=0.18;
          master.connect(comp);comp.connect(out);
        }catch(e0){master.connect(out);}
      }else{master.connect(out);}
      /* echo bus */
      if(ac.createDelay){
        try{
          echoIn=ac.createGain();echoIn.gain.value=0.9;
          var dl=ac.createDelay(1.0);dl.delayTime.value=0.27;
          var fb=ac.createGain();fb.gain.value=0.34;
          var fl=ac.createBiquadFilter();fl.type='lowpass';fl.frequency.value=2400;
          var wet=ac.createGain();wet.gain.value=0.5;
          echoIn.connect(dl);dl.connect(fl);fl.connect(fb);fb.connect(dl);
          fl.connect(wet);wet.connect(master);
        }catch(e1){echoIn=null;}
      }
      musGain=ac.createGain();musGain.gain.value=0.30;musGain.connect(master);
    }catch(e){ac=null;}
  }
  function res(){if(ac&&ac.state==='suspended'){try{ac.resume();}catch(e){}}}
  function setMute(m){muted=m;if(master)master.gain.value=m?0:0.8;}
  function env(g,t,a,vol,d){
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(vol,t+a);
    g.gain.exponentialRampToValueAtTime(0.0001,t+d);
  }
  function tone(o){
    /* o:{f,f2,d,type,vol,dl,echo,a,det} */
    if(!ac||muted)return;
    try{
      var t=ac.currentTime+(o.dl||0);
      var os=ac.createOscillator(),g=ac.createGain();
      os.type=o.type||'square';
      os.frequency.setValueAtTime(sr(o.f),t);
      if(o.f2)os.frequency.exponentialRampToValueAtTime(sr(o.f2),t+o.d);
      if(o.det&&os.detune)try{os.detune.value=o.det;}catch(e2){}
      env(g,t,o.a||0.006,o.vol,o.d);
      os.connect(g);g.connect(master);
      if(o.echo&&echoIn){var s2=ac.createGain();s2.gain.value=o.echo;g.connect(s2);s2.connect(echoIn);}
      os.start(t);os.stop(t+o.d+0.05);
    }catch(e){}
  }
  function noise(o){
    /* o:{d,vol,type,fq,fq2,q,dl,echo,a} */
    if(!ac||muted)return;
    try{
      var t=ac.currentTime+(o.dl||0);
      var len=Math.floor(ac.sampleRate*o.d);if(len<1)len=1;
      var buf=ac.createBuffer(1,len,ac.sampleRate);
      var ch=buf.getChannelData(0);
      for(var i=0;i<len;i++){ch[i]=(Math.random()*2-1);}
      var src=ac.createBufferSource();src.buffer=buf;
      var fl=ac.createBiquadFilter();fl.type=o.type||'lowpass';
      fl.frequency.setValueAtTime(sr(o.fq||1200),t);
      if(o.fq2)fl.frequency.exponentialRampToValueAtTime(sr(o.fq2),t+o.d);
      if(o.q!==undefined)fl.Q.value=o.q;
      var g=ac.createGain();
      env(g,t,o.a||0.004,o.vol,o.d);
      src.connect(fl);fl.connect(g);g.connect(master);
      if(o.echo&&echoIn){var s2=ac.createGain();s2.gain.value=o.echo;g.connect(s2);s2.connect(echoIn);}
      src.start(t);
    }catch(e){}
  }
  function duck(){
    if(!ac||!musGain)return;
    try{
      var t=ac.currentTime;
      musGain.gain.cancelScheduledValues(t);
      musGain.gain.setValueAtTime(musGain.gain.value,t);
      musGain.gain.linearRampToValueAtTime(0.10,t+0.06);
      musGain.gain.linearRampToValueAtTime(0.30,t+1.5);
    }catch(e){}
  }
  function mf(m){return 440*Math.pow(2,(m-69)/12);}
  /* -------- music engine -------- */
  var ROOTS=[33,29,24,31];  /* Am F C G feel, low */
  var SCALE=[0,3,5,7,10];
  function intensity(){
    try{
      if(typeof G==='undefined'||G.scene!=='fight'||!G.T)return 0;
      if(G.T[0].spark>0||G.T[1].spark>0)return 2;
      var a=teamHpPct(G.T[0]),b=teamHpPct(G.T[1]);
      if(a<0.35||b<0.35)return 2;
      if(a<0.7||b<0.7)return 1;
    }catch(e){}
    return 0;
  }
  function kick(at){
    try{
      var o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';
      o.frequency.setValueAtTime(130,at);
      o.frequency.exponentialRampToValueAtTime(38,at+0.11);
      env(g,at,0.002,0.55,0.16);
      o.connect(g);g.connect(musGain);
      o.start(at);o.stop(at+0.2);
    }catch(e){}
  }
  function mnz(at,d,vol,type,fq,q){
    try{
      var len=Math.floor(ac.sampleRate*d);if(len<1)len=1;
      var buf=ac.createBuffer(1,len,ac.sampleRate);
      var chd=buf.getChannelData(0);
      for(var i=0;i<len;i++)chd[i]=(Math.random()*2-1)*(1-i/len);
      var src=ac.createBufferSource();src.buffer=buf;
      var fl=ac.createBiquadFilter();fl.type=type;fl.frequency.value=fq;if(q)fl.Q.value=q;
      var g=ac.createGain();g.gain.value=vol;
      src.connect(fl);fl.connect(g);g.connect(musGain);
      src.start(at);
    }catch(e){}
  }
  function bassN(at,midi,d){
    try{
      var o=ac.createOscillator(),g=ac.createGain(),fl=ac.createBiquadFilter();
      o.type='sawtooth';o.frequency.setValueAtTime(sr(mf(midi)),at);
      fl.type='lowpass';fl.Q.value=6;
      fl.frequency.setValueAtTime(1300,at);
      fl.frequency.exponentialRampToValueAtTime(180,at+d);
      env(g,at,0.004,0.34,d);
      o.connect(fl);fl.connect(g);g.connect(musGain);
      o.start(at);o.stop(at+d+0.03);
    }catch(e){}
  }
  function leadN(at,midi,d,vol){
    try{
      var o=ac.createOscillator(),g=ac.createGain();
      o.type='square';o.frequency.setValueAtTime(sr(mf(midi)),at);
      env(g,at,0.004,vol,d);
      o.connect(g);g.connect(musGain);
      if(echoIn){var s2=ac.createGain();s2.gain.value=0.4;g.connect(s2);s2.connect(echoIn);}
      o.start(at);o.stop(at+d+0.03);
    }catch(e){}
  }
  function padN(at,midi,d,vol,det){
    try{
      var o=ac.createOscillator(),g=ac.createGain();
      o.type='triangle';o.frequency.setValueAtTime(sr(mf(midi)),at);
      if(det&&o.detune)try{o.detune.value=det;}catch(e3){}
      g.gain.setValueAtTime(0.0001,at);
      g.gain.linearRampToValueAtTime(vol,at+d*0.35);
      g.gain.linearRampToValueAtTime(0.0001,at+d);
      o.connect(g);g.connect(musGain);
      o.start(at);o.stop(at+d+0.05);
    }catch(e){}
  }
  function musTick(){
    if(!ac||muted||!musName)return;
    try{
      var ct=ac.currentTime;
      if(musNext<ct)musNext=ct+0.05;
      if(musName==='battle'){
        var spb=0.1;  /* 16ths @150bpm */
        var inten=intensity();
        while(musNext<ct+0.32){
          var st=musStep%16;
          var bar=Math.floor(musStep/16);
          var root=ROOTS[bar%4];
          if(st===0||st===4||st===8||st===12)kick(musNext);
          if(st===14&&bar%2===1)kick(musNext);
          if(st===4||st===12)mnz(musNext,0.10,0.30,'bandpass',1900,1.2);
          if(st%2===0||inten>=2){
            mnz(musNext,0.03,st%4===2?0.11:0.055,'highpass',6500,0);
          }
          if(st===0||st===3||st===6||st===8||st===11||st===14){
            var bn=root;
            if(st===6)bn=root+3;
            if(st===14)bn=root+ (bar%2?7:5);
            bassN(musNext,bn,spb*2.6);
          }
          if(inten>=1&&(st===2||st===7||st===10||st===15)){
            var sc=SCALE[(bar*3+st)%5];
            leadN(musNext,root+24+sc+(inten>=2?12:0),spb*2.2,inten>=2?0.085:0.06);
          }
          musNext+=spb;musStep++;
        }
      }else{
        var spbM=0.24;
        while(musNext<ct+0.32){
          var stm=musStep%16;
          var barm=Math.floor(musStep/16);
          var rootm=ROOTS[barm%4];
          if(stm===0){
            padN(musNext,rootm+12,spbM*15,0.10,-7);
            padN(musNext,rootm+19,spbM*15,0.08,7);
            padN(musNext,rootm+24,spbM*15,0.05,0);
          }
          if(stm===0||stm===10)kick(musNext);
          if(stm%4===2)mnz(musNext,0.03,0.035,'highpass',7000,0);
          if(stm===6||stm===13){
            leadN(musNext,rootm+36+SCALE[(barm+stm)%5],spbM*1.8,0.045);
          }
          musNext+=spbM;musStep++;
        }
      }
    }catch(e){}
  }
  function mus(name){
    musName=name;musStep=0;musNext=0;
    if(musTimer){clearInterval(musTimer);musTimer=null;}
    if(name){musTimer=setInterval(musTick,80);}
  }
  /* -------- sustained loops -------- */
  function beamOn(){
    if(!ac||muted||beamNode)return;
    try{
      var t=ac.currentTime;
      var o=ac.createOscillator(),o2=ac.createOscillator(),g=ac.createGain();
      var lfo=ac.createOscillator(),lg=ac.createGain();
      var fl=ac.createBiquadFilter();
      o.type='sawtooth';o.frequency.value=88;
      o2.type='square';o2.frequency.value=44;
      fl.type='lowpass';fl.frequency.value=900;fl.Q.value=4;
      lfo.type='sine';lfo.frequency.value=6.5;lg.gain.value=420;
      lfo.connect(lg);lg.connect(fl.frequency);
      g.gain.value=0.0001;
      g.gain.linearRampToValueAtTime(0.20,t+0.12);
      o.connect(fl);o2.connect(fl);fl.connect(g);g.connect(master);
      if(echoIn){var s2=ac.createGain();s2.gain.value=0.25;g.connect(s2);s2.connect(echoIn);}
      o.start(t);o2.start(t);lfo.start(t);
      beamNode={o:o,o2:o2,lfo:lfo,g:g};
    }catch(e){}
  }
  function beamOff(){
    if(!beamNode)return;
    try{
      var t=ac.currentTime;
      beamNode.g.gain.linearRampToValueAtTime(0.0001,t+0.14);
      beamNode.o.stop(t+0.2);beamNode.o2.stop(t+0.2);beamNode.lfo.stop(t+0.2);
    }catch(e){}
    beamNode=null;
  }
  function chOn(){
    if(!ac||muted||chargeNode)return;
    try{
      var t=ac.currentTime;
      var o=ac.createOscillator(),o2=ac.createOscillator(),g=ac.createGain();
      var lfo=ac.createOscillator(),lg=ac.createGain();
      o.type='sawtooth';o.frequency.value=50;
      o2.type='sawtooth';o2.frequency.value=50.8;
      lfo.type='sine';lfo.frequency.value=9;lg.gain.value=0.04;
      g.gain.value=0.0001;
      g.gain.linearRampToValueAtTime(0.10,t+0.2);
      lfo.connect(lg);lg.connect(g.gain);
      o.connect(g);o2.connect(g);g.connect(master);
      o.start(t);o2.start(t);lfo.start(t);
      chargeNode={o:o,o2:o2,lfo:lfo,g:g};
    }catch(e){}
  }
  function chOff(){
    if(!chargeNode)return;
    try{
      var t=ac.currentTime;
      chargeNode.g.gain.linearRampToValueAtTime(0.0001,t+0.1);
      chargeNode.o.stop(t+0.15);chargeNode.o2.stop(t+0.15);chargeNode.lfo.stop(t+0.15);
    }catch(e){}
    chargeNode=null;
  }
  return {
    init:init,res:res,setMute:setMute,mus:mus,duck:duck,
    beamOn:beamOn,beamOff:beamOff,chOn:chOn,chOff:chOff,
    blip:function(){tone({f:660,f2:990,d:0.06,type:'sine',vol:0.14});},
    sel:function(){tone({f:520,f2:1040,d:0.09,type:'triangle',vol:0.16});tone({f:1040,f2:1560,d:0.12,type:'sine',vol:0.10,dl:0.05});},
    back:function(){tone({f:500,f2:240,d:0.09,type:'triangle',vol:0.13});},
    hit:function(p){
      noise({d:0.05,vol:0.30,type:'highpass',fq:2400,a:0.001});
      tone({f:170-p*22,f2:52,d:0.09+p*0.015,type:'sine',vol:0.30});
      noise({d:0.08,vol:0.14,type:'bandpass',fq:900,q:1});
    },
    heavy:function(){
      noise({d:0.16,vol:0.38,type:'lowpass',fq:2200,fq2:300});
      tone({f:120,f2:32,d:0.22,type:'sine',vol:0.40,echo:0.3});
      tone({f:220,f2:60,d:0.12,type:'sawtooth',vol:0.16});
    },
    guard:function(){
      tone({f:1180,f2:900,d:0.06,type:'triangle',vol:0.14});
      tone({f:1780,f2:1400,d:0.05,type:'sine',vol:0.08,dl:0.01});
      noise({d:0.03,vol:0.10,type:'highpass',fq:5000});
    },
    blast:function(){
      tone({f:820,f2:130,d:0.13,type:'sawtooth',vol:0.15});
      noise({d:0.06,vol:0.09,type:'highpass',fq:3200});
    },
    boom:function(){
      noise({d:0.42,vol:0.5,type:'lowpass',fq:2600,fq2:160,echo:0.4});
      tone({f:70,f2:24,d:0.5,type:'sine',vol:0.42,echo:0.3});
      noise({d:0.1,vol:0.2,type:'highpass',fq:4000});
    },
    van:function(){
      tone({f:600,f2:2400,d:0.09,type:'sine',vol:0.15,echo:0.5});
      noise({d:0.05,vol:0.10,type:'highpass',fq:6000});
    },
    dash:function(){noise({d:0.10,vol:0.13,type:'bandpass',fq:900,fq2:2600,q:1.5});},
    rush:function(){
      tone({f:190,f2:940,d:0.26,type:'sawtooth',vol:0.15});
      noise({d:0.2,vol:0.12,type:'bandpass',fq:600,fq2:3200,q:1});
    },
    superGo:function(){
      tone({f:130,f2:520,d:0.5,type:'sawtooth',vol:0.22,echo:0.4});
      tone({f:65,f2:260,d:0.5,type:'square',vol:0.16,dl:0.08});
      noise({d:0.45,vol:0.20,type:'bandpass',fq:400,fq2:4200,q:1});
      tone({f:52,d:0.3,type:'sine',vol:0.34,dl:0.42});
      duck();
    },
    ko:function(){
      noise({d:0.7,vol:0.55,type:'lowpass',fq:3000,fq2:120,echo:0.5});
      tone({f:60,f2:26,d:1.2,type:'sine',vol:0.45});
      tone({f:210,d:1.4,type:'sine',vol:0.20,echo:0.6,a:0.01});
      tone({f:634,d:1.1,type:'sine',vol:0.08,echo:0.6,a:0.01});
      tone({f:520,f2:70,d:0.9,type:'sawtooth',vol:0.10,dl:0.15});
      duck();
    },
    spark:function(){
      var nn=[45,52,57,64,69,76];
      for(var i=0;i<nn.length;i++){
        tone({f:mf(nn[i]),f2:mf(nn[i])*2,d:0.34,type:'sawtooth',vol:0.13,dl:i*0.045,echo:0.4});
      }
      noise({d:0.6,vol:0.22,type:'highpass',fq:2500,echo:0.4});
      tone({f:55,f2:110,d:0.5,type:'sine',vol:0.3});
      duck();
    },
    tag:function(){
      noise({d:0.12,vol:0.14,type:'bandpass',fq:700,fq2:2800,q:1.4});
      tone({f:520,f2:1040,d:0.1,type:'triangle',vol:0.14,dl:0.04});
    },
    clashS:function(){
      tone({f:110,f2:220,d:0.35,type:'sawtooth',vol:0.24,echo:0.3});
      tone({f:165,f2:330,d:0.35,type:'sawtooth',vol:0.18});
      noise({d:0.3,vol:0.35,type:'lowpass',fq:2000,fq2:400});
      duck();
    },
    milestone:function(h){
      var p=h>=20?1400:(h>=15?1180:(h>=10?990:830));
      tone({f:p,f2:p*1.5,d:0.09,type:'sine',vol:0.13,echo:0.35});
    },
    sting:function(win){
      var seq=win?[57,60,64,69,72]:[57,53,50,45];
      for(var i=0;i<seq.length;i++){
        tone({f:mf(seq[i]+12),d:win?0.16:0.30,type:win?'triangle':'sawtooth',vol:0.14,dl:i*(win?0.09:0.16),echo:0.4});
      }
      if(win)noise({d:0.4,vol:0.12,type:'highpass',fq:4000,dl:0.35,echo:0.4});
    },
    count:function(){tone({f:880,d:0.13,type:'square',vol:0.18});tone({f:440,d:0.13,type:'square',vol:0.10});},
    fight:function(){
      tone({f:440,f2:880,d:0.28,type:'sawtooth',vol:0.24,echo:0.3});
      tone({f:660,f2:1320,d:0.28,type:'sawtooth',vol:0.14});
      noise({d:0.2,vol:0.22,type:'bandpass',fq:1200,q:1});
    }
  };
})();
/* ---------- input ---------- */
var INP=(function(){
  var held={},tap={},rel={},hT={};
  var stick={on:false,id:-1,ax:0,ay:0,x:0,y:0};
  var tapPt=null,downPt=null,downMoved=false;
  var hudQ=[],fcnt=0,lastMulti=-99;
  var fightUI=false;
  var KEYMAP={'j':'ATK','k':'KI','l':'RUSH','u':'SP','i':'VAN','o':'SPK','1':'A1','2':'A2','p':'PAUSE',
    'z':'ATK','x':'KI','c':'RUSH','v':'VAN','b':'SP','n':'SPK'};
  var kdir={l:false,r:false,u:false,d:false};
  function layout(){}
  function press(id){
    if(!held[id]){held[id]=true;tap[id]=true;hT[id]=0;}
  }
  function release(id){
    if(held[id]){held[id]=false;rel[id]=(hT[id]||0);}
  }
  var tmap={};// touch id -> {type:'stick'|'hud'|'gest'|'none'}
  function tstart(x,y,tid){
    A.init();A.res();
    downPt={x:x,y:y};downMoved=false;
    if(fightUI){
      if(y<H*0.24){tmap[tid]={type:'hud',x0:x,y0:y,fr:0};return;}
      if(x<W*0.44&&y>H*0.30){
        tmap[tid]={type:'stick'};
        stick.on=true;stick.id=tid;stick.ax=x;stick.ay=y;stick.x=0;stick.y=0;
        return;
      }

    dmg*=atkMult;
    var sc=Math.max(0.35,1-0.06*Ta.hits);

    A.guard();

    var lethal=(spec.cause==='super'||spec.cause==='beam');
    if(!lethal){
      var wb=Math.round(dmg*(v.dmgMult||1));
      if(v.hp-wb<=0)dmg=(v.hp-1)/(v.dmgMult||1);
    }
    if(dmg>0.5)applyDmg(v,dmg,Ta,spec.cause||'chip');
    return false;
  }
  applyDmg(v,dmg,Ta,spec.cause||'hit');

  v.guard=false;v.charge=false;A.chOff();
  if(v.st==='sup'){killSuper(v);}

    if(Ta.hits===5||Ta.hits===10||Ta.hits===15||Ta.hits===20)A.milestone(Ta.hits);

/* ---------- fighter update ---------- */
function updF(f){
  var T=teamOf(f);

  if(f.blstun>0)f.blstun--;
  if(f.blCd>0)f.blCd--;

    return;
  }
  if(f.dead){
    /* ko physics */
    f.koT++;

    if(f.y>=0){f.y=0;f.vy=0;f.vx*=0.8;if(!f.koLand){f.koLand=true;fxDust(f.x,0);shake(6);CRT.push({x:f.x,r:34});}}
    f.x=clamp(f.x,-WLD,WLD);
    return;
  }
  /* passive regen terrak */
  if(f.ch.regen&&f.hp<f.hpM&&G.t%12===0)f.hp=Math.min(f.hpM,f.hp+1);
  if(T.spark>0&&f.slot===T.point&&f.wh>0){
    var h2=Math.min(f.wh,0.12);f.wh-=h2;f.hp=Math.min(f.hpM,f.hp+h2);
  }

  if(f.st==='sup'&&f.sup&&f.sup.ph==='charge')grav=0;
  if(f.st==='sup'&&f.sup&&f.sup.beam)grav=0;
  if(f.wallb)grav=0.12;
  if(!f.grounded){
    f.vy+=grav;
    f.y+=f.vy;
    if(f.y>=0){
      f.y=0;f.grounded=true;f.ajump=1;
      if(f.gbounce){
        f.gbounce=false;f.vy=-9;f.grounded=false;f.hs=Math.max(f.hs,22);
        fxDust(f.x,0);shake(5);A.hit(1);
      }else if(f.st==='hurt'&&(f.kdFlag||f.vy>10)){
        f.st='down';f.stT=0;f.downT=26;f.kdFlag=false;f.vx*=0.4;

      }
    }
  }
  f.x+=f.vx;
  if(f.x<-WLD){f.x=-WLD;if(f.wallb){wallBounce(f,1);}else f.vx=Math.max(0,f.vx*0);}
  if(f.x>WLD){f.x=WLD;if(f.wallb){wallBounce(f,-1);}else f.vx=Math.min(0,f.vx*0);}
  if(f.wallb){}else if(f.grounded)f.vx*=0.72;else f.vx*=0.985;
  /* hitstun */
  if(f.hs>0){

      f.wallb=false;

  }
  if(f.st==='down'){
    f.stT++;
    if(f.stT>f.downT){f.st='idle';f.inv=30;fxRing(f.x,f.y-20,'#fff',10);}

            f.hitDone=true;
            var tl=hurt(tev,T,{dmg:30*f.ch.pow,kb:5,hs:22,dir:f.face,launch:6,kd:true,cause:'tag'});
            if(tl){A.heavy();shake(6);G.stop=Math.max(G.stop,4);fxHit(tev.x,tev.y-38,2,f.ch.col.sh);}

        }
      }

      break;
    case 'dash':
      if(f.stT%2===0)fxAfter(f);
      if(f.stT>9)f.st='idle';
      break;
  }
  if(!isPoint&&f.st!=='assist'&&f.st!=='tagout'&&f.st!=='ko'){
    /* stray non-point actors settle */
    if(f.st!=='bench'&&f.st!=='tagin'&&f.hs<=0&&f.grounded&&f.st!=='idle'&&f.st!=='hurt'){}
  }
  /* auto-face when neutral */
  if((f.st==='idle'||f.st==='walk'||f.st==='charge')&&f.hs<=0){
    var e=nearFoe(f);
    if(e)f.face=e.x>=f.x?1:-1;
  }
}

      }else if(f.st==='walk')f.st='idle';

  if(INP.tapped('ATK')){startAtk(f);}
  var kr=INP.relF('KI');
  if(kr>=0){
    if(kr<20)fireBlast(f);
    f.charge=false;A.chOff();
  }
  if(INP.isHeld('KI')&&INP.heldF('KI')>=20&&canAct(f)&&f.grounded){
    f.st='charge';f.charge=true;A.chOn();
    T.ki=clamp(T.ki+0.014,0,T.kiMax);
    if(G.t%5===0)fxBurst(f.x,f.y-30,f.ch.col.aura,1,3);
  }else if(f.st==='charge'){f.st='idle';f.charge=false;A.chOff();}
  if(INP.tapped('RUSH'))startRush(f);
  var sp=INP.relF('SP');
  if(sp>=0){
    if(sp>=22&&T.ki>=3)startSuper(f,true);
    else startSuper(f,false);
  }
  if(INP.tapped('VAN'))doVanish(f);
  if(INP.tapped('SPK'))startSpark(T);
  var slots=[];
  for(var i=0;i<3;i++)if(i!==T.point)slots.push(i);
  var a1=INP.relF('A1'),a2=INP.relF('A2');
  if(a1>=0){if(a1>=26)doTag(T,slots[0]);else callAssist(T,slots[0]);}
  if(a2>=0){if(a2>=26)doTag(T,slots[1]);else callAssist(T,slots[1]);}
}
/* ---------- AI ---------- */
function aiStep(T){
  var D=DIFFS[G.diff];
  var f=ptF(T);
  if(f.dead)return;
  var E=foeT(T);
  var e=ptF(E);
  var ai=T.ai;
  var d=Math.abs(e.x-f.x);
  var dy=Math.abs(e.y-f.y);
  f.guard=false;
  /* clash mash */
  if(G.clash){ai.mashT++;if(ai.mashT>Math.max(2,10-D.mash)){ai.mashT=0;G.clash['m'+(T===G.T[0]?'A':'B')]+=1;}return;}
  if(!canAct(f)){
    if(f.st==='atk'&&Math.random()<0.35)startAtk(f);
    return;
  }
  ai.think++;
  /* danger react: enemy super/beam */
  var danger=(e.st==='sup')||(e.st==='rush');
  for(var i=0;i<BM.length;i++)if(BM[i].team!==f.ti)danger=true;
  if(danger&&ai.blockT<=0&&Math.random()<D.blk){ai.blockT=30+rndi(0,30);}
  if(ai.blockT>0){
    ai.blockT--;
    if(f.grounded){f.guard=true;f.st='block';return;}
  }
  if(ai.think<D.react)return;
  ai.think=0;
  var r=Math.random();
  /* spark comeback */
  if(!T.sparkUsed&&f.hp<f.hpM*0.4&&r<0.5){startSpark(T);return;}
  /* super */
  if(T.ki>=1&&((e.hs>8&&d<520)||r<0.14*D.aggr)){
    if(T.ki>=3&&Math.random()<0.3)startSuper(f,true);else startSuper(f,false);
    return;
  }
  /* vanish escape */
  if(T.ki>=0.5&&f.hs<=0&&e.hs<=0&&d<160&&Math.random()<D.van){doVanish(f);return;}
  /* tag if hurt */
  if(f.hp<f.hpM*0.3&&Math.random()<0.25){
    for(var s=0;s<3;s++)if(s!==T.point&&!T.f[s].dead&&T.f[s].st==='bench'&&T.cd[s]<=0){doTag(T,s);return;}
  }
  /* assist */
  if(Math.random()<0.16*D.aggr){
    for(var s2=0;s2<3;s2++)if(s2!==T.point&&!T.f[s2].dead&&T.f[s2].st==='bench'&&T.cd[s2]<=0){callAssist(T,s2);break;}
  }
  if(d>430){
    if(r<0.3){fireBlast(f);}
    else if(r<0.3+0.3*D.aggr){startRush(f);}
    else if(r<0.75&&T.ki<T.kiMax-0.5&&f.grounded){f.st='charge';f.charge=true;T.ki=clamp(T.ki+0.35,0,T.kiMax);setTimeoutCharge(f);}
    else{f.st='walk';f.vx=sgn(e.x-f.x)*4.4*f.ch.spd;}
  }else if(d>170){
    if(r<0.34*D.aggr){startRush(f);}
    else if(r<0.55){fireBlast(f);}
    else if(r<0.8){f.st='walk';f.vx=sgn(e.x-f.x)*4.6*f.ch.spd;if(!e.grounded&&f.grounded&&Math.random()<0.4){f.vy=-13;f.grounded=false;}}
    else{f.guard=true;f.st='block';}
  }else{
    if(dy>90&&f.grounded){f.vy=-13.5;f.grounded=false;}
    else if(r<0.62*D.aggr){startAtk(f);f.aiChain=3+rndi(0,2);}
    else if(r<0.75){f.guard=true;f.st='block';}
    else{f.st='walk';f.vx=sgn(e.x-f.x)*3;}
  }
}
function setTimeoutCharge(f){f.chargeAI=18;}
/* ---------- projectiles ---------- */
function stepPR(){
  for(var i=PR.length-1;i>=0;i--){
    if(i>=PR.length)continue;
    var p=PR[i];if(!p)continue;
    p.t++;
    if(p.delay&&p.t<p.delay){/* hover */p.x+=p.vx*0.2;p.y+=p.vy*0.2;continue;}
    if(p.hom){
      var tgt=null,bd=1e9;
      var E=G.T[p.team===0?1:0];
      for(var j=0;j<3;j++){var e0=E.f[j];if(!e0.dead&&e0.st!=='bench'){var dd=dst(e0.x-p.x,(e0.y-36)-p.y);if(dd<bd){bd=dd;tgt=e0;}}}
      if(tgt){
        var ta=Math.atan2((tgt.y-36)-p.y,tgt.x-p.x);
        var ca=Math.atan2(p.vy,p.vx);
        var da=ta-ca;while(da>Math.PI)da-=TAU;while(da<-Math.PI)da+=TAU;
        ca+=clamp(da,-0.09,0.09);
        var spd=dst(p.vx,p.vy);
        p.vx=Math.cos(ca)*spd;p.vy=Math.sin(ca)*spd;
      }
    }
    if(p.g)p.vy+=p.g;
    if(p.ty==='spiral'){p.vy=Math.sin(p.t*0.15)*4;}
    p.x+=p.vx;p.y+=p.vy;
    var kill=false;
    if(p.x<-WLD-120||p.x>WLD+120||p.y>40||p.y<-900)kill=true;
    if(p.ty==='spiral'&&p.t>(p.life||120))kill=true;
    if(p.y>0&&p.g){p.y=0;fxHit(p.x,0,1,p.col);A.hit(1);kill=true;doSplash(p);}
    /* ki vs ki */
    if(!kill&&p.ty==='ki'){
      for(var k=PR.length-1;k>=0;k--){
        var q=PR[k];if(!q)continue;
        if(q!==p&&q.team!==p.team&&dst(q.x-p.x,q.y-p.y)<p.r+q.r+4){
          q.hp--;p.hp--;fxHit((p.x+q.x)/2,(p.y+q.y)/2,0,'#fff');
          if(q.hp<=0)PR.splice(k,1);
          if(p.hp<=0){kill=true;}
          break;
        }
      }
    }
    if(!kill){
      var E2=G.T[p.team===0?1:0];
      for(var j2=0;j2<3;j2++){
        var e=E2.f[j2];
        if(e.dead||e.st==='bench'||e.st==='tagout')continue;
        if(Math.abs(e.x-p.x)<p.r+20&&Math.abs((e.y-36)-p.y)<p.r+34){
          var Ta=G.T[p.team];
          if(p.ty==='spiral'){
            p.tick=(p.tick||0)+1;
            if(p.tick%8===1){
              hurt(e,Ta,{dmg:p.dmg,kb:1.5,hs:14,dir:sgn(p.vx),cause:'super',chip:true});
              fxHit(p.x,p.y,1,p.col);A.hit(0);
            }
            continue;
          }
          var landed=hurt(e,Ta,{dmg:p.dmg,kb:p.ty==='orb'?5:2,hs:p.ty==='orb'?20:13,dir:sgn(p.vx)||1,
            launch:p.ty==='orb'?4:0,cause:p.ty==='ki'?'blast':'super',chip:true});
          fxHit(p.x,p.y,p.ty==='ki'?0:2,p.col);
          if(p.ty!=='ki')A.hit(2);else A.hit(0);
          if(!p.pierce){kill=true;doSplash(p);}
          break;
        }
      }
    }
    if(p.ty!=='ki'&&G.t%2===0)spawnP({x:p.x,y:p.y,vx:rnd(-1,1),vy:rnd(-1,1),l:12,ml:12,c:p.col,r:p.r*0.4,ty:'circ'});
    if(kill&&PR[i]===p)PR.splice(i,1);
  }
}
function doSplash(p){
  if(p.ty==='orb'){fxBurst(p.x,p.y,p.col,10,6);shake(4);}
}
/* ---------- beams & clash ---------- */
function stepBM(){
  /* detect clash */
  if(!G.clash&&BM.length>=2){
    var a=null,b=null;
    for(var i=0;i<BM.length;i++){
      if(BM[i].team===0&&BM[i].life>6)a=BM[i];
      if(BM[i].team===1&&BM[i].life>6)b=BM[i];
    }
    if(a&&b&&sgn(b.x-a.x)===a.dir&&sgn(a.x-b.x)===b.dir){
      G.clash={a:a,b:b,p:0,t:0,mA:0,mB:0,x:(a.x+b.x)/2};
      a.life=999;b.life=999;
      A.clashS();shake(12);G.stop=Math.max(G.stop,10);
      setAnn('BEAM CLASH!!','TAP FAST!',60);
    }
  }
  if(G.clash){
    var c=G.clash;c.t++;
    /* player mash */
    if(INP.tapped('ATK')){if(!G.T[0].cpu)c.mA+=1;}
    c.p+=(c.mA-c.mB)*0.004;
    c.mA*=0.9;c.mB*=0.9;
    c.p=clamp(c.p,-1.2,1.2);
    var span=(c.b.x-c.a.x);
    c.x=(c.a.x+c.b.x)/2+c.p*span*0.42;
    if(G.t%3===0){fxBurst(c.x,c.a.y,'#fff',3,7);shake(3);}
    c.a.len=Math.abs(c.x-c.a.x);
    c.b.len=Math.abs(c.x-c.b.x);
    if(c.t>170||Math.abs(c.p)>=1.15){
      var loserT=c.p>=0?1:0;
      /* if timeout, whoever is behind loses; tie -> both blown */
      var L=G.T[loserT];
      var lf=c.p>=0?c.b.own:c.a.own;
      var wf=c.p>=0?c.a.own:c.b.own;
      var wc=c.p>=0?c.a.col:c.b.col;
      G.clash=null;
      for(var k=BM.length-1;k>=0;k--)BM.splice(k,1);
      A.beamOff();A.boom();
      G.flash=0.9;shake(24);G.stop=14;
      if(lf&&!lf.dead){
        lf.sup=null;lf.st='idle';
        hurt(lf,teamOf(wf),{dmg:120*(wf?wf.ch.pow:1),kb:14,hs:40,dir:wf?wf.face:1,launch:10,kd:true,cause:'beam',unblock:true});
        fxBurst(lf.x,lf.y-38,wc,30,11);
      }
      if(wf&&!wf.dead&&wf.sup){wf.sup=null;wf.st='idle';}
      setAnn('CLASH WON!','',50);
      return;
    }
    return;
  }
  for(var i2=BM.length-1;i2>=0;i2--){
    if(i2>=BM.length)continue;
    var bm=BM[i2];if(!bm)continue;
    bm.t++;
    if(bm.life<900)bm.life--;
    var f=bm.own;
    if(f&&!f.dead){bm.x=f.x+bm.dir*28;bm.y=f.y-42;}
    var maxLen=(bm.dir>0?WLD+140-bm.x:bm.x+WLD+140);
    bm.len=Math.min(maxLen,(bm.len||0)+38);
    shake(2);
    if(G.t%2===0){
      spawnP({x:bm.x+bm.dir*rnd(20,bm.len),y:bm.y+rnd(-bm.w,bm.w)*0.5,vx:rnd(-1,1),vy:rnd(-2,-0.4),l:14,ml:14,c:bm.col,r:rnd(2,4),ty:'circ'});
    }
    /* damage */
    var E=G.T[bm.team===0?1:0];
    bm.tick++;
    for(var j=0;j<3;j++){
      var e=E.f[j];
      if(e.dead||e.st==='bench'||e.st==='tagout')continue;
      var ex=e.x,ey=e.y-36;
      var inX=bm.dir>0?(ex>bm.x-10&&ex<bm.x+bm.len):(ex<bm.x+10&&ex>bm.x-bm.len);
      if(inX&&Math.abs(ey-bm.y)<bm.w*0.5+30){
        if(bm.tick%4===0){
          var landed=hurt(e,G.T[bm.team],{dmg:bm.dmg,kb:1.6,hs:12,dir:bm.dir,cause:'beam',chip:true});
          if(G.t%4===0)fxHit(ex,ey,1,bm.col);
          if(e.grounded===false)e.vy*=0.6;
        }
      }
    }
    if(bm.life<=0){
      BM.splice(i2,1);
      if(f&&f.sup&&f.sup.beam===bm){f.sup=null;if(f.st==='sup')f.st='idle';}
      A.beamOff();
    }
  }
}

function stepFight(){
  if(G.paused){
    var tp=INP.anyTap();
    if(tp){
      if(tp.y>H*0.40&&tp.y<H*0.52){G.paused=false;INP.setFightUI(true);A.sel();}
      else if(tp.y>=H*0.55&&tp.y<H*0.68){G.paused=false;quitToMenu();A.back();return;}
    }
    if(INP.tapped('PAUSE')){G.paused=false;INP.setFightUI(true);A.sel();}
    return;
  }
  var hq=INP.hudEnds();
  for(var hi=0;hi<hq.length;hi++){
    var h=hq[hi];
    if(Math.abs(h.x-W/2)<70&&h.y<64){G.paused=true;INP.setFightUI(false);A.blip();return;}
    if(G.introT>40)continue;
    if(h.x<58+W*0.40+36){
      var Th=G.T[0];
      if(h.y<42){startSpark(Th);}
      else{
        var ord=h.y<66?1:2;
        var slot=(Th.point+ord)%3;
        if(h.fr>=26)doTag(Th,slot);else callAssist(Th,slot);
      }
    }
  }
  if(INP.tapped('PAUSE')){G.paused=true;INP.setFightUI(false);A.blip();return;}
  if(G.introT>0){
    G.introT--;
    if(G.introT===40){setAnn('FIGHT!!','',45);A.fight();}
    if(G.introT>40)return;
  }
  /* hitstop freeze */
  if(G.stop>0){G.stop--;stepP();if(G.cam.shake>0)G.cam.shake*=0.9;return;}
  /* slow motion accumulate */
  G.slowAcc+=G.slow;
  if(G.slowAcc<1){stepP();return;}
  G.slowAcc-=1;
  G.t++;G.fightT++;
  /* timers */
  if(!G.clash)G.timer--;
  if(G.timer<=0){
    var h0=teamHpPct(G.T[0]),h1=teamHpPct(G.T[1]);
    endFight(h0>=h1?0:1,'time');
    return;
  }
  for(var t=0;t<2;t++){
    var T=G.T[t];
    if(T.spark>0){T.spark--;T.ki=clamp(T.ki+0.003,0,T.kiMax);}
    for(var i=0;i<3;i++)if(T.cd[i]>0)T.cd[i]--;
    if(T.comboT>0){T.comboT--;if(T.comboT<=0){T.hits=0;T.cdmg=0;}}
  }
  /* control */
  if(!G.clash){
    ctrlPlayer(G.T[0]);
    aiStep(G.T[1]);
  }else{
    /* consume atk taps for clash handled in stepBM; ai mash */
    aiStep(G.T[1]);
  }
  /* AI charge helper */
  for(var t2=0;t2<2;t2++){
    var Tc=G.T[t2];
    for(var i2=0;i2<3;i2++){
      var fc=Tc.f[i2];
      if(fc.chargeAI){fc.chargeAI--;if(fc.chargeAI<=0){fc.charge=false;if(fc.st==='charge')fc.st='idle';}}
    }
  }
  /* update fighters */
  for(var t3=0;t3<2;t3++)for(var i3=0;i3<3;i3++)updF(G.T[t3].f[i3]);
  stepPR();stepBM();stepP();
  updCam();
  if(G.flash>0)G.flash*=0.9;
}

  var s=0,m=0;
  for(var i=0;i<3;i++){s+=T.f[i].hp;m+=T.f[i].hpM;}
  return s/Math.max(1,m);

  /* craters */
  for(var c=0;c<CRT.length;c++){
    var cr=CRT[c];
    CTX.fillStyle='rgba(0,0,0,0.28)';
    CTX.beginPath();
    CTX.ellipse(w2sX(cr.x),gy+3,sr(cr.r*z),sr(cr.r*0.28*z),0,0,TAU);
    CTX.fill();
  }
  /* world edge walls glow */
  CTX.fillStyle='rgba(120,180,255,0.08)';
  var wl=w2sX(-WLD),wr=w2sX(WLD);
  if(wl>-40)CTX.fillRect(wl-8,0,8,H);
  if(wr<W+40)CTX.fillRect(wr,0,8,H);
}
function drawSky(s,cx,z){
  var sx=W*0.72-cx*0.02*z,sy=H*0.26;
  CTX.globalCompositeOperation='lighter';
  if(s.type==='mesa'){
    sunDisc(sx,sy+H*0.06,110,'#ffd9a0','rgba(255,150,60,0.5)');
  }else if(s.type==='city'){
    sunDisc(W*0.30-cx*0.02*z,H*0.18,70,'#eef4ff','rgba(160,190,230,0.35)');
  }else if(s.type==='temple'){
    sunDisc(sx,H*0.14,80,'#ffffff','rgba(255,240,170,0.5)');
  }else{
    /* void nebula */
    for(var i=0;i<3;i++){
      var nx=W*(0.2+0.3*i)-cx*(0.015+0.008*i)*z;
      var ny=H*(0.16+0.12*((i*37)%3)/3);
      var nr=140+i*60;
      var ng=CTX.createRadialGradient(nx,ny,sr(6),nx,ny,sr(nr));
      ng.addColorStop(0,'rgba(160,80,255,0.28)');
      ng.addColorStop(1,'rgba(160,80,255,0)');
      CTX.fillStyle=ng;
      CTX.beginPath();CTX.arc(nx,ny,sr(nr),0,TAU);CTX.fill();
    }
    sunDisc(sx,H*0.20,60,'#e0b2ff','rgba(190,110,255,0.4)');
  }
  CTX.globalCompositeOperation='source-over';
  if(s.type==='mesa'||s.type==='temple'){
    var cc=s.type==='temple'?'rgba(255,255,255,0.7)':'rgba(60,30,70,0.55)';
    for(var c2=0;c2<5;c2++){
      var cxp=((c2*337+G.t*(0.25+(c2%2)*0.2))%(W+320))-160-cx*0.03*z;
      var cyp=H*(0.10+0.08*((c2*53)%3));
      CTX.fillStyle=cc;
      CTX.beginPath();
      CTX.ellipse(cxp,cyp,sr(70),sr(16),0,0,TAU);
      CTX.ellipse(cxp+42,cyp+6,sr(46),sr(13),0,0,TAU);
      CTX.ellipse(cxp-46,cyp+7,sr(40),sr(11),0,0,TAU);
      CTX.fill();
    }
  }
}
function sunDisc(x,y,r,core,glow){
  var g2=CTX.createRadialGradient(x,y,sr(r*0.18),x,y,sr(r));
  g2.addColorStop(0,core);
  g2.addColorStop(0.35,glow);
  g2.addColorStop(1,'rgba(0,0,0,0)');
  CTX.fillStyle=g2;
  CTX.beginPath();CTX.arc(x,y,sr(r),0,TAU);CTX.fill();
}
function drawLayer(off,gy,s,layer){
  var step=layer===0?260:200;
  var hh=layer===0?H*0.34:H*0.22;
  for(var i=-2;i<Math.ceil(W/step)+3;i++){
    var x=i*step+(off%step);
    var seed=Math.abs(Math.floor((i*step-off)/step))%7;
    var h=hh*(0.5+0.5*((seed*137)%100)/100);
    if(s.type==='city'){
      CTX.fillRect(x,gy-h,step*0.55,h);
      if(seed%2===0)CTX.fillRect(x+step*0.6,gy-h*0.6,step*0.25,h*0.6);
      if(layer===1){
        var keep=CTX.fillStyle;
        CTX.fillStyle='rgba(255,214,120,0.5)';
        for(var wy=0;wy<4;wy++)for(var wx3=0;wx3<3;wx3++){
          if(((seed+wy*3+wx3)*7)%5<2)CTX.fillRect(x+7+wx3*step*0.15,gy-h+8+wy*(h/4.6),4,6);
        }
        CTX.fillStyle=keep;
      }
    }else if(s.type==='temple'){
      CTX.fillRect(x+step*0.2,gy-h,step*0.18,h);
      CTX.fillRect(x+step*0.12,gy-h,step*0.34,h*0.12);
    }else if(s.type==='void'){
      CTX.beginPath();
      CTX.moveTo(x,gy);CTX.lineTo(x+step*0.3,gy-h*1.2);CTX.lineTo(x+step*0.6,gy);
      CTX.closePath();CTX.fill();
    }else{
      CTX.beginPath();
      CTX.moveTo(x,gy);CTX.lineTo(x+step*0.18,gy-h);CTX.lineTo(x+step*0.5,gy-h*0.92);
      CTX.lineTo(x+step*0.68,gy);CTX.closePath();CTX.fill();
    }
  }
}
/* ---------- rendering: fighters ---------- */
function drawHair(style,col,r,spark){
  CTX.fillStyle=spark?'#ffd94d':col;
  CTX.beginPath();
  if(style==='spiky'){
    CTX.moveTo(-r,0);
    CTX.lineTo(-r*1.15,-r*0.9);CTX.lineTo(-r*0.5,-r*0.75);
    CTX.lineTo(-r*0.35,-r*1.8);CTX.lineTo(r*0.05,-r*0.95);
    CTX.lineTo(r*0.5,-r*1.65);CTX.lineTo(r*0.65,-r*0.8);
    CTX.lineTo(r*1.15,-r*1.1);CTX.lineTo(r,0);
  }else if(style==='flame'){
    CTX.moveTo(-r,0);
    CTX.lineTo(-r*0.9,-r*1.1);CTX.lineTo(-r*0.4,-r*0.9);
    CTX.lineTo(-r*0.15,-r*2.1);CTX.lineTo(r*0.25,-r*1.0);
    CTX.lineTo(r*0.55,-r*1.7);CTX.lineTo(r*0.9,-r*0.7);CTX.lineTo(r,0);
  }else if(style==='crest'){
    CTX.moveTo(-r*0.8,-r*0.4);
    CTX.lineTo(0,-r*2.0);CTX.lineTo(r*0.8,-r*0.4);
    CTX.lineTo(r*0.5,-r*0.2);CTX.lineTo(-r*0.5,-r*0.2);
  }else if(style==='fin'){
    CTX.moveTo(-r*0.6,-r*0.5);CTX.lineTo(0,-r*1.5);CTX.lineTo(r*0.6,-r*0.5);
  }else if(style==='mohawk'){
    CTX.moveTo(-r*0.25,-r*0.5);
    CTX.lineTo(-r*0.15,-r*1.9);CTX.lineTo(r*0.05,-r*0.8);
    CTX.lineTo(r*0.2,-r*1.9);CTX.lineTo(r*0.3,-r*0.5);
  }else if(style==='long'){
    CTX.moveTo(-r,0);CTX.lineTo(-r*1.3,r*2.4);CTX.lineTo(-r*0.4,r*1.6);
    CTX.lineTo(-r*0.3,-r*1.2);CTX.lineTo(r*0.6,-r*1.25);CTX.lineTo(r,0);
  }else if(style==='sage'){
    CTX.moveTo(-r*0.9,r*0.3);CTX.lineTo(0,r*1.9);CTX.lineTo(r*0.9,r*0.3);
  }else if(style==='tendril'){
    CTX.moveTo(-r*0.5,-r*0.7);
    CTX.quadraticCurveTo(-r*2.2,-r*1.6,-r*1.6,r*1.2);
    CTX.quadraticCurveTo(-r*1.1,r*0.2,-r*0.6,-r*0.1);
    CTX.lineTo(r*0.6,-r*0.9);CTX.lineTo(r*0.8,-r*0.2);
  }
  CTX.closePath();CTX.fill();
  CTX.strokeStyle='#10101e';CTX.lineWidth=1.6;CTX.stroke();
}
function limb(x1,y1,x2,y2,bx,by,w,col){
  CTX.lineCap='round';
  CTX.strokeStyle='#10101e';CTX.lineWidth=w+2.6;
  CTX.beginPath();CTX.moveTo(x1,y1);CTX.quadraticCurveTo(bx,by,x2,y2);CTX.stroke();
  CTX.strokeStyle=col;CTX.lineWidth=w;
  CTX.beginPath();CTX.moveTo(x1,y1);CTX.quadraticCurveTo(bx,by,x2,y2);CTX.stroke();
}
function drawFighter(f,ghost){
  if(f.st==='bench')return;
  var T=teamOf(f);
  var sx=w2sX(f.x),sy=w2sY(f.y);
  var z=G.cam.z;
  var sc=(f.ci===3?1.16:(f.ci===4?0.82:1))*z;
  var spark=T.spark>0&&T.point===f.slot;
  if(!ghost){
    var hgt=-f.y;
    CTX.globalAlpha=clamp(0.42-hgt*0.0012,0.08,0.42);
    CTX.fillStyle='#000';
    CTX.beginPath();
    CTX.ellipse(sx,w2sY(0)+3,sr(Math.max(6,22-hgt*0.03)*sc),sr(5*sc),0,0,TAU);
    CTX.fill();
    CTX.globalAlpha=1;
  }
  CTX.save();
  CTX.translate(sx,sy);
  CTX.scale(f.face*sc,sc);
  var flick=(f.inv>0&&!f.dead&&G.t%4<2);
  if(flick)CTX.globalAlpha=0.35;
  if(ghost)CTX.globalAlpha=0.25;
  /* aura */
  if((spark||f.charge||f.st==='sup'||f.st==='rush')&&!ghost){
    var ac=spark?'#ffd94d':f.ch.col.aura;
    CTX.globalCompositeOperation='lighter';
    CTX.globalAlpha=flick?0.25:0.5;
    CTX.fillStyle=ac;
    var NA=6;
    for(var i=0;i<NA;i++){
      var afx=(i/(NA-1)-0.5)*46;
      var ahh=46+18*Math.sin(G.t*0.31+i*1.9)-Math.abs(afx)*0.45;
      if(ahh<16)ahh=16;
      var sway=Math.sin(G.t*0.2+i*2.3)*6;
      CTX.beginPath();
      CTX.moveTo(afx-7,2);
      CTX.quadraticCurveTo(afx-11,-ahh*0.5,afx*0.35+sway,-ahh-26);
      CTX.quadraticCurveTo(afx+11,-ahh*0.5,afx+7,2);
      CTX.closePath();CTX.fill();
    }
    if(spark){
      CTX.globalAlpha=0.30;
      CTX.fillStyle='#fff';
      CTX.beginPath();
      CTX.ellipse(0,-36,sr(15),sr(44+6*Math.sin(G.t*0.5)),0,0,TAU);
      CTX.fill();
    }
    CTX.globalCompositeOperation='source-over';
    CTX.globalAlpha=flick?0.35:1;
  }
  var c=f.ch.col;
  var bob=(f.st==='idle')?Math.sin(f.animT*0.12)*1.5:0;
  var lean=0;
  if(f.st==='walk')lean=0.12;
  if(f.st==='dash'||f.st==='rush')lean=0.5;
  if(f.st==='hurt')lean=-0.35;
  if(f.st==='atk')lean=0.18;
  var down=(f.st==='down'||(f.dead&&f.grounded));
  if(down){
    CTX.rotate(-Math.PI/2);
    CTX.translate(20,-6);
  }else{
    CTX.rotate(lean*0.4);
    if(f.dead&&!f.grounded)CTX.rotate(-Math.min(1.25,(f.koT||0)*0.05));
  }
  var hipY=-26+bob,neckY=-48+bob,headY=-57+bob;
  var wPh=f.animT*0.32;
  var legSw=(f.st==='walk')?Math.sin(wPh)*10:0;
  if(!f.grounded&&!f.dead)legSw=6;
  /* back arm */
  var armPose=poseArm(f,false);
  limb(-3,neckY+6,armPose.bx2,armPose.by2,armPose.bbx,armPose.bby,5,shade(c.gi,-24));
  /* legs */
  limb(0,hipY,-8-legSw*0.7,-1+bob*0.2,-6,hipY+12,6,c.gi);
  limb(0,hipY,9+legSw,-1+bob*0.2,8,hipY+12,6,shade(c.gi,-12));
  /* torso */
  CTX.lineCap='round';
  CTX.strokeStyle='#10101e';CTX.lineWidth=13.6;
  CTX.beginPath();CTX.moveTo(0,hipY);CTX.lineTo(2,neckY);CTX.stroke();
  CTX.strokeStyle=c.gi;CTX.lineWidth=11;
  CTX.beginPath();CTX.moveTo(0,hipY);CTX.lineTo(2,neckY);CTX.stroke();
  CTX.strokeStyle='rgba(255,255,255,0.22)';CTX.lineWidth=3;
  CTX.beginPath();CTX.moveTo(-3,hipY-2);CTX.lineTo(-1,neckY+3);CTX.stroke();
  /* belt */
  CTX.strokeStyle=c.gi2;CTX.lineWidth=4;
  CTX.beginPath();CTX.moveTo(-6,hipY+1);CTX.lineTo(6,hipY+1);CTX.stroke();
  /* front arm */
  limb(4,neckY+6,armPose.fx2,armPose.fy2,armPose.fbx,armPose.fby,5,c.gi2==='#e8e8f4'?c.gi:c.skin);
  /* fists */
  CTX.fillStyle=c.skin;
  CTX.beginPath();CTX.arc(armPose.fx2,armPose.fy2,sr(4),0,TAU);CTX.fill();
  CTX.beginPath();CTX.arc(armPose.bx2,armPose.by2,sr(3.4),0,TAU);CTX.fill();
  /* head */
  CTX.fillStyle='#10101e';
  CTX.beginPath();CTX.arc(4,headY,sr(10.4),0,TAU);CTX.fill();
  CTX.fillStyle=c.skin;
  CTX.beginPath();CTX.arc(4,headY,sr(9),0,TAU);CTX.fill();
  /* eye */
  CTX.fillStyle=spark?'#ff3b2e':'#141420';
  CTX.fillRect(7,headY-2,3,2.4);
  CTX.save();CTX.translate(4,headY);
  drawHair(f.ch.hair,c.hair,9,spark);
  CTX.restore();
  /* guard shield */
  if(f.guard&&f.st==='block'){
    CTX.strokeStyle='rgba(140,220,255,0.9)';CTX.lineWidth=3;
    CTX.beginPath();CTX.arc(14,-36,sr(22),-1.2,1.2);CTX.stroke();
  }
  /* charge glow ball */
  if(f.st==='blast'){
    CTX.fillStyle=c.ki;
    CTX.beginPath();CTX.arc(armPose.fx2+4,armPose.fy2,sr(6),0,TAU);CTX.fill();
  }
  if(f.st==='sup'&&f.sup&&f.sup.ph==='charge'){
    var gr=6+f.stT*0.5;
    CTX.fillStyle=c.ki;
    CTX.globalAlpha=0.85;
    CTX.beginPath();CTX.arc(20,-40,sr(gr),0,TAU);CTX.fill();
    CTX.globalAlpha=1;
  }
  CTX.restore();
  CTX.globalAlpha=1;
}
function poseArm(f){
  /* returns front/back hand endpoints + bend controls in local space */
  var o={fx2:16,fy2:-32,fbx:14,fby:-40,bx2:-12,by2:-34,bbx:-10,bby:-42};
  if(f.st==='atk'){
    var ch=f.atkAir?ACHAIN:GCHAIN;
    var sp=ch[f.cs]||ch[0];
    var pr=clamp((f.stT-sp.st)/Math.max(1,sp.act),0,1);
    var ext=Math.sin(Math.min(1,pr)*Math.PI);
    if(f.cs%2===0){o.fx2=16+ext*26;o.fy2=-36;o.fbx=18;o.fby=-38;}
    else {o.bx2=-4+ext*34;o.by2=-34;o.bbx=6;o.bby=-30;}
    if(f.cs===3){o.fx2=14+ext*20;o.fy2=-36-ext*18;}
    if(f.cs===4){o.fx2=10+ext*30;o.fy2=-30+ext*6;}
  }else if(f.st==='blast'||f.st==='sup'){
    o.fx2=24;o.fy2=-40;o.bx2=20;o.by2=-38;o.bbx=4;o.bby=-44;
  }else if(f.st==='charge'){
    o.fx2=10;o.fy2=-22;o.bx2=-8;o.by2=-22;
  }else if(f.st==='block'){
    o.fx2=12;o.fy2=-42;o.bx2=8;o.by2=-36;
  }else if(f.st==='hurt'||f.dead){
    o.fx2=-6;o.fy2=-40;o.bx2=-16;o.by2=-28;
  }else if(f.st==='rush'){
    o.fx2=26;o.fy2=-38;o.bx2=-18;o.by2=-26;
  }else if(f.st==='walk'){
    var s=Math.sin(f.animT*0.32)*8;
    o.fx2=14+s;o.bx2=-10-s;
  }
  return o;
}
function shade(hex,amt){
  var n=parseInt(hex.slice(1),16);
  var r=clamp(((n>>16)&255)+amt,0,255),g=clamp(((n>>8)&255)+amt,0,255),b=clamp((n&255)+amt,0,255);
  return 'rgb('+r+','+g+','+b+')';
}
/* ---------- rendering: projectiles/beams/particles ---------- */
function drawPR(){
  CTX.globalCompositeOperation='lighter';
  for(var i=0;i<PR.length;i++){
    var p=PR[i];
    var sx=w2sX(p.x),sy=w2sY(p.y),r=p.r*G.cam.z;

    CTX.lineTo(sx,sy);CTX.stroke();
    CTX.globalAlpha=1;
    CTX.globalAlpha=0.35;
    CTX.fillStyle=p.col;
    CTX.beginPath();CTX.arc(sx,sy,sr(r*1.9),0,TAU);CTX.fill();
    CTX.globalAlpha=1;
    CTX.fillStyle='#fff';
    CTX.beginPath();CTX.arc(sx,sy,sr(r*0.62),0,TAU);CTX.fill();
    CTX.strokeStyle=p.col;CTX.lineWidth=Math.max(1.5,r*0.5);
    CTX.beginPath();CTX.arc(sx,sy,sr(r),0,TAU);CTX.stroke();
    if(p.ty==='spiral'){
      CTX.strokeStyle=p.col;CTX.lineWidth=3;
      CTX.beginPath();
      CTX.arc(sx,sy,sr(r*(1.3+0.3*Math.sin(p.t*0.3))),p.t*0.2,p.t*0.2+4);

function drawBM(){
  CTX.globalCompositeOperation='lighter';
  for(var i=0;i<BM.length;i++){
    var b=BM[i];
    var x1=w2sX(b.x),y=w2sY(b.y);
    var x2=w2sX(b.x+b.dir*b.len);
    var w=Math.max(4,b.w*G.cam.z);
    /* outer glow */
    CTX.globalAlpha=0.30;
    CTX.strokeStyle=b.col;CTX.lineWidth=w*2.4;CTX.lineCap='round';
    CTX.beginPath();CTX.moveTo(x1,y);CTX.lineTo(x2,y);CTX.stroke();
    CTX.globalAlpha=0.85;
    CTX.strokeStyle=b.col;CTX.lineWidth=w*1.3;
    CTX.beginPath();CTX.moveTo(x1,y);CTX.lineTo(x2,y);CTX.stroke();
    CTX.globalAlpha=1;
    CTX.strokeStyle='#fff';CTX.lineWidth=w*0.62*(0.9+0.15*Math.sin(G.t*0.7));
    CTX.beginPath();CTX.moveTo(x1,y);CTX.lineTo(x2,y);CTX.stroke();
    /* muzzle ball */
    CTX.fillStyle='#fff';
    CTX.beginPath();CTX.arc(x1,y,sr(w*0.9),0,TAU);CTX.fill();
    /* head */
    if(!G.clash){
      CTX.fillStyle=b.col;CTX.globalAlpha=0.8;
      CTX.beginPath();CTX.arc(x2,y,sr(w*1.1),0,TAU);CTX.fill();
      CTX.globalAlpha=1;
    }
    /* traveling rings */
    if(b.len>40){
      CTX.strokeStyle='#fff';CTX.lineWidth=2;
      for(var k=0;k<3;k++){
        var pp=(b.t*7+k*90)%b.len;
        CTX.globalAlpha=0.5*(1-pp/b.len);
        CTX.beginPath();CTX.arc(w2sX(b.x+b.dir*pp),y,sr(w*0.9),0,TAU);CTX.stroke();
      }
      CTX.globalAlpha=1;
    }
    /* muzzle flare star */
    CTX.fillStyle='#fff';
    CTX.save();CTX.translate(x1,y);CTX.rotate(G.t*0.2);
    CTX.beginPath();
    for(var st8=0;st8<8;st8++){
      var an=st8*Math.PI/4;
      var rad=(st8%2===0)?w*1.7:w*0.6;
      if(st8===0)CTX.moveTo(Math.cos(an)*rad,Math.sin(an)*rad);
      else CTX.lineTo(Math.cos(an)*rad,Math.sin(an)*rad);
    }
    CTX.closePath();CTX.fill();
    CTX.restore();
  }
  if(G.clash){
    var c=G.clash;
    var cx=w2sX(c.x),cy=w2sY(c.a.y);
    var rr=(26+6*Math.sin(G.t*0.6))*G.cam.z;
    CTX.fillStyle='#fff';
    CTX.beginPath();CTX.arc(cx,cy,sr(rr),0,TAU);CTX.fill();
    CTX.globalAlpha=0.5;
    CTX.fillStyle=c.p>=0?c.a.col:c.b.col;
    CTX.beginPath();CTX.arc(cx,cy,sr(rr*1.7),0,TAU);CTX.fill();
    CTX.globalAlpha=1;
  }
  CTX.globalCompositeOperation='source-over';
}
function drawP(){
  CTX.globalCompositeOperation='lighter';
  for(var i=0;i<P.length;i++){
    var p=P[i];
    var a=p.l/p.ml;
    var sx=w2sX(p.x),sy=w2sY(p.y);
    if(p.ty==='ghost'){
      /* afterimage: simple silhouette */
      CTX.globalAlpha=a*0.3;
      CTX.fillStyle=p.spark?'#ffd94d':p.c;
      CTX.beginPath();
      CTX.ellipse(sx,sy-34*G.cam.z,sr(12*G.cam.z),sr(30*G.cam.z),0,0,TAU);
      CTX.fill();
      CTX.globalAlpha=1;continue;
    }
    CTX.globalAlpha=a;
    if(p.ty==='spark'){
      CTX.strokeStyle=p.c;CTX.lineWidth=Math.max(1,p.r*G.cam.z*0.8);
      CTX.beginPath();CTX.moveTo(sx,sy);CTX.lineTo(sx-p.vx*2.4,sy-p.vy*2.4);CTX.stroke();
    }else if(p.ty==='ring'){
      var pr=(1-a)*p.r*5*G.cam.z+p.r;
      CTX.strokeStyle=p.c;CTX.lineWidth=3*a+1;
      CTX.beginPath();CTX.arc(sx,sy,sr(pr),0,TAU);CTX.stroke();
    }else if(p.ty==='flash'){
      CTX.fillStyle=p.c;
      CTX.beginPath();CTX.arc(sx,sy,sr(p.r*(1-a+0.3)*G.cam.z*2),0,TAU);CTX.fill();
    }else if(p.ty==='star'){
      var rr2=p.r*(1.7-a)*G.cam.z*2.4;
      CTX.fillStyle=p.c;
      CTX.beginPath();
      for(var k2=0;k2<8;k2++){
        var an2=k2*Math.PI/4+(p.rot||0);
        var rad2=(k2%2===0)?rr2:rr2*0.34;
        var pxs=sx+Math.cos(an2)*rad2,pys=sy+Math.sin(an2)*rad2;
        if(k2===0)CTX.moveTo(pxs,pys);else CTX.lineTo(pxs,pys);
      }
      CTX.closePath();CTX.fill();
    }else{
      CTX.fillStyle=p.c;
      CTX.beginPath();CTX.arc(sx,sy,sr(p.r*G.cam.z),0,TAU);CTX.fill();
    }
  }
  CTX.globalAlpha=1;
  CTX.globalCompositeOperation='source-over';
}
/* ---------- HUD ---------- */
function drawHUD(){
  var m=Math.min(W,H);
  /* hp bars */
  for(var t=0;t<2;t++){
    var T=G.T[t];
    var bw=W*0.40,bh=17;
    var x0=t===0?58:W-58-bw;
    for(var i=0;i<3;i++){
      var f=T.f[i];
      var order=(i-T.point+3)%3;
      var y=14+order*(order===0?0:14)+(order>0?bh+4+(order-1)*11:0);
      var w=order===0?bw:bw*0.55;
      var h=order===0?bh:8;
      var x=t===0?x0:W-58-w;
      CTX.fillStyle='rgba(0,0,0,0.55)';
      CTX.fillRect(x-2,y-2,w+4,h+4);
      var pct=f.hp/f.hpM,wpct=Math.min(1,(f.hp+f.wh)/f.hpM);
      if(f.dead){pct=0;wpct=0;}
      CTX.fillStyle='#3a3a4a';
      CTX.fillRect(x,y,w,h);
      /* white recoverable */
      CTX.fillStyle='#8fa0b8';
      var wp=w*wpct,rp=w*pct;
      if(t===0){CTX.fillRect(x,y,wp,h);}else{CTX.fillRect(x+w-wp,y,wp,h);}
      var hg=CTX.createLinearGradient(0,y,0,y+h);
      var pc=pct>0.5?'#4dff6a':(pct>0.25?'#ffd12e':'#ff4d3a');
      hg.addColorStop(0,'#eaffef');hg.addColorStop(0.25,pc);hg.addColorStop(1,shade2(pc,-40));
      CTX.fillStyle=hg;
      if(t===0){CTX.fillRect(x,y,rp,h);}else{CTX.fillRect(x+w-rp,y,rp,h);}
      if(f.dmgFlash>0&&!f.dead){
        CTX.globalAlpha=f.dmgFlash/8*0.8;
        CTX.fillStyle='#fff';
        if(t===0){CTX.fillRect(x,y,rp,h);}else{CTX.fillRect(x+w-rp,y,rp,h);}
        CTX.globalAlpha=1;
      }
      CTX.fillStyle='rgba(255,255,255,0.16)';
      CTX.fillRect(x,y,w,h*0.42);
      CTX.strokeStyle='#0c0f22';CTX.lineWidth=2;
      CTX.strokeRect(x-1,y-1,w+2,h+2);
      if(order===0){
        var ppx=t===0?30:W-30,ppy=y+h/2+1;
        CTX.fillStyle='#0c1024';
        CTX.beginPath();CTX.arc(ppx,ppy,sr(19),0,TAU);CTX.fill();
        CTX.strokeStyle=T.spark>0?'#ffd94d':f.ch.col.ki;CTX.lineWidth=3;
        CTX.beginPath();CTX.arc(ppx,ppy,sr(18),0,TAU);CTX.stroke();
        if(f.dead)CTX.globalAlpha=0.25;
        drawMini(f.ci,ppx,ppy+3,1.45,T.spark>0);
        CTX.globalAlpha=1;
      }
      if(t===0&&!f.dead){
        var pxp=x+w+10;
        if(order===0){
          if(!T.sparkUsed){
            CTX.fillStyle='#ff7ae0';
            CTX.beginPath();CTX.arc(pxp+8,y+h/2,sr(8),0,TAU);CTX.fill();
            CTX.fillStyle='#141420';CTX.font='900 8px Arial';CTX.textAlign='center';
            CTX.fillText('SPK',pxp+8,y+h/2+3);
          }
        }else{
          if(T.cd[i]>0){
            CTX.fillStyle='#8fa0c8';CTX.font='900 10px Arial';CTX.textAlign='left';
            CTX.fillText(''+Math.ceil(T.cd[i]/60),pxp,y+h);
          }else{
            CTX.fillStyle='#4dff6a';
            CTX.beginPath();CTX.arc(pxp+4,y+h/2,sr(4),0,TAU);CTX.fill();
          }
        }
      }
      if(order===0){
        /* point char name + portrait */
        CTX.fillStyle='rgba(0,0,0,0.5)';
        var px=t===0?x:x+w-40;
        CTX.font='900 '+(13)+'px Arial';
        CTX.textAlign=t===0?'left':'right';
        CTX.fillStyle='#fff';
        CTX.fillText(f.ch.name,t===0?x+2:x+w-2,y+h+13);
        if(T.spark>0){
          CTX.fillStyle='#ffd94d';
          CTX.fillText('SPARKING '+Math.ceil(T.spark/60),t===0?x+110:x+w-110,y+h+13);
        }
      }
    }
    /* ki gauge */
    var kw=W*0.30,kh=11;
    var kx=t===0?16:W-16-kw,ky=H-24;
    CTX.fillStyle='rgba(0,0,0,0.55)';
    CTX.fillRect(kx-2,ky-2,kw+4,kh+4);
    for(var b=0;b<T.kiMax;b++){
      var seg=kw/T.kiMax-3;
      var sx=t===0?kx+b*(seg+3):kx+kw-(b+1)*(seg+3)+3;
      var fill=clamp(T.ki-b,0,1);
      CTX.fillStyle='#26263a';
      CTX.fillRect(sx,ky,seg,kh);
      if(fill>0){
        CTX.fillStyle=b>=2?'#ffd12e':'#39c2ff';
        CTX.fillRect(sx,ky,seg*fill,kh);
      }
    }
    CTX.font='900 11px Arial';CTX.textAlign=t===0?'left':'right';
    CTX.fillStyle='#bfd4ff';
    CTX.fillText('KI '+(Math.floor(T.ki*10)/10),t===0?kx:kx+kw,ky-6);
    /* combo counter */
    if(T.hits>1&&T.comboT>0){
      CTX.save();
      var cxp=t===0?W*0.14:W*0.86;
      CTX.translate(cxp,H*0.30);
      CTX.rotate(t===0?-0.08:0.08);
      var sc2=1+Math.min(0.5,T.hits*0.015);
      CTX.scale(sc2,sc2);
      CTX.font='900 34px Arial';
      CTX.textAlign='center';
      CTX.fillStyle='rgba(0,0,0,0.5)';
      CTX.fillText(T.hits+' HITS',3,3);
      CTX.fillStyle=T.hits>=10?'#ffd12e':'#fff';
      CTX.fillText(T.hits+' HITS',0,0);
      CTX.font='900 15px Arial';
      CTX.fillStyle='#9fd8ff';
      CTX.fillText(Math.round(T.cdmg)+' DMG',0,22);
      CTX.restore();
    }
  }
  /* timer */
  var tsec=Math.max(0,Math.ceil(G.timer/60));
  CTX.font='900 34px Arial';CTX.textAlign='center';
  CTX.fillStyle='rgba(0,0,0,0.5)';CTX.fillText(''+tsec,W/2+2,44+2);
  CTX.fillStyle=tsec<=10?'#ff4d3a':'#fff';
  CTX.fillText(''+tsec,W/2,44);
}
function shade2(hex,amt){
  if(hex.charAt(0)!=='#')return hex;
  return shade(hex,amt);
}

var MB=[];// menu buttons this frame
function mBtn(id,x,y,w,h,label,col,small){

function rRect(x,y,w,h,r){
  CTX.beginPath();
  CTX.moveTo(x+r,y);
  CTX.arcTo(x+w,y,x+w,y+h,r);
  CTX.arcTo(x+w,y+h,x,y+h,r);
  CTX.arcTo(x,y+h,x,y,r);
  CTX.arcTo(x,y,x+w,y,r);
  CTX.closePath();
}
function menuTap(){
  var tp=INP.anyTap();
  if(!tp)return null;
  for(var i=0;i<MB.length;i++){
    var b=MB[i];
    if(tp.x>=b.x&&tp.x<=b.x+b.w&&tp.y>=b.y&&tp.y<=b.y+b.h)return b.id;
  }
  return tp.enter?'ENTER':'BG';
}

      var ex=indexOfN(G.pick,ci);
      if(ex>=0){G.pick.splice(ex,1);A.back();}
      else if(G.pick.length<3){G.pick.push(ci);A.blip();}
    }else if(id==='RND'){
      G.pick=[];
      while(G.pick.length<3){var r=rndi(0,7);if(indexOfN(G.pick,r)<0)G.pick.push(r);}
      A.sel();
    }else if(id==='GO'&&G.pick.length===3){G.selDiff=true;A.sel();}
    else if(id==='ENTER'&&G.pick.length===3){G.selDiff=true;A.sel();}
    else if(id==='BK'){G.scene='mode';A.back();}
  }else{
    for(var d=0;d<3;d++){
      var bw2=Math.min(W*0.6,380);
      mBtn('D'+d,W/2-bw2/2,H*0.24+d*90,bw2,64,DIFFS[d].name,d===0?'#4dff6a':(d===1?'#ffd12e':'#ff4d3a'));
    }
    mBtn('BK',16,16,90,40,'BACK','#8a8fa8',true);
    var id2=menuTap();
    if(id2&&id2.charAt(0)==='D'){
      G.diff=parseInt(id2.slice(1),10);
      A.fight();
      beginMode();
    }else if(id2==='ENTER'){G.diff=1;A.fight();beginMode();}
    else if(id2==='BK'){G.selDiff=false;A.back();}
  }
}
function indexOfN(arr,v){for(var i=0;i<arr.length;i++)if(arr[i]===v)return i;return -1;}
function beginMode(){
  var D=DIFFS[G.diff];
  if(G.mode==='arcade'){
    G.ladder=0;G.contUsed=false;
    launchLadder();
  }else if(G.mode==='survival'){
    G.wave=0;
    launchWave();
  }else{
    var e=randTeam();
    G.vs={p:G.pick.slice(0),e:e,st:rndi(0,3),m:D.hp,dm:D.dmg,tt:'CPU TEAM'};
    G.scene='vs';G.vsT=0;
  }
}
function randTeam(){
  var e=[];
  while(e.length<3){var r=rndi(0,7);if(indexOfN(e,r)<0)e.push(r);}
  return e;
}
function launchLadder(){
  var D=DIFFS[G.diff];
  var L=LADDER[G.ladder];
  G.vs={p:G.pick.slice(0),e:L.t.slice(0),st:L.st,m:L.m*D.hp*(L.boss?1.1:1),dm:L.m*D.dmg,tt:'MATCH '+(G.ladder+1)+'/7 - '+L.tt,boss:L.boss};
  G.scene='vs';G.vsT=0;
}
function launchWave(){
  var D=DIFFS[G.diff];
  var m=(1+G.wave*0.07);
  G.vs={p:G.pick.slice(0),e:randTeam(),st:rndi(0,3),m:m*D.hp,dm:m*D.dmg,tt:'WAVE '+(G.wave+1)};
  G.scene='vs';G.vsT=0;
}
function sceneVS(){
  drawMenuBG();
  G.vsT++;
  CTX.textAlign='center';
  var v=G.vs;
  var t=G.vsT;
  var sl=Math.max(0,1-t/20);
  /* team panels */
  for(var s=0;s<2;s++){
    var team=s===0?v.p:v.e;
    var bx=s===0?W*0.26-sl*W*0.5:W*0.74+sl*W*0.5;
    for(var i=0;i<3;i++){
      drawMini(team[i],bx+(i-1)*Math.min(74,W*0.085),H*0.40,2.6,false);
      CTX.font='900 13px Arial';
      CTX.fillStyle='#cfe4ff';
      CTX.fillText(CH[team[i]].name,bx+(i-1)*Math.min(74,W*0.085),H*0.40+44);
    }
    CTX.font='900 22px Arial';
    CTX.fillStyle=s===0?'#39c2ff':'#ff4d3a';
    CTX.fillText(s===0?'YOUR TEAM':'ENEMY TEAM',bx,H*0.26);
  }
  CTX.save();
  CTX.translate(W/2,H*0.42);
  CTX.rotate(-0.1);
  CTX.scale(1+0.06*Math.sin(t*0.3),1+0.06*Math.sin(t*0.3));
  CTX.font='900 '+Math.floor(Math.min(W*0.12,76))+'px Arial';
  CTX.lineWidth=10;CTX.strokeStyle='#0a0a20';
  CTX.strokeText('VS',0,0);
  CTX.fillStyle='#ffd12e';
  CTX.fillText('VS',0,0);
  CTX.restore();
  CTX.font='900 20px Arial';
  CTX.fillStyle='#fff';
  CTX.fillText(v.tt,W/2,H*0.64);
  CTX.fillStyle='#9fb4dd';
  CTX.font='700 15px Arial';
  CTX.fillText('STAGE: '+STG[v.st].name+' * '+DIFFS[G.diff].name,W/2,H*0.70);
  if(t>50){
    CTX.globalAlpha=0.6+0.4*Math.sin(t*0.15);
    CTX.font='900 18px Arial';CTX.fillStyle='#fff';
    CTX.fillText('TAP TO FIGHT',W/2,H*0.80);
    CTX.globalAlpha=1;
  }
  var tp=INP.anyTap();
  if((tp&&t>25)||t>240){
    INP.setFightUI(true);
    startFight(v.p,v.e,v.st,v.m,v.dm);
  }
}
function sceneKO(){
  /* keep drawing the fight in slow-mo */
  G.koT--;
  stepFightLite();
  drawFightWorld();
  drawAnn();
  if(G.koT===60&&G.win===0&&G.dfin){
    setAnn('DRAMATIC FINISH!!','',70);
    G.flash=1;shake(20);
    A.boom();
  }
  if(G.koT<=0){
    G.slow=1;
    G.scene='result';G.resT=0;
    A.mus('menu');
  }
}
function stepFightLite(){
  /* physics-only advance during KO cinematics */
  G.slowAcc+=G.slow;
  if(G.slowAcc<1){stepP();return;}
  G.slowAcc-=1;
  G.t++;
  for(var t=0;t<2;t++)for(var i=0;i<3;i++){
    var f=G.T[t].f[i];
    if(f.dead){updF(f);continue;}
    if(!f.grounded){f.vy+=0.55;f.y+=f.vy;if(f.y>=0){f.y=0;f.vy=0;f.grounded=true;}}
    f.x+=f.vx;f.vx*=0.8;
    f.x=clamp(f.x,-WLD,WLD);
    if(f.hs>0)f.hs--;
    else if(f.st==='hurt'&&f.grounded)f.st='idle';
  }
  stepP();stepPR();
  for(var b=BM.length-1;b>=0;b--){BM[b].life-=2;if(BM[b].life<=0)BM.splice(b,1);}
  if(BM.length===0)A.beamOff();
  updCam();
  if(G.flash>0)G.flash*=0.92;
}
function sceneResult(){
  drawMenuBG();
  G.resT++;
  MB=[];
  CTX.textAlign='center';
  var won=G.win===0;
  CTX.save();
  CTX.translate(W/2,H*0.20);
  CTX.scale(1+0.03*Math.sin(G.resT*0.1),1+0.03*Math.sin(G.resT*0.1));
  CTX.font='900 '+Math.floor(Math.min(W*0.10,64))+'px Arial';
  CTX.lineWidth=9;CTX.strokeStyle='#0a0a20';
  CTX.strokeText(won?'VICTORY!':'DEFEAT...',0,0);
  CTX.fillStyle=won?'#ffd12e':'#7a86b0';
  CTX.fillText(won?'VICTORY!':'DEFEAT...',0,0);
  CTX.restore();
  CTX.font='700 16px Arial';
  CTX.fillStyle='#cfe4ff';
  var mc=G.T?G.T[0].maxCombo:0;
  CTX.fillText('MAX COMBO: '+mc+' HITS   *   TIME: '+Math.ceil(G.fightT/60)+'s',W/2,H*0.30);
  if(won&&G.dfin){CTX.fillStyle='#ff7ae0';CTX.fillText('* DRAMATIC FINISH BONUS *',W/2,H*0.35);}
  var by=H*0.44,bw=Math.min(W*0.6,340);
  if(G.mode==='arcade'){
    if(won){
      if(G.ladder>=6){
        CTX.fillStyle='#ffd12e';CTX.font='900 26px Arial';
        CTX.fillText('ARCADE CLEARED - YOU ARE A LEGEND',W/2,H*0.40);
        mBtn('MENU',W/2-bw/2,by+70,bw,56,'MAIN MENU','#39c2ff');
        if(!G.savedArc){G.savedArc=true;SAVE.ac++;doSave();}
      }else{
        mBtn('NEXT',W/2-bw/2,by,bw,56,'NEXT MATCH ('+(G.ladder+2)+'/7)','#4dff6a');
        mBtn('MENU',W/2-bw/2,by+70,bw,56,'QUIT TO MENU','#8a8fa8');
      }
    }else{
      mBtn('RETRY',W/2-bw/2,by,bw,56,'RETRY MATCH','#ffd12e');
      mBtn('MENU',W/2-bw/2,by+70,bw,56,'QUIT TO MENU','#8a8fa8');
    }
  }else if(G.mode==='survival'){
    CTX.fillStyle='#ff7ae0';CTX.font='900 22px Arial';
    CTX.fillText('WAVES CLEARED: '+(won?G.wave+1:G.wave),W/2,H*0.39);
    if(won){
      mBtn('NEXT',W/2-bw/2,by,bw,56,'NEXT WAVE','#4dff6a');
      mBtn('MENU',W/2-bw/2,by+70,bw,56,'RETIRE','#8a8fa8');
    }else{
      if(G.wave>SAVE.sv){SAVE.sv=G.wave;doSave();}
      mBtn('MENU',W/2-bw/2,by,bw,56,'MAIN MENU','#39c2ff');
    }
  }else{
    mBtn('RE',W/2-bw/2,by,bw,56,'REMATCH','#4dff6a');
    mBtn('MENU',W/2-bw/2,by+70,bw,56,'MAIN MENU','#39c2ff');
  }
  var id=menuTap();
  if(id==='NEXT'&&G.mode==='arcade'){G.ladder++;G.savedArc=false;launchLadder();A.sel();}
  else if(id==='NEXT'&&G.mode==='survival'){G.wave++;launchWave();A.sel();}
  else if(id==='RETRY'){launchLadder();A.sel();}
  else if(id==='RE'){beginMode();A.sel();}
  else if(id==='MENU'){G.savedArc=false;quitToMenu();A.back();}
}
/* ---------- fight draw ---------- */
function drawFightWorld(){
  drawStage();
  /* bench/assist behind */
  for(var t=0;t<2;t++)for(var i=0;i<3;i++){
    var f=G.T[t].f[i];
    if(f.st==='assist'||f.st==='tagout')drawFighter(f,false);
  }
  drawBM();
  for(var t2=0;t2<2;t2++)for(var i2=0;i2<3;i2++){
    var f2=G.T[t2].f[i2];
    if(f2.st!=='assist'&&f2.st!=='tagout')drawFighter(f2,false);
  }
  drawPR();
  drawP();
  var ctg=((G.cutin&&G.cutin.t>0)||G.clash||BM.length>0)?1:0;
  G.cine+=(ctg-G.cine)*0.12;
  if(G.cine>0.02){
    var lbh=H*0.085*G.cine;
    CTX.fillStyle='#000';
    CTX.fillRect(0,0,W,lbh);
    CTX.fillRect(0,H-lbh,W,lbh);
  }
  drawHUD();
}
function sceneFight(){
  stepFight();
  drawFightWorld();
  if(G.clash){
    CTX.textAlign='center';
    CTX.font='900 26px Arial';
    CTX.globalAlpha=0.7+0.3*Math.sin(G.t*0.5);
    CTX.fillStyle='#fff';
    CTX.fillText('TAP! TAP! TAP!',W/2,H*0.58);
    CTX.globalAlpha=1;
  }
  drawTouchUI();
  drawAnn();
  if(G.paused){
    MB=[];
    CTX.fillStyle='rgba(0,0,12,0.72)';
    CTX.fillRect(0,0,W,H);
    CTX.textAlign='center';
    CTX.font='900 44px Arial';CTX.fillStyle='#fff';
    CTX.fillText('PAUSED',W/2,H*0.30);
    mBtn('RES',W/2-140,H*0.40,280,H*0.10,'RESUME','#4dff6a');
    mBtn('QUIT',W/2-140,H*0.55,280,H*0.10,'QUIT MATCH','#ff4d3a');
  }
}
/* ---------- main loop ---------- */
function frame(){
  CTX.setTransform(DPR,0,0,DPR,0,0);
  MB=[];
  INP.tick();
  switch(G.scene){
    case 'title':G.t++;sceneTitle();break;
    case 'mode':G.t++;sceneMode();break;
    case 'how':G.t++;sceneHow();break;
    case 'select':G.t++;sceneSelect();break;
    case 'vs':G.t++;sceneVS();break;
    case 'fight':sceneFight();break;
    case 'ko':sceneKO();break;
    case 'result':sceneResult();break;
  }
  var vg=CTX.createRadialGradient(W/2,H*0.46,sr(Math.min(W,H)*0.45),W/2,H*0.46,sr(Math.max(W,H)*0.78));
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,14,0.36)');
  CTX.fillStyle=vg;
  CTX.fillRect(0,0,W,H);
  INP.flush();
}
var RAF=window.requestAnimationFrame||function(f){setTimeout(f,16);};
var ERRT=0,ERRM='';
function noteErr(e){
  ERRT=900;
  var m=e&&e.message?e.message:(''+e);
  var st=e&&e.stack?(''+e.stack):'';
  var ln=st.split('\n');
  ERRM=m;
  if(ln.length>1)ERRM+=' | '+ln[1].replace(/\s+/g,' ').slice(0,90);
}
function drawErr(){
  if(ERRT<=0)return;
  ERRT--;
  try{
    CTX.setTransform(DPR,0,0,DPR,0,0);
    CTX.fillStyle='rgba(120,0,0,0.85)';
    CTX.fillRect(0,H-52,W,52);
    CTX.fillStyle='#fff';
    CTX.font='12px Courier, monospace';
    CTX.textAlign='left';
    CTX.fillText('ERR: '+ERRM.slice(0,160),10,H-30);
    CTX.fillText('game continuing - screenshot this bar',10,H-12);
  }catch(e2){}
}
window.onerror=function(msg,src,ln,col,err){
  noteErr(err||{message:msg+' @'+ln+':'+col});
  drawErr();
  return true;
};
function loop(){
  try{frame();}catch(e){noteErr(e);}
  drawErr();
  RAF(loop);
}
/* ---------- harness hooks ---------- */
window.KC={
  G:G,CH:CH,PR:PR,BM:BM,frame:frame,
  press:function(id){INP._press(id);INP._release(id);},
  hold:function(id){INP._press(id);},
  unhold:function(id){INP._release(id);},
  stick:function(x,y){INP.stick.on=true;INP.stick.x=x;INP.stick.y=y;},
  touch:function(ty,x,y,id){INP._t(ty,x,y,id);},
  fightUI:function(b){INP.setFightUI(b);},
  dbg:{
    start:function(mode,picks,diff){
      G.mode=mode||'versus';G.diff=diff===undefined?1:diff;
      G.pick=picks||[0,1,2];
      INP.setFightUI(true);
      if(G.mode==='arcade'){G.ladder=0;var L=LADDER[0];startFight(G.pick,L.t,L.st,L.m,L.m);}
      else startFight(G.pick,randTeam(),rndi(0,3),1,1);
      G.introT=0;
    }
  }
};
/* ---------- boot ---------- */
resize();
A.setMute(SAVE.mute);
if(!window.__KC_HARNESS__){loop();}
</script>
</body>
