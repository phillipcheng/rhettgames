var ctx = canvas.getContext('2d', { alpha:false });
var TAU = Math.PI*2;
var DPR = 1;
var VIEW = { w: 800, h: 600 };

/* ----- utils ----- */
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function lerp(a,b,t){ return a+(b-a)*t; }
function dist(ax,ay,bx,by){ var dx=ax-bx, dy=ay-by; return Math.sqrt(dx*dx+dy*dy); }
function dist2(ax,ay,bx,by){ var dx=ax-bx, dy=ay-by; return dx*dx+dy*dy; }
function rand(a,b){ return a+Math.random()*(b-a); }
function choose(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function safeR(r){ r=+r; if(!isFinite(r)||r<0){ return 0; } return r; }
function ang(ax,ay,bx,by){ return Math.atan2(by-ay,bx-ax); }
function now(){ return (window.performance&&performance.now)?performance.now():Date.now(); }
function circle(x,y,r){ ctx.beginPath(); ctx.arc(x,y,safeR(r),0,TAU); }
function roundRect(x,y,w,h,r){ r=safeR(Math.min(r,w/2,h/2)); ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function fmtTime(s){ s=Math.max(0,Math.floor(s)); var m=Math.floor(s/60), ss=s%60; return m+":"+(ss<10?"0":"")+ss; }

/* ----- storage ----- */
var Store = (function(){
  var mem = {};
  function get(k,d){ try{ var v=localStorage.getItem(k); return v===null?d:v; }catch(e){ return (k in mem)?mem[k]:d; } }
  function set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ mem[k]=v; } }
  return { get:get, set:set };
})();

/* ----- audio (Web Audio synth) ----- */
var Voice=(function(){ var on=null;
  function chk(){ if(on===null){ try{ on=(Store.get('rift_voice','1')==='1'); }catch(e){ on=true; } } return on; }
  function speak(t){ if(!chk()){ return; }
    try{ if(typeof SpeechSynthesisUtterance==='undefined' || typeof speechSynthesis==='undefined'){ return; }
      var u=new SpeechSynthesisUtterance(t); u.rate=1.06; u.pitch=0.92; u.volume=0.9;
      speechSynthesis.cancel(); speechSynthesis.speak(u); }catch(e){} }
  return { speak:speak, isOn:function(){ return chk(); },
    toggle:function(){ chk(); on=!on; Store.set('rift_voice', on?'1':'0'); if(on){ speak('Announcer online'); } } };
})();
var Music=(function(){
  var ac=null, master=null, nextBeat=0, step=0, on=true;
  var SCALE=[0,3,5,7,10];
  function init(){ if(ac){ return; }
    try{ var AC=window.AudioContext||window.webkitAudioContext; if(!AC){ return; }
      ac=new AC(); master=ac.createGain(); master.gain.value=0.05; master.connect(ac.destination);
    }catch(e){ ac=null; } }
  function note(freq, t, dur, vol, type){
    try{ var o=ac.createOscillator(), g=ac.createGain();
      o.type=type||'triangle'; o.frequency.value=freq;
      g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t+dur);
      o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.02);
    }catch(e){} }
  function tick(intense){
    if(!on){ return; }
    init(); if(!ac){ return; }
    try{ if(ac.state==='suspended'){ ac.resume(); } }catch(e){}
    var now2=ac.currentTime;
    if(nextBeat===0){ nextBeat=now2+0.1; }
    var motif=arguments.length>1?arguments[1]:null;
    var SC=SCALE, beatDur=(intense?0.19:0.30), base=55;
    if(motif==='seraph'){ SC=[0,4,7,11,12]; base=65; }
    else if(motif==='kraken'){ SC=[0,2,3,7,8]; base=41; beatDur=(intense?0.22:0.34); }
    else if(motif==='behemoth'){ beatDur=(intense?0.17:0.26); }
    while(nextBeat<now2+0.25){
      if(step%4===0){ note(base*(step%8===0?1:0.75), nextBeat, 0.24, 0.9, 'sine'); }
      if(motif==='behemoth' && step%2===0){ note(36, nextBeat, 0.1, 0.8, 'sine'); }
      if(motif==='kraken' && step%8===2){ note(base*0.5, nextBeat, 0.5, 0.6, 'sine'); }
      if(motif==='seraph' && step%4===2){ note(base*4*Math.pow(2, SC[step%SC.length]/12), nextBeat, 0.28, 0.14, 'triangle'); }
      if(intense){
        var f=110*Math.pow(2, SC[Math.floor(Math.random()*SC.length)]/12)*(Math.random()<0.3?2:1);
        note(f, nextBeat, 0.12, 0.35, 'square'); }
      else if(step%8===4){
        var f2=110*Math.pow(2, SC[step%SC.length]/12);
        note(f2, nextBeat, 0.3, 0.22, 'triangle'); }
      step++; nextBeat+=beatDur; }
  }
  return { tick:tick, setOn:function(v){ on=v; } };
})();
var Audio = (function(){
  var ac=null, master=null, enabled=true;
  function init(){ if(ac){ return; }
    try{ var AC=window.AudioContext||window.webkitAudioContext; ac=new AC();
      master=ac.createGain(); master.gain.value=0.30; master.connect(ac.destination);
    }catch(e){ ac=null; } }
  function resume(){ if(ac&&ac.state==='suspended'){ try{ac.resume();}catch(e){} } }
  function tone(freq,dur,type,vol,a){ if(!ac||!enabled){ return; }
    try{ var o=ac.createOscillator(), g=ac.createGain(), t=ac.currentTime;
      o.type=type||'sine'; o.frequency.value=freq; a=a||0.005;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol||0.2,t+a);
      g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
      o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.02);
    }catch(e){} }
  function slide(f0,f1,dur,type,vol){ if(!ac||!enabled){ return; }
    try{ var o=ac.createOscillator(), g=ac.createGain(), t=ac.currentTime;
      o.type=type||'sawtooth'; o.frequency.setValueAtTime(f0,t);
      o.frequency.exponentialRampToValueAtTime(Math.max(20,f1),t+dur);
      g.gain.setValueAtTime(vol||0.18,t); g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
      o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.02);
    }catch(e){} }
  function noise(dur,vol,lp){ if(!ac||!enabled){ return; }
    try{ var n=Math.floor(ac.sampleRate*dur), buf=ac.createBuffer(1,n,ac.sampleRate), data=buf.getChannelData(0), i;
      for(i=0;i<n;i++){ data[i]=(Math.random()*2-1)*(1-i/n); }
      var src=ac.createBufferSource(); src.buffer=buf;
      var g=ac.createGain(); g.gain.value=vol||0.2;
      var f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=lp||1800;
      src.connect(f); f.connect(g); g.connect(master); src.start();
    }catch(e){} }
  function play(name){ if(!ac||!enabled){ return; }
    switch(name){
      case 'hit_melee': noise(0.09,0.16,2600); tone(150,0.08,'square',0.10); break;
      case 'hit_ranged': tone(720,0.07,'triangle',0.10); tone(420,0.06,'sine',0.06); break;
      case 'minion_die': tone(200,0.10,'sine',0.10); noise(0.06,0.10,1200); break;
      case 'champ_hit': noise(0.12,0.20,2200); tone(110,0.10,'square',0.12); break;
      case 'cast_phys': slide(220,520,0.18,'square',0.14); break;
      case 'cast_magic': slide(380,900,0.22,'sawtooth',0.13); tone(1200,0.10,'sine',0.06); break;
      case 'dash': slide(600,180,0.18,'sawtooth',0.12); break;
      case 'ult': slide(120,420,0.5,'sawtooth',0.2); tone(60,0.5,'sine',0.18); noise(0.3,0.14,900); break;
      case 'tower_shot': tone(300,0.10,'square',0.12); slide(360,160,0.12,'triangle',0.08); break;
      case 'tower_die': noise(0.5,0.3,1200); slide(200,50,0.5,'sawtooth',0.2); break;
      case 'coin': tone(880,0.05,'square',0.08); tone(1320,0.07,'square',0.07); break;
      case 'levelup': tone(523,0.10,'triangle',0.14); tone(659,0.10,'triangle',0.13); tone(784,0.16,'triangle',0.13); break;
      case 'recall': slide(300,1200,0.6,'sine',0.10); break;
      case 'kill': tone(330,0.10,'square',0.14); tone(440,0.10,'square',0.12); tone(660,0.18,'square',0.12); break;
      case 'death': slide(300,60,0.7,'sawtooth',0.2); noise(0.4,0.16,700); break;
      case 'victory': tone(523,0.14,'triangle',0.16); tone(659,0.14,'triangle',0.15); tone(784,0.14,'triangle',0.15); tone(1046,0.36,'triangle',0.15); break;
      case 'defeat': slide(220,70,1.0,'sawtooth',0.2); tone(110,0.8,'sine',0.12); break;
      case 'buy': tone(660,0.05,'square',0.08); tone(990,0.08,'square',0.08); break;
      case 'objective': slide(160,520,0.6,'sawtooth',0.18); tone(900,0.2,'triangle',0.1); break;
      case 'build': tone(330,0.06,'square',0.12); tone(495,0.08,'square',0.10); tone(660,0.10,'triangle',0.08); break;
      case 'pickup': tone(1180,0.05,'triangle',0.08); tone(1560,0.06,'sine',0.06); break;
      case 'buffpick': slide(520,1180,0.22,'triangle',0.12); tone(1568,0.12,'sine',0.07); break;
      case 'event': slide(220,660,0.4,'square',0.14); tone(880,0.18,'triangle',0.10); tone(1320,0.18,'triangle',0.08); break;
      case 'firstblood': slide(160,90,0.5,'sawtooth',0.2); tone(330,0.18,'square',0.14); tone(220,0.3,'sine',0.12); break;
      case 'shutdown': tone(300,0.10,'square',0.16); slide(520,140,0.3,'sawtooth',0.16); noise(0.25,0.18,1400); break;
    }
  }
  return { init:init, resume:resume, play:play,
    setEnabled:function(v){ enabled=v; }, isEnabled:function(){ return enabled; } };
})();

function applyDifficulty(d){ var m=DIFF_MODS[d]||DIFF_MODS.normal;
  EASE.enemyDmgDealt = BASE_EASE.enemyDmgDealt * m.dmg;
  EASE.enemyHpMul    = BASE_EASE.enemyHpMul    * m.hp;
  EASE.enemyArmorMul = BASE_EASE.enemyArmorMul * Math.min(1.3, m.hp);
  EASE.redTowerHpMul = BASE_EASE.redTowerHpMul * m.hp;
  EASE.redTowerAdMul = BASE_EASE.redTowerAdMul * m.towerAd;
  EASE.redNexusHpMul = BASE_EASE.redNexusHpMul * Math.min(1.25, m.hp);
}

var Mastery = (function(){
  var MAXLVL=30;
  function xpForLevel(L){ return 300 + (L-1)*200; }
  function getXp(){ var v=parseInt(Store.get('rift_mastery_xp','0'),10); return isFinite(v)?v:0; }
  function progress(x){ var L=1; while(L<MAXLVL && x>=xpForLevel(L)){ x-=xpForLevel(L); L++; }
    return { lvl:L, cur:x, need:(L<MAXLVL?xpForLevel(L):0) }; }
  function level(){ return progress(getXp()).lvl; }
  function award(amt){ var nx=getXp()+Math.max(0,Math.round(amt)); Store.set('rift_mastery_xp', nx+''); return nx; }
  return { MAXLVL:MAXLVL, getXp:getXp, level:level, award:award, progress:progress };
})();

  return { hp:s*7, ad:s*0.7, armor:s*0.45, mr:s*0.45, hpReg:s*0.25,

function recomputeStats(c, full){
  var def=c.def, b=def.base, g=def.grow, L=c.level-1;
  var bo={ ad:0, as:0, hp:0, ms:0, armor:0, mr:0, ap:0, lifesteal:0, mana:0, crit:0, cdr:0 }, i, it;
  for(i=0;i<c.items.length;i++){ it=itemById(c.items[i]); if(!it){ continue; }
    if(it.ad){ bo.ad+=it.ad; } if(it.as){ bo.as+=it.as; } if(it.hp){ bo.hp+=it.hp; }
    if(it.ms){ bo.ms+=it.ms; } if(it.armor){ bo.armor+=it.armor; } if(it.mr){ bo.mr+=it.mr; }
    if(it.ap){ bo.ap+=it.ap; } if(it.lifesteal){ bo.lifesteal+=it.lifesteal; } if(it.mana){ bo.mana+=it.mana; }
    if(it.crit){ bo.crit+=it.crit; } if(it.cdr){ bo.cdr+=it.cdr; } }
  c.bonus=bo;
  var prevMax=c.maxHp, prevMM=c.maxMana||0;
  var m=c.mastery||{ ad:0, hp:0, armor:0, mr:0, hpReg:0, crit:0, lifesteal:0 };
  c.ad = b.ad + g.ad*L + bo.ad + (m.ad||0);
  c.as = Math.min(2.4, b.as + g.as*L + bo.as);
  c.armor = b.armor + g.armor*L + bo.armor + (m.armor||0);
  c.mr = b.mr + g.mr*L + bo.mr + (m.mr||0);
  c.ms = b.ms + bo.ms;
  c.range = b.range;
  c.ap = bo.ap; c.lifesteal = bo.lifesteal + (m.lifesteal||0);
  c.critChance = clamp((m.crit||0) + bo.crit, 0, 0.85);
  c.cdr = clamp(bo.cdr, 0, 0.5);
  c.maxHp = b.hp + g.hp*L + bo.hp + (m.hp||0);
  c.hpReg = b.hpReg + g.hpReg*L + (m.hpReg||0);
  c.maxMana = b.mana + g.mana*L + bo.mana;
  c.mpReg = b.mpReg + g.mpReg*L;
  if(c.perkMul){ c.ad*=c.perkMul.ad; c.as=Math.min(2.4, c.as*c.perkMul.as); c.ms*=c.perkMul.ms;
    c.maxHp=Math.round(c.maxHp*c.perkMul.hp); c.ap=c.ap*c.perkMul.ap + (c.perkFlat.ap||0);
    c.armor+=c.perkFlat.armor; c.mr+=c.perkFlat.mr; c.lifesteal+=c.perkFlat.lifesteal;
    c.critChance=clamp(c.critChance+c.perkFlat.crit, 0, 0.85); c.cdr=clamp(c.cdr+c.perkFlat.cdr, 0, 0.5); }
  if(c.champId==='morgrim'){ c.ad += 2*(c.kills||0); }
  if(!c.isPlayer && c.team==='red' && !(G&&G.duel)){ c.ad*=EASE.enemyDmgDealt; c.armor*=EASE.enemyArmorMul; c.mr*=EASE.enemyArmorMul; c.maxHp*=EASE.enemyHpMul; }
  var dst=(G&&G.dragonStacks&&G.dragonStacks[c.team])?G.dragonStacks[c.team]:0;
  if(dst>0){ var dmgMul=1+0.08*dst; c.ad*=dmgMul; c.ap*=dmgMul; c.maxHp=Math.round(c.maxHp*(1+0.06*dst)); }
  if(full){ c.hp=c.maxHp; c.mana=c.maxMana; }
  else { if(c.maxHp>prevMax){ c.hp += (c.maxHp-prevMax); }
    if(c.maxMana>prevMM){ c.mana += (c.maxMana-prevMM); }
    c.hp=Math.min(c.hp,c.maxHp); c.mana=Math.min(c.mana,c.maxMana); }
}

function allUnits(){

function isEnemyTeam(a,b){ return a!==b; }

function nearestEnemy(team, x, y, maxR, pred){

/* ----- combat ----- */
function effDmg(raw, type, target){ var res = type==='magic'?(target.mr||0):(target.armor||0); return raw * (100/(100+Math.max(0,res))); }
function dealDamage(src, target, raw, type, opt){
  if(!unitAlive(target)){ return 0; }
  if(target.kind==='nexus' && target.invuln){ return 0; }
  if(target.invulnT && G.t<target.invulnT){ floatText(target.x,target.y-target.radius-8,'IMMUNE','#cdd8e6',10); return 0; }

  if(src && src.isPlayer && src.elixUntil && G.t<src.elixUntil){ raw*=1.15; }
  if(G.overtime){ raw*=1.5; }
  if(src && src.talExec && target.maxHp && target.hp/target.maxHp<0.35){ raw*=1.15; }
  if(src && src.talTitan && (target.kind==='jungle'||target.raidBoss)){ raw*=1.15; }
  if(G.lastStandOn && !G.duel && src && src.team==='blue' && (src.kind==='champ'||src.kind==='minion'||src.kind==='deploy'||src.kind==='tower') && G.nexus && G.nexus.blue && dist(src.x,src.y,G.nexus.blue.x,G.nexus.blue.y)<600){ raw*=1.2; }
  opt=opt||{};

  var dmg=effDmg(raw,type,target);
  if(target.kind==='champ' && !target.isPlayer && target.team==='red' && !G.duel){ dmg*=EASE.enemyDmgTaken; }
  if(target.champId==='thane'){ dmg*=0.85; }
  if(target.champId==='kael' && target.warUntil && G.t<target.warUntil){ dmg*=0.5; }
  if(src && src.champId==='nyx' && target.nyxMarkUntil && G.t<target.nyxMarkUntil){ dmg*=1.2; }
  if(G.lastStand && src && src.isPlayer){ dmg*=1.25; }
  if(G.duel && G.suddenDeath && src && src.kind==='champ' && target.kind==='champ'){ dmg*=1.25; }
  if(G.mods && G.mods.glass_cannons){ dmg*=1.5; }
  if(isNight()){ if(src && src.kind==='jungle'){ dmg*=1.25; }
    if(src && src.kind==='champ' && src.champId==='nyx'){ dmg*=1.15; } }
  if(target.champId==='thane' && target.maxHp>0 && (target.hp/target.maxHp)<0.4){ dmg*=0.8; }
  if(src && src.champId==='nyx' && target.maxHp>0 && (target.hp/target.maxHp)<0.35){ dmg*=1.25; }
  if(target.shield>0){ var ab=Math.min(target.shield,dmg); target.shield-=ab; dmg-=ab; }
  if(dmg<=0){ flashHit(target); return 0; }
  if(target.isPlayer && src && src.kind==='champ'){ G.playerHitT=G.t; }
  if(target.isPlayer){ G.playerDmgTaken+=dmg; G.stat.taken+=dmg; }
  if(src && src.isPlayer){ G.stat.dealt+=dmg; }
  target.hp-=dmg; target.hitFlash=0.12;
  if(target.isPlayer && target.hp<=0 && !G.duel && !G.deathRecapLock){
    G.deathRecap={ who:(src&&src.def&&src.def.name)||(src&&src.name)||(src&&src.kind==='tower'?'A TOWER':(src&&src.kind==='storm'?'THE STORM':'AN ENEMY')), dmg:Math.round(dmg), type:type||'physical' }; }
  if(target.kind==='champ' && target.champId==='fable' && target.hp>0 && target.maxHp>0 &&
     (target.hp/target.maxHp)<0.35 && G.t>=(target.plotCd||0)){
    target.plotCd=G.t+22; target.shield=Math.max(target.shield, 90+26*target.level);
    spawnRing(target.x,target.y,'#ffd98a',52); floatText(target.x,target.y-target.radius-16,'PLOT ARMOR','#ffd98a',12);
    if(target.isPlayer){ Audio.play('buffpick'); } }
  if(src && src.kind==='champ'){ var heal=0;
    if(opt.isAttack){ var ls=effLifesteal(src); if(ls>0){ heal=dmg*ls; } }
    if(src.champId==='morgrim'){ var omni=(src.frenzyUntil && G.t<src.frenzyUntil)?0.30:0.18; heal=Math.max(heal, dmg*omni); }
    if(heal>0 && src.hp<src.maxHp){ src.hp=Math.min(src.maxHp,src.hp+heal); } }
  if(opt.mark && src && src.champId==='sera'){ src.markUntilMap[target.uid]=G.t+3; }
  if(target.kind==='champ' || (target.kind==='jungle'&&target.epic) || opt.showNum){
    var fcol = opt.color || (type==='magic'?'#cda7ff':'#ffffff');
    var fsz = opt.size || 13;
    floatText(target.x, target.y-target.radius-6, Math.round(dmg), fcol, fsz); }
  if(target.hp<=0){ onUnitDeath(src,target); }

/* ----- projectiles ----- */
function spawnProjectile(o){
  var p={ team:o.team, x:o.x, y:o.y, speed:o.speed||700, range:o.range||600, traveled:0,
    dmg:o.dmg||0, type:o.type||'physical', radius:o.radius||7, pierce:!!o.pierce,
    homing:!!o.homing, target:o.target||null, aoe:o.aoe||0, color:o.color||'#fff',
    isAttack:!!o.isAttack, mark:!!o.mark, friendly:!!o.friendly, slow:!!o.slow, slowAmt:o.slowAmt||0, slowDur:o.slowDur||0, stunDur:o.stunDur||0,
    hitset:{}, src:o.src||null, dead:false, trail:o.trail!==false, land:!!o.land, extraMagic:0,
    splash:o.splash||0, splashFrac:o.splashFrac||0 };
  var dx,dy,d;
  if(o.target){ dx=o.target.x-o.x; dy=o.target.y-o.y; } else { dx=(o.tx)-o.x; dy=(o.ty)-o.y; }
  d=Math.sqrt(dx*dx+dy*dy)||1; p.vx=dx/d*p.speed; p.vy=dy/d*p.speed;
  if(o.land){ p.landX=o.tx; p.landY=o.ty; p.toLand=d; }
  G.projectiles.push(p); return p;
}
function updateProjectile(p, dt){
  if(G.weather && (G.weather.kind==='rain'||G.weather.kind==='storm')){ dt*=0.75; }
  if(p.land){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.traveled+=p.speed*dt;
    if(p.trail){ spawnTrail(p.x,p.y,p.color); }
    if(p.traveled>=p.toLand-4){ explodeAoe(p); p.dead=true; } return; }
  if(p.homing && p.target && unitAlive(p.target)){
    var hx=p.target.x-p.x, hy=p.target.y-p.y, hd=Math.sqrt(hx*hx+hy*hy)||1;
    p.vx=hx/hd*p.speed; p.vy=hy/hd*p.speed; }
  p.x+=p.vx*dt; p.y+=p.vy*dt; p.traveled+=p.speed*dt;
  if(p.trail){ spawnTrail(p.x,p.y,p.color); }
  var arr=allUnits(), i, u, rr;
  for(i=0;i<arr.length;i++){ u=arr[i];
    var okT = p.friendly ? (u.team===p.team && u!==p.src) : isEnemyTeam(p.team,u.team);
    if(!unitAlive(u) || !okT || p.hitset[u.uid]){ continue; }
    rr=u.radius+p.radius;
    if(dist2(p.x,p.y,u.x,u.y) < rr*rr){
      p.hitset[u.uid]=1; applyProjHit(p,u);
      if(!p.pierce){ p.dead=true; if(p.aoe>0){ explodeAoe(p); } break; } }
  }
  if(p.traveled>=p.range){ if(p.aoe>0){ explodeAoe(p); } p.dead=true; }
}
function applyProjHit(p, u){
  dealDamage(p.src, u, p.dmg, p.type, { isAttack:p.isAttack, mark:p.mark, showNum: u.kind==='champ', color:(p.critFx?'#ffd166':null), size:(p.critFx?18:null) });
  if(p.extraMagic>0){ dealDamage(p.src,u,p.extraMagic,'magic',{showNum:u.kind==='champ'}); }
  if(p.slow){ applySlow(u,p.slowAmt,p.slowDur); }
  if(p.stunDur>0){ applyStun(u,p.stunDur); }
  if(p.splash>0){ var sa=allUnits(), sj, sw; for(sj=0;sj<sa.length;sj++){ sw=sa[sj];
      var okS = p.friendly ? (sw.team===p.team && sw!==p.src) : isEnemyTeam(p.team,sw.team);
      if(sw===u||!unitAlive(sw)||!okS){ continue; }
      if(dist2(u.x,u.y,sw.x,sw.y) < (p.splash+sw.radius)*(p.splash+sw.radius)){ dealDamage(p.src,sw,p.dmg*(p.splashFrac||0.5),p.type,{showNum:sw.kind==='champ'}); } }
    spawnRing(u.x,u.y,p.color,p.splash); }
  spawnBurst(u.x,u.y,p.color,5,80);
}
function explodeAoe(p){
  var arr=allUnits(), i, u;
  var cx=(p.landX!==undefined)?p.landX:p.x, cy=(p.landY!==undefined)?p.landY:p.y;
  spawnRing(cx,cy,p.color,p.aoe); shake(0.18,5);
  for(i=0;i<arr.length;i++){ u=arr[i];
    var okA = p.friendly ? (u.team===p.team && u!==p.src) : isEnemyTeam(p.team,u.team);
    if(!unitAlive(u) || !okA){ continue; }
    if(dist2(cx,cy,u.x,u.y) < (p.aoe+u.radius)*(p.aoe+u.radius)){
      if(p.hitset['aoe'+u.uid]){ continue; } p.hitset['aoe'+u.uid]=1;
      dealDamage(p.src,u,p.dmg,p.type,{mark:p.mark,showNum:u.kind==='champ'});
      if(p.slow){ applySlow(u,p.slowAmt,p.slowDur); } if(p.stunDur>0){ applyStun(u,p.stunDur); } } }
}
function applySlow(u, amt, dur){ if(u.kind==='tower'||u.kind==='nexus'){ return; }
  if(u.frenzyUntil && G.t<u.frenzyUntil){ return; }
  u.slowUntil=Math.max(u.slowUntil, G.t+dur); u.slowAmt=Math.max(u.slowAmt,amt); }
function applyStun(u, dur){ if(u.kind==='tower'||u.kind==='nexus'){ return; }
  if(u.frenzyUntil && G.t<u.frenzyUntil){ return; }
  u.ccUntil=Math.max(u.ccUntil||0, G.t+dur); u.atkTarget=null;
  G.particles.push({ring:true,x:u.x,y:u.y-u.radius-6,r:4,maxR:18,life:0.4,max:0.4,color:'#ffe08a'}); }
function knockback(u, fromx, fromy, distpx){ if(u.kind==='tower'||u.kind==='nexus'){ return; }
  var dx=u.x-fromx, dy=u.y-fromy, d=Math.sqrt(dx*dx+dy*dy)||1;
  u.x=clamp(u.x+dx/d*distpx, 16, WORLD.w-16); u.y=clamp(u.y+dy/d*distpx, 16, WORLD.h-16); }

/* ----- abilities ----- */
function abilityDef(c, key){ var idx={q:0,w:1,e:2,r:3}[key]; return c.def.abilities[idx]; }
function abilityRank(c, key){ var r=ranksForLevel(c.level); return r[key]; }
function startCD(c, key){ var mul=G.duel?0.85:(c.isPlayer?0.72:1);
  if(key==='e'){ mul*=0.8; } else if(key==='r'){ mul*=0.7; }
  c.cdR[key]=abilityDef(c,key).cd * mul * (1 - (c.cdr||0)); }
function spendMana(c, key){ var ab=abilityDef(c,key); c.mana=Math.max(0,c.mana-ab.mana); }
function canCast(c, key){
  if(c.respawnT>0 || abilityRank(c,key)<=0 || c.cdR[key]>0){ return false; }
  if(c.mana<abilityDef(c,key).mana){ return false; }
  if(c.dashing || c.ccUntil>G.t){ return false; }
  return true;
}
function castAbility(c, key){
  if(G.duel && G.duelFreeze>0){ return false; }
  if(!canCast(c,key)){ return false; }
  var done = ABILITY_FN[c.champId][key](c);
  if(done===false){ return false; }
  spendMana(c,key); startCD(c,key);
  if(c.isPlayer && !G.duel){ G.qCasts++; }
  if(key==='r' && !c.duelAlly && c.level>=9){
    if(!c.ultEvo){ c.ultEvo=true;
      banner('\u26a1 '+c.def.name+' \u2014 ULTIMATE EVOLVED: '+c.def.abilities[3].name+'+','#ffd166');
      spawnRing(c.x,c.y,'#ffd166',140); Audio.play('victory'); }
    var ev9=allUnits(), evi, evu;
    spawnRing(c.x,c.y,'#ffffff',170); spawnRing(c.x,c.y,c.def.accent,120);
    for(evi=0;evi<ev9.length;evi++){ evu=ev9[evi];
      if(unitAlive(evu) && isEnemyTeam(c.team,evu.team) && dist(c.x,c.y,evu.x,evu.y)<170+evu.radius){
        dealDamage(c,evu,120+0.3*(c.ap||0),'magic',{showNum:evu.kind==='champ'}); } }
    healUnit(c, 0.08*c.maxHp);
    c.cdR.r*=0.75; }
  if(key==='r' && c.isPlayer){ screenFlash(c.def.accent, 0.18); }
  return true;
}
function facingVec(c){ return {x:Math.cos(c.facing), y:Math.sin(c.facing)}; }
function aimTarget(c, range){
  var t = nearestEnemy(c.team, c.x, c.y, range, function(u){ return u.kind==='champ'; });
  if(t){ return t; }
  return nearestEnemy(c.team, c.x, c.y, range, function(u){ return u.kind==='minion'||u.kind==='jungle'||u.kind==='tower'||u.kind==='nexus'; });
}
function aimDir(c, range){ var t=aimTarget(c,range); if(t){ return ang(c.x,c.y,t.x,t.y); } return c.facing; }
function doDash(c, dirx, diry, distpx, dur, onArrive){
  c.dashing=true; c.dashT=0; c.dashDur=dur;
  c.dashFromX=c.x; c.dashFromY=c.y;
  c.dashToX=clamp(c.x+dirx*distpx,20,WORLD.w-20);
  c.dashToY=clamp(c.y+diry*distpx,20,WORLD.h-20);
  c.dashArrive=onArrive||null; c.facing=Math.atan2(diry,dirx); c.moveTarget=null;
}

var ABILITY_FN = {

function canPlaceDeploy(dtype, x, y){

  if(dist(x,y,G.player.x,G.player.y) > 720){ return {ok:false,msg:'Too far \u2014 build near you'}; }
  if(dist(x,y,BLUE_FOUNTAIN.x,BLUE_FOUNTAIN.y)<120 || dist(x,y,RED_FOUNTAIN.x,RED_FOUNTAIN.y)<120){ return {ok:false,msg:'Too close to a fountain'}; }
  if(dist(x,y,G.nexus.blue.x,G.nexus.blue.y)<70 || dist(x,y,G.nexus.red.x,G.nexus.red.y)<70){ return {ok:false,msg:'Too close to a Nexus'}; }
  var i; for(i=0;i<G.towers.length;i++){ if(!G.towers[i].dead && dist(x,y,G.towers[i].x,G.towers[i].y)<58){ return {ok:false,msg:'Too close to a tower'}; } }

function updateChampCommon(c, dt){

  else { var dm2={x:standX,y:standY}; if(dist(e.x,e.y,standX,standY)<30){ dm2=null; } champMoveAndAttack(e,dt,dm2,null); }
}

function moveToward(u, tx, ty, dt){
  var dx=tx-u.x, dy=ty-u.y, d=Math.sqrt(dx*dx+dy*dy); if(d<1){ return; }
  var ms=u.ms; if(u.slowUntil>G.t){ ms*=(1-u.slowAmt); }
  var buff=u.team==='blue'?G.blueBuff:G.redBuff; if(buff>0 && u.kind==='minion'){ ms*=1.12; }
  if(u.kind==='minion' && u.team==='blue'){ if((G.rallyUntil&&G.t<G.rallyUntil)||(u.rallyUntil&&G.t<u.rallyUntil)){ ms*=1.30; }
    if(G.player.champId==='lumen' && G.player.respawnT<=0 && dist(u.x,u.y,G.player.x,G.player.y)<420){ ms*=1.08; } }
  var sp=ms*dt; if(sp>d){ sp=d; } u.x+=dx/d*sp; u.y+=dy/d*sp; u.facing=Math.atan2(dy,dx);
}
function minionAcquire(m, sr){
  if(m.team==='red' && !G.duel){
    var tt,tu2,tb=null,tbd=220*220;
    for(tt=0;tt<G.minions.length;tt++){ tu2=G.minions[tt];
      if(!tu2.dead && tu2.team==='blue' && tu2.trait==='taunt'){
        var td2=dist2(m.x,m.y,tu2.x,tu2.y); if(td2<tbd){ tbd=td2; tb=tu2; } } }
    if(tb){ return tb; } }
  if(m.confUntil && G.t<m.confUntil){
    var csr=Math.max(sr,520);
    var carr=allUnits(), cbest=null, cbd=csr*csr, ci, cu, cdd;
    for(ci=0;ci<carr.length;ci++){ cu=carr[ci]; if(cu===m || !unitAlive(cu) || cu.team!==m.team){ continue; }
      if(cu.kind!=='minion' && cu.kind!=='champ'){ continue; }
      cdd=dist2(m.x,m.y,cu.x,cu.y); if(cdd<cbd){ cbd=cdd; cbest=cu; } }
    return cbest; }
  var t=nearestEnemy(m.team, m.x, m.y, sr, function(u){ return u.kind==='minion'||u.kind==='champ'||u.kind==='tower'||u.kind==='nexus'||u.kind==='deploy'||(u.kind==='jungle'&&u.epic); });
  var tm=nearestEnemy(m.team, m.x, m.y, sr, function(u){ return u.kind==='minion'; }); if(tm){ t=tm; }
  return t;
}
function updateBlueMinion(m, dt){

function drawDanger(){ if(!G||G.state!=='play'){ return; } var p=G.player; if(!p||p.respawnT>0){ return; }

  var g1=ctx.createLinearGradient(0,0,0,band); g1.addColorStop(0,'rgba(200,24,24,'+a+')'); g1.addColorStop(1,'rgba(200,24,24,0)'); ctx.fillStyle=g1; ctx.fillRect(0,0,w,band);
  var g2=ctx.createLinearGradient(0,h,0,h-band); g2.addColorStop(0,'rgba(200,24,24,'+a+')'); g2.addColorStop(1,'rgba(200,24,24,0)'); ctx.fillStyle=g2; ctx.fillRect(0,h-band,w,band);
  var g3=ctx.createLinearGradient(0,0,band,0); g3.addColorStop(0,'rgba(200,24,24,'+a+')'); g3.addColorStop(1,'rgba(200,24,24,0)'); ctx.fillStyle=g3; ctx.fillRect(0,0,band,h);
  var g4=ctx.createLinearGradient(w,0,w-band,0); g4.addColorStop(0,'rgba(200,24,24,'+a+')'); g4.addColorStop(1,'rgba(200,24,24,0)'); ctx.fillStyle=g4; ctx.fillRect(w-band,0,band,h);

function buyItem(i){ var it=ITEMS[i]; if(!it){ return; }

      var mwx=clamp((sx-mr8.x)/mr8.w*WORLD.w, 16, WORLD.w-16);
      var mwy=clamp((sy-mr8.y)/mr8.h*WORLD.h, 16, WORLD.h-16);
      G.player.moveTarget={x:mwx,y:mwy}; G.player.atkTarget=null;
      spawnRing(mwx,mwy,'#7fd2ff',40); Audio.play('coin'); }
    return; }
  // HUD buttons
  if(pointInRect(sx,sy,pauseBtnRect())){ G.paused=true; return; }
  if(pointInRect(sx,sy,shopBtnRect())){ G.shopOpen=true; return; }
  if(pointInRect(sx,sy,buildBtnRect())){ if(G.placing){ G.placing=null; banner('Build cancelled','#bfe6ff'); } else { G.buildOpen=true; G.buildInfo=null; G.buildTapId=null; } return; }
  if(G.player.legendary && G.player.legendary!=='leg_revive' && pointInRect(sx,sy,legendBtnRect())){ useLegendary(); return; }
  if(pointInRect(sx,sy,recallBtnRect())){ var p=G.player;
    if(p.respawnT<=0){ if(p.recalling){ p.recalling=false; p.recallT=0; } else { p.recalling=true; p.recallT=2.4; Audio.play('recall'); } } return; }
  // army command bar
  var sqi; for(sqi=0;sqi<4;sqi++){ if(pointInRect(sx,sy,squadBtnRect(sqi))){
    if(sqi===0){ G.selSquad=0; G.squadCmd=false; banner('Commanding the WHOLE army','#cdd8e6'); }
    else if(G.selSquad===sqi && G.squadCmd){ G.squadCmd=false; banner('Order cancelled','#bfe6ff'); }
    else { G.selSquad=sqi; G.squadCmd=true; banner('SQUAD '+sqi+' selected \u2014 tap the map to send them', SQUAD_COLS[sqi]); }
    Audio.play('coin'); return; } }
  if(pointInRect(sx,sy,ageBtnRect())){ advanceAge(); return; }
  if(pointInRect(sx,sy,beamBtnRect())){
    if(G.beamCd>0){ banner('Nexus Beam recharging ('+Math.ceil(G.beamCd)+'s)','#ff9a9a'); }
    else if(G.player.gold<250){ banner('Nexus Beam needs 250g','#ff9a9a'); Audio.play('minion_die'); }
    else { G.placing='nexus_beam'; banner('Tap the map to FIRE the Nexus Beam','#8fd8ff'); Audio.play('buy'); }
    return; }
  if(pointInRect(sx,sy,hornBtnRect())){ fireNexusHorn(); return; }
  var ac; for(ac=0;ac<ARMY_CMDS.length;ac++){ if(pointInRect(sx,sy,armyBtnRect(ac))){ setArmyStance(ARMY_CMDS[ac].s); return; } }
  if(G.bossPhase && activeBoss() && pointInRect(sx,sy,bossAttackBtnRect())){ focusArmyOnBoss(); return; }
  // summoner spells
  var sbi9; for(sbi9=0;sbi9<2;sbi9++){
    if(pointInRect(sx,sy,summonerBtnRect(sbi9))){
      var pfk=(G.player.sumsSel&&G.player.sumsSel[sbi9])||(sbi9===0?'flash':'surge');
      if(pfk==='flash' && G.player.moveTarget){
        var pf=G.player, mdx=pf.moveTarget.x-pf.x, mdy=pf.moveTarget.y-pf.y, md=Math.sqrt(mdx*mdx+mdy*mdy)||1;
        castFlash(pf, mdx/md, mdy/md); return; }
      castSummonerByKey(G.player, pfk); return; } }
  var keys=['q','w','e','r'], k;
  for(k=0;k<4;k++){ if(pointInRect(sx,sy,abilityBtnRect(k))){ castAbility(G.player, keys[k]); return; } }
  // minimap -> move order
  if(pointInRect(sx,sy,minimapRect())){ var mw=minimapToWorld(sx,sy); G.player.moveTarget={x:mw.x,y:mw.y}; G.player.atkTarget=null; return; }
  // placement mode (build)
  if(G.placing){ var wpp=screenToWorld(sx,sy); placeBuild(G.placing, wpp.x, wpp.y); G.placing=null; return; }
  // squad move order consumes the next map tap
  if(G.squadCmd && G.selSquad>0){
    var w8=screenToWorld(sx,sy), sn=G.selSquad;
    G.squadOrder[sn]={ x:clamp(w8.x,16,WORLD.w-16), y:clamp(w8.y,16,WORLD.h-16) };
    G.squadStance[sn]='push'; G.squadCmd=false;
    spawnRing(G.squadOrder[sn].x, G.squadOrder[sn].y, SQUAD_COLS[sn], 52);
    banner('SQUAD '+sn+' moving out!', SQUAD_COLS[sn]); Audio.play('buy'); return; }
  // world command
  if(G.player.respawnT>0){ return; }
  var w=screenToWorld(sx,sy);
  if(G.talentOffer){ var tpi;
    for(tpi=0;tpi<2;tpi++){ if(pointInRect(sx,sy,talentRect(tpi))){ pickTalent(tpi); return; } } }
  if(!G.duel){ var utw, ut9;
    for(utw=0;utw<G.towers.length;utw++){ ut9=G.towers[utw];
      if(ut9.team!=='blue' || ut9.dead){ continue; }
      if(dist(w.x,w.y,ut9.x,ut9.y) < ut9.radius+18){
        if(dist(G.player.x,G.player.y,ut9.x,ut9.y)>260){ banner('Move closer to upgrade this tower','#cdd8e6'); return; }
        upgradeTower(ut9); return; } } }
  var tgt=unitUnderPoint(w.x,w.y);
  if(tgt){ G.player.atkTarget=tgt; G.player.moveTarget=null; worldDragActive=false; floatText(tgt.x,tgt.y-tgt.radius-10,'\u2694','#fff',12);
    if(tgt.kind!=='minion'){ G.armyFocus=tgt; floatText(tgt.x,tgt.y-tgt.radius-22,'ARMY FOCUS','#ff6b6b',11); } }
  else { G.player.moveTarget={x:w.x,y:w.y}; G.player.atkTarget=null; G.armyFocus=null; worldDragActive=true; }
}
function onMove(sx,sy){
  if(!worldDragActive || App.state!=='game' || !G || G.state==='over' || G.paused || G.shopOpen){ return; }
  if(G.player.respawnT>0){ return; }
  // ignore drag if finger is over HUD zones
  if(pointInRect(sx,sy,minimapRect())){ return; }
  var k; for(k=0;k<4;k++){ if(pointInRect(sx,sy,abilityBtnRect(k))){ return; } }
  if(pointInRect(sx,sy,summonerBtnRect(0))||pointInRect(sx,sy,summonerBtnRect(1))){ return; }
  var ac2; for(ac2=0;ac2<ARMY_CMDS.length;ac2++){ if(pointInRect(sx,sy,armyBtnRect(ac2))){ return; } }
  var w=screenToWorld(sx,sy);
  if(G.duel){
    var H2m=VIEW.h/2;
    if(sy < H2m){ if(G.enemy.respawnT<=0){ G.enemy.moveTarget={x:sx/DUEL_ZOOM+G.duelCams.p2.x, y:sy/DUEL_ZOOM+G.duelCams.p2.y}; G.enemy.atkTarget=null; } }
    else if(G.player.respawnT<=0){ G.player.moveTarget={x:sx/DUEL_ZOOM+G.duelCams.p1.x, y:(sy-H2m)/DUEL_ZOOM+G.duelCams.p1.y}; G.player.atkTarget=null; }
    return; }
  G.player.moveTarget={x:w.x,y:w.y}; G.player.atkTarget=null;
}
function onEnd(){ worldDragActive=false; }

function getXY(e){ var rect=canvas.getBoundingClientRect();
  var t = (e.touches&&e.touches[0])||(e.changedTouches&&e.changedTouches[0])||e;
  return { x:t.clientX-rect.left, y:t.clientY-rect.top }; }

canvas.addEventListener('touchstart', function(e){ e.preventDefault(); lastTouchTime=now(); var p=getXY(e); onStart(p.x,p.y); }, {passive:false});
canvas.addEventListener('touchmove', function(e){ e.preventDefault(); var p=getXY(e); onMove(p.x,p.y); }, {passive:false});
canvas.addEventListener('touchend', function(e){ e.preventDefault(); onEnd(); }, {passive:false});
canvas.addEventListener('touchcancel', function(e){ onEnd(); }, {passive:false});
canvas.addEventListener('mousedown', function(e){ if(now()-lastTouchTime<700){ return; } var p=getXY(e); onStart(p.x,p.y); mouseDown=true; });
canvas.addEventListener('mousemove', function(e){ if(!mouseDown){ return; } var p=getXY(e); onMove(p.x,p.y); });
window.addEventListener('mouseup', function(){ mouseDown=false; onEnd(); });
var mouseDown=false;

/* ----- resize + main loop + boot ----- */
function resize(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  var w = window.innerWidth, h = window.innerHeight;
  VIEW.w = w; VIEW.h = h;
  canvas.width = Math.round(w*DPR); canvas.height = Math.round(h*DPR);
  canvas.style.width = w+'px'; canvas.style.height = h+'px';
  if(G){ G.cam.x=clamp(G.cam.x,0,Math.max(0,WORLD.w-VIEW.w)); G.cam.y=clamp(G.cam.y,0,Math.max(0,WORLD.h-VIEW.h)); }
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', function(){ setTimeout(resize,150); });

var lastT = now();
function bossMotif(){ if(G && G.raidBoss && G.raidBoss.alive && !G.raidBoss.dead && G.raidBoss.graceT<=0){ return G.raidBoss.bossKind||'behemoth'; } return null; }
function musicPulse(){
  if(!G || G.state!=='play' || G.paused){ return; }
  if(!Audio.isEnabled()){ return; }
  var intense=false;
  if(G.duel){ intense=true; }
  else { var mi9,mu9; for(mi9=0;mi9<G.minions.length;mi9++){ mu9=G.minions[mi9];
    if(!mu9.dead && mu9.team==='red' && dist2(mu9.x,mu9.y,G.player.x,G.player.y)<420*420){ intense=true; break; } } }
  Music.tick(intense, bossMotif());
}
function frame(){
  var t = now(); var dt = (t-lastT)/1000; lastT = t;
  if(dt>0.05){ dt=0.05; } if(dt<0){ dt=0; }
  if(App.state==='game' && G){ update(dt); musicPulse(); }
  if(App.state==='title'){ drawTitle(); }
  else if(App.state==='trophies'){ drawTrophies(); }
  else if(App.state==='runes'){ drawRunes(); }
  else if(App.state==='select'){ drawSelect(); }
  else { render(); }
  requestAnimationFrame(frame);
}

(function boot(){
  var snd = Store.get('rift_sound', '1'); Audio.setEnabled(snd!=='0');
  resize();
  requestAnimationFrame(frame);
})();

})();
</script>
</body>
</html>
